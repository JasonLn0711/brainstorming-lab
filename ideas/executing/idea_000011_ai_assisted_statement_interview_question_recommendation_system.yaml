problem_statement:
  raw: "Given police statement interviews with victims, optimize the next-question recommendation workflow under constraints of non-leading questioning, legal auditability, privacy, officer control, SOP grounding, and local or controlled deployment."
  normalized: "Given victim statement interview workflows, optimize legally safe next-question recommendation under constraints of non-leading wording, auditability, privacy, human officer control, SOP/RAG grounding, and bounded local deployment."
  structure:
    given: "victim statement interview workflows"
    optimize: "legally safe next-question recommendation"
    constraints:
      - "non-leading wording"
      - auditability
      - privacy
      - "human officer control"
      - "SOP and RAG grounding"
      - "bounded local deployment"
summary: "A system concept for helping officers choose the next reasonable victim-interview question from the current statement, missing legal elements, SOP/RAG references, and safety checks. The system should be an auditable workflow, not a free-chat investigation agent."
source_note_zh: "這個系統應定義為可稽核的 AI 偵詢輔助 workflow；Hermes 可以輔助工具執行與技能化，但主流程必須由 LangGraph 或等價的狀態機鎖住。"
first_principle:
  scarce_resource: "stable, auditable real-model behavior on the smallest Extract -> Question loop"
  not_the_core:
    - Docker
    - UI
    - "RAG service"
    - Kafka
    - "multi-model routing"
    - "complete legal workflow before real-model proof"
  core_proof: "The same GPT-OSS 20B, constrained by LangGraph node prompts and SQLite audit, can repeatedly produce neutral, necessary, reviewable next-question suggestions."
  decision_rule: "Do not add Missing/Safety/RAG/UI/Docker until real gpt-oss:20b returns valid JSON for the sample case and audit rows with prompt/version/runtime/hash metadata."
  human_boundary: "The system suggests; the officer adopts, modifies, skips, or flags."
assumptions:
  - "The useful product is a next-question recommendation system, not an autonomous investigator."
  - "The officer remains the decision maker: every suggested question can be adopted, edited, or skipped."
  - "Each output must carry a reason, missing-element target, supporting SOP/RAG source, and risk warning."
  - "Non-leading wording, over-inference checks, privacy minimization, and audit logging are core requirements, not later polish."
  - "Hermes Agent is useful as a tool/skill/memory execution environment, but should not own the legal workflow state in the MVP."
  - "LangGraph or an equivalent deterministic graph should own node order, state transitions, retries, and audit boundaries."
  - "A single local model such as gpt-oss-20b may be enough for MVP only if structured output, tool calling, latency, and legal-safety checks pass on a controlled fixture."
  - "Persistent memory must be disabled, isolated, or tightly scoped for case work unless a formal retention and privacy policy exists."
  - "No sensitive raw case evidence should be stored in this brainstorming repo."
evidence:
  - "User conversation on 2026-05-05 describing a Criminal Investigation Bureau-adjacent statement-interview system concept."
  - "User-provided architecture sketch: LangGraph as orchestrator, Hermes as tool executor, RAG for laws/SOP/question bank, rule-based safety review, Kafka excluded from MVP."
  - "Official Hermes Agent documentation verified on 2026-05-05: Hermes has toolsets for web, terminal/files, browser, orchestration, memory, cron, messaging, MCP, and code execution."
  - "Official Hermes Agent developer docs verified on 2026-05-05: AIAgent handles prompt assembly, provider resolution, model calls, tool dispatch, compression, persistence, and memory flushing."
  - "Official Hermes Agent memory docs verified on 2026-05-05: MEMORY.md and USER.md are injected as frozen snapshots at session start, and session search persists conversations in SQLite/FTS5."
  - "OpenAI/Hugging Face gpt-oss-20b model card verified on 2026-05-05: 21B parameters, 3.6B active parameters, Harmony format requirement, agentic/tool-use support, and MXFP4 running within 16GB memory."
baseline:
  - "Manual officer interview using SOP checklist only."
  - "Static checklist or rule form that does not read the current statement."
  - "Free-form chatbot that directly advises the officer without fixed workflow or audit trail."
  - "LangGraph-only pipeline with no external agent executor."
  - "Hermes-only autonomous agent with broad tools and memory, used as the main controller."
metrics:
  - "Missing-element coverage: percentage of legally relevant gaps correctly identified on synthetic cases."
  - "Non-leading question pass rate judged by legal/SOP reviewers."
  - "Unsupported-rationale rate: outputs that cite no valid SOP/RAG support."
  - "Over-inference rate: outputs that assume facts not present in the current statement."
  - "Officer adoption, edit, and skip rates."
  - "Latency per recommendation under local model runtime."
  - "Audit completeness: state, prompt version, retrieved sources, rule-check result, and final officer action are recorded."
  - "Privacy safety: no raw sensitive case evidence written outside approved storage."
insights:
  - "The first-principle boundary is legal auditability, not agent autonomy."
  - "Hermes should be treated as an execution substrate: tool registry, skill loading, memory/session machinery, subagents, and platform gateway."
  - "Hermes is weaker as the top-level controller for this domain because its strengths include persistent learning and broad autonomy, while the statement workflow needs constrained, reproducible state transitions."
  - "LangGraph should own the interview-state object, including extracted facts, case type, missing elements, retrieval IDs, candidate questions, safety-review results, and human feedback."
  - "Hermes can run bounded tasks such as RAG lookup, question-generation skill execution, fixture-batch evaluation, or report synthesis behind narrow tool permissions."
  - "The key design move is to make every candidate question answer a contract: question text, target missing element, evidence source, non-leading rationale, risk flags, and stop/ask-human condition."
  - "A free-chat interface is actively risky here because it hides state, prompts, retrieval source boundaries, and legal safety checks."
  - "Kafka should stay out of the MVP unless ASR streaming, multi-station event flow, or distributed services become real requirements."
