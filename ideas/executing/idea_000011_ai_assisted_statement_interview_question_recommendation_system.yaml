architecture_decision:
  system_name: "AI-Assisted Statement Interview Question Recommendation System"
  thesis: "Build a controlled workflow for next-question recommendation, not an autonomous legal/investigative chatbot."
  recommended_split:
    langgraph: "Own workflow state, node ordering, retries, traceability, guardrails, and human-feedback transitions."
    hermes: "Run bounded tool/skill tasks such as RAG lookup, question-generation execution, fixture evaluation, and report packaging."
    langchain: "Use sparingly for LLM wrappers, retrievers, embeddings, and RAG plumbing."
    rag: "Ground laws, SOPs, interview templates, and approved question examples."
    rule_engine: "Hard-check non-leading wording, required fields, source citation, privacy flags, and unsupported inference."
    database: "Use SQLite or Postgres for state and audit log."
    kafka: "Exclude from MVP; revisit only for ASR streaming, multi-precinct service events, or distributed scaling."
  mvp_nodes:
    - "Input Intake Node"
    - "Fact Extraction Node"
    - "Case Type Classification Node"
    - "Missing Element Analysis Node"
    - "Hermes-bounded Question Generation Node"
    - "Safety and Legal Review Node"
    - "Output Ranking Node"
    - "Human Feedback Node"
hermes_understanding:
  what_it_is: "Nous Research Hermes Agent is a self-hosted agent runtime with prompt assembly, model-provider resolution, tool dispatch, persistent memory, skills, session search, cron, messaging gateway, MCP/plugin integration, and subagent delegation."
  how_it_works_in_plain_terms:
    - "It builds an effective system prompt from identity, memory, user profile, skills, context files, tool-use guidance, and model-specific instructions."
    - "It sends the task to a configured model/provider, receives tool calls, and dispatches registered tools through its tool registry."
    - "It can persist sessions in SQLite, search old sessions with FTS5, and keep compact curated memory in MEMORY.md and USER.md."
    - "It can load skills on demand as procedural memory, including agent-created or externally installed SKILL.md workflows."
    - "It can delegate tasks to subagents with isolated context and selected toolsets."
    - "It can run across CLI, messaging gateways, cron jobs, and platform integrations."
  risk_for_statement_system:
    - "Broad memory and session persistence can conflict with sensitive case-retention requirements."
    - "Too many enabled tools can make behavior harder to certify."
    - "Autonomous skill creation is useful for developer workflows but risky inside regulated legal workflows unless disabled or reviewed."
    - "Case-specific prompt/context compression may lose legally relevant detail unless the legal state is stored outside the conversational history."
  safe_usage_pattern:
    - "Create a dedicated Hermes profile or sandbox for development only."
    - "Expose only narrow tools needed by the node: retriever, LLM generation, schema validation, and logging."
    - "Disable or isolate long-term memory for real or sensitive case material."
    - "Have LangGraph pass structured state into Hermes and require structured JSON output back."
    - "Keep final safety checks outside Hermes."
question_output_contract:
  required_fields:
    - candidate_question
    - target_missing_element
    - why_this_question_now
    - retrieved_sources
    - non_leading_check
    - privacy_or_sensitivity_flag
    - unsupported_inference_flag
    - officer_action_options
  forbidden_behavior:
    - "State facts not present in the interview or retrieved source."
    - "Ask leading questions that imply the desired answer."
    - "Produce legal conclusions as if the AI decided the case."
    - "Store raw case evidence outside the approved audit/state store."
