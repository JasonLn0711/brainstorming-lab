first_principle:
  scarce_resource: trustworthy operational evidence, not model output
  core_object: AI system assurance case
  not_the_core:
  - decorating a demo with framework names
  - treating accuracy as the whole evaluation
  - claiming complete security
  - autonomous medical recommendation
  - generic cybersecurity checklist without AI-specific lifecycle mapping
  smallest_useful_unit: one AI triage assurance matrix mapping components to threats,
    mitigations, trust boundaries, audit points, human oversight, and residual risk
  decision_boundary: Use MITRE ATLAS/OWASP/NIST/GMLP to make the prototype reviewable
    and auditable; do not use them to imply regulatory clearance or clinical safety.
framework_roles:
  mitre_atlas:
    role: AI adversary tactics, techniques, mitigations, and case-study knowledge
      base.
    use_in_project: Map AI-specific attack paths such as poisoning, evasion, model
      theft, prompt injection, supply-chain compromise, and agent/tool abuse.
    not_for: Complete governance, clinical validation, or proof of safety by itself.
  owasp_genai_llm:
    role: Developer-facing security risks for LLM, generative AI, agentic AI, and
      AI-driven applications.
    use_in_project: Checklist for prompt injection, insecure output handling, sensitive
      information disclosure, excessive agency, supply-chain risk, overreliance, and
      model theft.
  nist_ai_rmf:
    role: Voluntary risk-management framework for trustworthy and responsible AI.
    use_in_project: Governance framing for mapping, measuring, managing, and governing
      AI risks across lifecycle.
  fda_gmlp:
    role: Medical AI/ML lifecycle discipline and human-AI team performance guidance.
    use_in_project: Boundary reference for clinical relevance, intended use, data
      separation, representative datasets, monitoring, and retraining-risk management.
ai_triage_threat_model_seed:
  asr:
    attacks:
    - adversarial audio
    - replay or fake voice
    - noisy environment manipulation
    controls:
    - confidence threshold
    - audio/transcript mismatch flag
    - human confirmation for safety-critical symptoms
    - raw-audio retention policy or hash-only audit boundary
  llm:
    attacks:
    - direct prompt injection
    - instruction conflict
    - hallucinated medical advice
    controls:
    - system-task boundary
    - structured output schema
    - no autonomous diagnosis/treatment
    - clinician review
  rag:
    attacks:
    - retrieval poisoning
    - fake guideline insertion
    - citation manipulation
    controls:
    - trusted-source registry
    - document provenance
    - evidence tier labels
    - citation verification
  vital_sign_input:
    attacks:
    - sensor spoofing
    - manual entry manipulation
    - delayed or stale signal
    controls:
    - source timestamp
    - plausibility check
    - manual review flag
    - device/source provenance
  ui_workflow:
    attacks:
    - misleading interaction
    - overreliance on AI confidence
    - missing override reason
    controls:
    - uncertainty display
    - review/override button
    - reason capture
    - clear escalation boundary
  agent_tools:
    attacks:
    - unauthorized action
    - tool hijack
    - data exfiltration
    controls:
    - least privilege
    - approval gate
    - tool-call audit log
    - deny default for external side effects
deliverable_shape:
- Component diagram
- Trust-boundary map
- ATLAS/OWASP threat mapping table
- NIST AI RMF governance notes
- GMLP/medical workflow boundary notes
- Mitigation and residual-risk matrix
- Human-in-the-loop workflow
- Audit evidence checklist
- Small red-team/evaluation fixtures
pressure_test:
  setting: A reviewer sees an AI triage demo and asks whether it is only a UI/model
    prototype or a credible AI security/governance artifact.
  expected_failure_mode: The project lists MITRE ATLAS and OWASP by name but cannot
    show any component-level mapping, mitigations, logs, or residual-risk decisions.
  smallest_observable_test: 'Create one two-page assurance packet for the triage pipeline:
    component, attack surface, trust boundary, ATLAS/OWASP mapping, mitigation, audit
    evidence, human review point, and residual risk.'
  decision_metric: Pass if a security or medical informatics reviewer can trace how
    ASR, LLM, RAG, vital signs, UI, and tools are protected or escalated without relying
    on vague framework references.
