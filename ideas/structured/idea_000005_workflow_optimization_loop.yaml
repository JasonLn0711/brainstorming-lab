problem_statement: "Given repeated workflow friction, optimize the loop from idea capture to execution feedback without adding planning noise."
summary: "A closed-loop workflow where ideas produce tests, tests produce feedback, and feedback updates idea maturity and future planning suggestions."
assumptions:
  - "The loop is useful only if feedback updates the idea database, not only a day note."
  - "Idempotent planning markers prevent sync scripts from making daily notes messy."
  - "A small explicit feedback block is safer than guessing from free-form prose."
insights:
  - "The planning bridge is the control-plane interface for the Idea OS."
