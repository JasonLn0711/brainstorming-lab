evidence_gaps:
- Need current local Ubuntu verification because terminal defaults and VTE/Ptyxis
  packages change by release.
- Need direct benchmark rather than relying on terminal marketing or anecdotal smoothness.
- Need separate tests for parser throughput, render throughput, compositor behavior,
  and input latency.
- Need a concrete session-ledger prototype before claiming terminal-as-AI-OS productivity
  value.
- Need one real Codex/Auto Research OS run to test whether the workbench improves
  auditability rather than only subjective smoothness.
- Need a concrete context-engineering failure taxonomy based on real agent sessions.
- Need at least one verification-first workflow where generated output is not accepted
  until evidence, tests, and claim boundaries pass.
- Need security threat model for terminal-native AI agents before treating the workbench
  as a trusted control surface.
