next_steps:
  - "Verify the current Ubuntu terminal stack on the target machine: default terminal, GNOME version, Wayland/X11, GPU driver, and whether Ptyxis/GNOME Terminal uses GTK4 VTE."
  - "Design a four-workload microbenchmark: token stream, Docker-style log stream, tmux multi-pane redraw, and resize/scrollback stress."
  - "Compare Ghostty, Kitty, Alacritty, GNOME Terminal, and Ptyxis with the same font, shell, scrollback, theme, and compositor settings."
  - "Record CPU load, GPU load if available, input lag observations, scroll smoothness, resize behavior, and failure cases."
  - "Define an AI session-ledger schema that captures task, agent plan, command stream, diffs, tests, logs, artifacts, approval gates, and rollback notes."
  - "Define a context-engineering checklist: source scope, repo state, task boundary, memory assumptions, stale-context risks, and evidence downgrade rules."
  - "Define a verification budget for any AI-agent workflow before increasing agent count or automation depth."
  - "Map the security boundary for terminal agents: secrets, network, shell, repo writes, external side effects, and prompt/context injection routes."
  - "Separate durable workflow invariants from tool-specific features so the setup does not depend on any one fast-changing AI CLI."
  - "Decide whether this remains a personal tooling note, becomes a developer-workbench benchmark, or links into Auto Research OS terminal requirements."
