status: execution_ready
problem_statement:
  raw: Ghostty and similar GPU-first terminals may matter because the terminal is
    becoming the main AI engineering workbench, not only a shell for ls/cd/pwd; after
    the Ubuntu 24 Ghostty + zsh + Starship + Codex CLI setup, the deeper question
    is how to govern the whole personal AI engineering workstation so it is maintainable,
    recoverable, synchronized, extensible, and safe for multi-repo AI-agent work.
  normalized: Given AI-agent, log-streaming, TUI, container-heavy engineering workflows,
    and a growing Ubuntu 24 personal workstation setup, design an observable and governable
    AI-native engineering workbench that improves responsiveness, context integrity,
    verification, safety, recoverability, reproducibility, and human judgment under
    constraints of Linux driver diversity, Wayland/X11 behavior, CPU/GPU load, input
    latency, rendering throughput, shell-initialization drift, dotfiles portability,
    multi-repo status awareness, secret hygiene, backup requirements, local-first
    privacy, distributed-agent failure modes, and human approval bandwidth.
  structure:
    given: AI-agent, log-streaming, TUI, and container-heavy engineering workflows
    optimize: terminal responsiveness, context integrity, workbench reliability, verification,
      and agent-session traceability
    constraints:
    - Linux driver diversity
    - Wayland/X11 behavior
    - CPU load
    - input latency
    - rendering throughput
    - workflow reproducibility
    - local-first privacy
    - shell and PATH drift
    - dotfiles portability
    - multi-repo status awareness
    - secret hygiene
    - backup and recovery requirements
    - human approval gates
    - agent observability
    - distributed-agent failure modes
    - human attention bandwidth
summary: 'Treat modern terminals as the primary AI-engineering interface inside a
  larger computing paradigm shift. The hypothesis is that the important move is not
  simply ''terminal has GPU acceleration'' or ''replace Ubuntu Terminal with Ghostty'',
  but a governable AI engineering workstation: GPU-first rendering for high-frequency
  streams, zsh/Ghostty/Starship/Codex as a controlled cockpit layer, dotfiles and
  workstation logs for reproducibility, health-check scripts for environment drift,
  repo startup rituals, tmux/direnv for session and environment isolation, secret
  hygiene, backup paths, session ledgers for agent actions, verification-first workflows,
  local-first execution, security boundaries, and human approval gates across Codex,
  Docker, tmux, Neovim, and research automation.'
human_note: ideas/2026-05-09-gpu-first-terminal-ai-workbench.md
first_principle:
  scarce_resource: human attention, context integrity, verification capacity, and
    approval bandwidth during AI engineering work, not terminal feature count
  not_the_core:
  - terminal brand preference
  - cosmetic transparency or blur
  - generic faster-is-better benchmarking
  - claiming Ubuntu terminals have no GPU acceleration
  - infinite meta-optimization of tools
  - installing more terminal tools without governance
  - treating dotfiles as aesthetics rather than workstation recovery infrastructure
  core_question: When the terminal becomes the main AI operating surface, what architecture
    makes AI-agent work responsive, observable, replayable, auditable, recoverable,
    and locally governable?
  canonical_home: brainstorming-lab owns the hypothesis, test design, and evidence
    gaps.
  planning_boundary: planning-everything-track should only receive a short bridge
    if this becomes scheduled work.
  smallest_next_test: 'Capture the Ubuntu 24 Ghostty + zsh + Starship + Codex CLI
    setup in a workstation log, create a minimal dotfiles-workstation skeleton with
    check_dev_env.sh, and run one repo startup ritual before a Codex session; only
    then benchmark Ghostty, Kitty, Alacritty, GNOME Terminal, and Ptyxis while also
    recording whether the workflow preserves a session ledger: commands, agent plan,
    diffs, tests, artifacts, approval points, and failure reasons.'
  kill_condition: Park the idea if measured latency, CPU load, dropped-frame behavior,
    subjective workflow friction, and session-ledger quality do not differ enough
    to change tool choice or engineering workflow design.
assumptions:
- Modern AI engineering workloads make terminals redraw far more often than traditional
  shell usage.
- GPU acceleration is not binary; architecture, frame scheduling, text shaping, scrollback
  handling, input path, and driver stack matter.
- Ubuntu terminal behavior depends on the terminal emulator, GTK/VTE generation, compositor,
  Wayland/X11, Mesa/NVIDIA drivers, and font/rendering settings.
- Ghostty, Kitty, Alacritty, and WezTerm represent GPU-first or GPU-centric terminal
  design more than older VTE terminals.
- GNOME/VTE/Ptyxis may already use GPU-backed rendering paths, so the useful comparison
  is architecture and workload response, not 'GPU versus no GPU'.
- AI CLI tools such as Codex can expose terminal bottlenecks because output is streamed,
  colored, structured, and frequently refreshed.
- A useful test must separate terminal rendering limits from shell, command, disk,
  network, and application bottlenecks.
- 'The future unit of AI terminal work is a session, not a pane: task, agent plan,
  commands, diffs, tests, logs, artifacts, approval, and rollback must stay connected.'
- The terminal is becoming a safety boundary because AI CLIs can run shell commands,
  edit files, read repos, use network access, and expose secrets.
- Local-first AI workflows fit cybersecurity, forensics, anti-fraud, and research
  automation, but they shift maintenance burden to drivers, dependencies, sandboxing,
  backups, and credential hygiene.
- Tool choice will churn quickly, so the durable investment is in shell, git, Linux,
  networking, containers, debugging, observability, workflow decomposition, and system
  design.
- Prompt engineering is too small a frame; context engineering becomes central because
  AI systems fail when state, memory, repo evidence, and task boundaries drift.
- Generation is becoming cheap; verification, review, and claim control become the
  scarce layers.
- 'AI-agent systems behave like distributed systems: they suffer from orchestration
  failure, retry explosion, memory inconsistency, permission ambiguity, state corruption,
  and coordination overhead.'
- Linux becomes strategically important because AI-native engineering needs scripting,
  composability, containers, GPU control, remote execution, and automation.
- Human cognitive bandwidth can become the bottleneck when one person controls many
  agents, workflows, and context streams.
- Slow thinking remains necessary for architecture, research direction, security boundaries,
  governance, and scientific judgment.
- AI security expands beyond model safety into prompt injection, memory poisoning,
  tool hijacking, context corruption, workflow attacks, agent impersonation, and fake
  reasoning traces.
- A Ghostty + zsh + Starship + Codex CLI setup is not merely a prettier terminal;
  it is the front door to a personal AI engineering workstation.
- 'Starship should be treated as an engineering context layer, not a decorative prompt:
  it visualizes the shell waiting state by surfacing repo, branch, runtime, environment,
  and command-result context at the point where the next command will be chosen.'
- Nerd Font installation is a functional dependency for prompt legibility because
  branch, runtime, and segment icons become ambiguous or broken when glyph coverage
  is missing.
- 'Ghostty visual reproduction on Ubuntu 24 depends on a layered stack: terminal emulator,
  shell, prompt engine, font, theme, and shell initialization state.'
- If shell, PATH, npm global binaries, Codex CLI, Starship, Ghostty config, and aliases
  exist only as local mutations, the machine becomes useful but unexplained and hard
  to rebuild.
- A dotfiles repo turns terminal muscle memory into recoverable infrastructure, especially
  when future work moves to another laptop, lab machine, server, or rebuilt Ubuntu
  install.
- 'Environment drift often appears as tool failure: codex not found, wrong Python,
  uv missing, Docker permission errors, wrong Node version, CUDA unavailable, or shell
  initialization mismatch.'
- 'Three shell facts must be separated: $SHELL as login shell, $0 as current interactive
  session shell, and ps -p $$ as the actual running process.'
- Multi-repo AI work needs repo startup entrypoints such as make status, make dev,
  make test, or scripts/dev_status.sh so humans and agents know branch, dirtiness,
  recent commits, and important files.
- 'Codex CLI should run inside a Git safety ritual: inspect repo state, confirm branch,
  optionally checkpoint, scope the task, review diff, validate, and commit intentionally.'
- Ghostty should be treated as cockpit UI, tmux as persistence and recovery infrastructure,
  zsh as command environment, Starship as context prompt, Git as rollback system,
  Codex as agent collaborator, Docker as environment wrapper, uv as Python runtime
  manager, and GitHub as remote backup/collaboration.
- Secrets management and backup are first-order workstation requirements because the
  user's research and engineering work touches API keys, private evidence, patent-sensitive
  systems, and local-only boundaries.
evidence:
- '2026-05-09 user explanation: GPU accelerated rendering means terminal screen drawing
  is delegated to the GPU rather than mostly CPU-rendered character-by-character updates.'
- '2026-05-09 user explanation: modern terminal workloads include AI token streaming,
  Docker/Kubernetes logs, real-time dashboards, Neovim UI, multi-pane tmux, markdown
  rendering, and agent workflows.'
- '2026-05-09 user refinement: Ubuntu terminals may already have GPU acceleration,
  so the real distinction is legacy terminal plus GPU optimization versus GPU-first
  terminal architecture.'
- '2026-05-09 user synthesis: terminal, tmux, Codex CLI, Claude Code, Warp, Wave,
  OpenCode, aider, and Gemini CLI should be understood as an emerging AI operating
  environment rather than only convenience tools.'
- '2026-05-09 user synthesis: tmux may shift from everyday UI to infra persistence
  layer as terminals add splits, workspaces, blocks, and persistent sessions.'
- '2026-05-09 user synthesis: the strongest AI engineer may be the person who designs
  AI operating workflows, not only the person who trains models.'
- '2026-05-09 user synthesis: the main risk is tool research overgrowth, where terminal
  setup, AI tooling, agent frameworks, orchestration, and productivity systems displace
  paper, product, deployment, publication, and user impact.'
- '2026-05-09 user synthesis: local-first AI workflow matters for privacy, cost, latency,
  governance, and security, especially in cybersecurity, forensic, anti-fraud, voice
  analysis, and government-related workflows.'
- '2026-05-09 user synthesis: observability, tracing, telemetry, auditability, and
  replayability become central because complex AI systems can otherwise act without
  being understood.'
- '2026-05-09 user synthesis: context engineering may replace prompt engineering as
  the core AI-era skill because future failures often come from context collapse rather
  than weak models.'
- '2026-05-09 user synthesis: verification becomes more important than generation
  as AI can produce more content, code, and research candidates than humans can safely
  trust.'
- '2026-05-09 user synthesis: AI agents reintroduce distributed-systems problems such
  as workflow collapse, tool orchestration, context corruption, retry explosion, memory
  inconsistency, permission boundaries, and state management.'
- '2026-05-09 user synthesis: AI-native engineers may differ from traditional engineers
  by orchestrating AI work rather than directly doing every local task.'
- '2026-05-09 user synthesis: a personal operating system or cognition factory may
  let one person coordinate work that previously required a small company, but human
  attention and judgment remain the bottleneck.'
- '2026-05-09 user synthesis: slow thinking, calm prioritization, and deep judgment
  become more valuable because AI accelerates low-level generation but not strategic
  responsibility.'
- '2026-05-09 user synthesis: AI security becomes central because agents have memory,
  tools, network access, automation, and partial autonomy.'
- 'Ghostty official docs checked 2026-05-09: Ghostty describes itself as using platform-native
  UI and GPU acceleration, with Metal on macOS and OpenGL on Linux.'
- 'GNOME Discourse checked 2026-05-09: GTK4 VTE discussion says much drawing work
  is delegated to the GPU and mentions work around renderer behavior and frame-rate
  limitations.'
- 'Unverified evidence gap: exact default terminal path and GPU-rendering behavior
  vary by Ubuntu release, GNOME version, terminal package, compositor, and driver.'
- '2026-05-12 user synthesis: the local setup should be understood as turning Ubuntu
  24 into an AI engineering workstation, not merely replacing Ubuntu Terminal with
  Ghostty.'
- '2026-05-12 user synthesis: the minimum durable layer should include a dotfiles-workstation
  repo, check_dev_env.sh, workstation decision log, repo startup scripts, Git safety
  ritual, tmux session discipline, AGENTS.md boundaries, secrets rules, direnv, backup
  layers, and Ubuntu Terminal as a recovery console.'
- '2026-05-12 user synthesis: the real next step is to freeze the working Ghostty
  + zsh + Starship + Codex CLI setup into traceable knowledge before installing more
  tools.'
- '2026-05-18 user setup note: the target Ghostty screen is a composed stack of Ghostty,
  zsh, Starship, a Nerd Font such as JetBrainsMono Nerd Font, and a color theme such
  as Dracula, Tokyo Night, or Catppuccin; Starship supplies the repo, git branch,
  Node runtime, and prompt symbols.'
- '2026-05-18 user setup note: Ubuntu 24 reproduction must distinguish installed zsh
  from the active login shell; chsh requires a full logout or reboot, while running
  zsh manually is only a temporary interactive session.'
- '2026-05-18 user setup note: Starship failures often reduce to either starship not
  being installed, ~/.local/bin missing from PATH, or eval "$(starship init zsh)"
  not actually being loaded from ~/.zshrc.'
- '2026-05-18 user synthesis: Starship is a shell waiting-state visualization layer
  that converts hidden context into an environment dashboard: repo, branch, runtime,
  Python/Node/Docker/Kubernetes/Conda/AWS state, and command success or failure.'
- '2026-05-18 user synthesis: terminal customization matters only when it improves
  engineering context awareness, prevents wrong-branch or wrong-runtime mistakes,
  and supports AI systems, MLOps, infra, cybersecurity, and DevOps workflows.'
baseline:
- Treat terminal choice as cosmetic preference and never measure rendering/input latency.
- Use Ubuntu default terminal without comparing Ghostty, Kitty, Alacritty, WezTerm,
  or Ptyxis under AI-agent workloads.
- Benchmark only raw line throughput and ignore perceived latency, scroll smoothness,
  resize behavior, and CPU/GPU load.
- Assume GPU acceleration exists or does not exist based on terminal marketing rather
  than tracing actual workload behavior.
- Rely on shell history alone even though AI-agent work needs plans, tool calls, diffs,
  test outcomes, failed attempts, and human approvals.
- Adopt every new AI terminal or agent tool without preserving invariant workflow
  contracts.
- Optimize terminal setup indefinitely without producing papers, benchmarks, project
  artifacts, deployments, or validated experiments.
- Treat prompt engineering as the durable skill while ignoring context architecture,
  state integrity, and evidence routing.
- Prioritize generation volume over verification throughput and human review capacity.
- Treat agent failures as model failures when the real bottleneck is orchestration,
  state, permissions, or observability.
- Build a personal AI company without a capacity model, security model, review policy,
  or kill condition.
- Keep workstation settings only in mutable home-directory files without a dotfiles
  repo, decision log, or bootstrap/check script.
- Let Codex CLI operate on high-value repos before checking branch, dirtiness, local
  context, tests, and safety boundaries.
- Install tmux, direnv, secret scanners, themes, and shell plugins before writing
  down the minimum recovery path and workstation invariants.
metrics:
- Input latency under active output stream.
- Frame pacing or dropped-frame proxy during large colored output.
- CPU utilization during token-stream and log-stream workloads.
- GPU utilization and power impact where measurable.
- Scrollback search and scroll smoothness after large output.
- Resize responsiveness under active tmux/Neovim/TUI workloads.
- Time-to-stable-display after burst output.
- 'Subjective workflow friction notes: lag, missed keystrokes, visual tearing, delayed
  redraw, or pane desynchronization.'
- 'Session-ledger completeness: task, agent plan, command stream, file diff, tests,
  artifacts, approval points, and failure reasons are recoverable.'
- 'Auditability: a later reviewer can reconstruct what the agent did and why human
  approval was or was not required.'
- 'Safety-boundary coverage: secrets, network use, destructive commands, repo writes,
  and external side effects are visible and gated.'
- 'Tool-churn resilience: workflow can survive replacing Codex, Claude Code, Warp,
  Ghostty, or tmux without losing core guarantees.'
- 'Context integrity: agent sessions preserve task boundary, source evidence, repo
  state, and decision history without context bleeding.'
- 'Verification throughput: generated outputs can be checked, scored, tested, or downgraded
  at a rate that does not overwhelm the human.'
- 'Distributed-agent reliability: retries, partial failures, stale memory, permission
  errors, and conflicting tool outputs are surfaced rather than hidden.'
- 'Human bandwidth protection: the workbench reduces switching cost instead of creating
  more simultaneous streams than the user can govern.'
- 'Security resilience: prompt injection, memory poisoning, tool hijacking, and fake
  reasoning traces are treated as first-class failure modes.'
- 'Workstation reproducibility: zsh, Ghostty, Starship, npm global PATH, Codex CLI
  path, aliases, and bootstrap decisions can be reconstructed from versioned dotfiles
  and logs.'
- 'Prompt context coverage: the prompt visibly reports project directory, git branch,
  dirty state where configured, runtime version, shell command result, and enough
  icons/text to remain legible with the selected font.'
- 'Glyph reliability: Nerd Font icons for git branch, Node/runtime, and prompt segments
  render as intended in Ghostty rather than appearing as mojibake, missing boxes,
  or ambiguous fallback glyphs.'
- 'Environment health coverage: check_dev_env.sh reports shell state, PATH entries,
  core tool paths, and versions for zsh, starship, ghostty, git, node, npm, codex,
  docker, python3, and uv.'
- 'Shell-state clarity: the workflow records login shell, current session shell, and
  actual shell process when debugging terminal behavior.'
- 'Repo startup safety: important repos expose one command that reports branch, status,
  recent commits, and key project files before Codex edits.'
- 'Secret-safety coverage: repos keep .env and private data out of git, expose .env.example
  where needed, and run a secret scan before risky commits.'
- 'Backup coverage: high-value repos have at least one remote, one local external
  backup path, and one encrypted/private backup path for sensitive material.'
insights:
- The useful research object is terminal-as-workbench, not terminal-as-shell.
- GPU acceleration is a rendering-path claim; the user-visible bottleneck may still
  be parser throughput, font shaping, scrollback model, compositor path, or application
  output behavior.
- AI-agent workflows are a good stressor because they combine streaming text, markdown-like
  formatting, color, frequent updates, and long-running interaction.
- The phrase 'GPU driven' should be operationalized as architecture and workload behavior,
  not treated as a yes/no feature flag.
- Ubuntu is the more interesting testbed than macOS because driver/compositor variability
  can reveal when GPU-first design helps or fails.
- Terminal AI OS is less about the window and more about the runtime contract around
  agent sessions.
- tmux may remain valuable as persistence and remote-resilience infrastructure even
  if daily UI moves into GPU terminals or AI-native workspaces.
- A future AI engineering workbench needs observability before more autonomy.
- The strongest personal computing direction here is terminal-first, local-first,
  repo-backed, audit-oriented, human-gated, AI-assisted, and reproducible.
- The practical danger is infinite meta-engineering; every workbench improvement should
  be tied to a paper, product, submission, experiment, or repo-quality outcome.
- Context engineering is the bridge between raw AI capability and durable workflow
  reliability.
- Verification is the real scarce layer once generation becomes abundant.
- Agent engineering increasingly looks like distributed-systems engineering with LLMs
  as unreliable, high-level workers.
- A personal cognition factory needs throughput limits; otherwise one person can create
  more tasks, drafts, and agents than they can judge.
- The future strong engineer combines fast AI orchestration with slow, deliberate
  judgment.
- Security boundaries must be designed into the workbench because AI agents turn terminals
  into high-authority execution surfaces.
- The workstation is the durable system; Ghostty, zsh, Starship, tmux, direnv, Codex,
  Docker, uv, VSCode, and GitHub are roles inside that system.
- 'The immediate engineering value is not more visual polish but lower-friction recovery:
  can the user explain, rebuild, validate, and safely extend the machine?'
- 'The visible Ghostty prompt is the last mile of several invisible layers; if it
  does not change, debug in order: current shell, ~/.zshrc loading, PATH, starship
  binary, Starship init line, font availability, then Ghostty config.'
- Prompt icons are not cosmetic when they encode branch/runtime state, but they become
  harmful if font fallback makes the display ambiguous.
- Shell initialization bugs are workstation architecture bugs because AI workflows
  often fail differently in Ghostty, VSCode, tmux, bash, zsh, and Codex.
- A workstation log converts debugging pain into future operational knowledge.
