workstation_governance:
  frame: Ubuntu 24 as AI engineering workstation, not Ghostty as isolated terminal
    preference.
  minimum_recoverable_state:
  - dotfiles-workstation repo for zsh, Ghostty, Starship, scripts, and decision docs
  - check_dev_env.sh for shell, PATH, tool path, and version checks
  - workstation log for changes, problems, fixes, and lessons
  - repo startup script or Makefile target for important repos
  - Git safety ritual before Codex sessions
  - secrets rules and secret scanning before commits involving credentials or private
    data
  - backup path for high-value repos and local-only sensitive material
  shell_state_model:
    login_shell: $SHELL
    current_session_shell: $0
    actual_process: ps -p $$
    why_it_matters: Ghostty, VSCode, tmux, bash, zsh, login shells, and Codex may
      load different initialization files, causing PATH and tool availability drift.
  tool_roles:
    Ghostty: terminal display and interaction layer
    Zsh: interactive command environment
    Starship: repo/context-aware prompt
    Nerd Font: glyph coverage for branch, runtime, and prompt symbols
    Theme: color contrast and visual grouping for terminal context
    tmux: long-running session, SSH, and recovery infrastructure
    Git: version control, checkpoints, rollback, and remote sync
    Codex: AI coding and repo-maintenance collaborator
    Docker: environment containment
    uv: Python package/runtime management
    VSCode: large editing and reading surface
    GitHub: remote backup and collaboration
  codex_ritual:
  - git status
  - confirm branch
  - optionally checkpoint before broad changes
  - specify task boundary
  - inspect before editing when risk is high
  - review diff
  - run validation
  - commit intentionally
