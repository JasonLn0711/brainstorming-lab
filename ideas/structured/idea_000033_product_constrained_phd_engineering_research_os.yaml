problem_statement:
  raw: Given a PhD life where company product work often displaces protected research
    time, convert product coding, demos, integration work, stakeholder pressure, deployment
    friction, and failures into deliberate software-engineering and systems-engineering
    training rather than treating them as research loss.
  normalized: Given a product-constrained PhD environment, optimize a personal engineering
    research OS that converts product delivery into reusable research judgment, system
    design maturity, and a defensible intellectual territory under constraints of
    fragmented time, advisor/company demands, unclear publishability, demo pressure,
    stakeholder conflict, AI-tool distraction, limited formal coursework, and the
    risk of becoming a high-capability tool-person PhD.
  structure:
    given: a product-constrained PhD environment with limited protected research time
    optimize: a personal engineering research OS that turns product delivery into
      research judgment, system design maturity, and intellectual territory
    constraints:
    - fragmented research time
    - advisor and company product demands
    - demo and delivery pressure
    - unclear publishability
    - stakeholder conflict
    - limited formal software/system engineering coursework
    - AI tool and framework distraction
    - risk of becoming a high-capability tool-person PhD
summary: 'Product work is not automatically research, but it can become research material
  if every delivery loop has a reflection, abstraction, postmortem, and theory-extraction
  loop. The useful response to a product-oriented PhD lab is to build an Engineering
  Research OS: ADRs, failure postmortems, system requirement notes, experiment registry,
  technical-debt tracking, assumption logs, evaluation rubrics, deployment-constraint
  register, and a research-question backlog. The strategic boundary is to avoid becoming
  only the person who can debug, integrate, demo, and rescue projects; the product
  work must repeatedly compress into one main research identity around operational
  AI decision systems under real-world constraints.'
source_note_zh: 博士班如果被公司產品需求切碎，真正的突破不是逃離所有產品工作，而是把每個產品任務轉譯成工程知識資產：為什麼這個需求卡住、哪個系統邊界不清楚、哪個
  failure pattern 重複出現、哪些 trade-off 可以一般化、最後能不能形成自己的方法論。
human_note: ideas/2026-05-18-product-constrained-phd-engineering-research-os.md
assumptions:
- The current lab behaves more like a product-oriented or industry-facing PhD environment
  than a pure paper-first lab.
- Product work becomes research only when it is deliberately abstracted; delivery
  alone does not create research identity.
- Self-directed software engineering and systems engineering learning can be grounded
  in real product artifacts instead of only coursework.
- The user's existing strengths in AI systems, cybersecurity, OSINT, workflow observation,
  governance, and evidence-chain thinking can become a distinctive research wedge.
- The largest risk is not lack of effort, but becoming a high-capability tool-person
  PhD who completes many tasks without owning a problem space.
- A main axis is needed so company tasks, medical AI, cyber workflows, agent systems,
  and governance work all return to the same intellectual territory.
- Reflection, abstraction, postmortem, and theory extraction must be scheduled as
  real work, not left as a feeling after coding.
- 'Formal coursework can help, but the user''s immediate training loop should be artifact-first:
  architecture decisions, failure logs, requirements, tests, and evaluation boundaries.'
- AI-era tool novelty creates a dopamine trap; deep accumulation requires pursuing
  the same class of problems over multiple years.
evidence:
- '2026-05-18 user reflection: PhD research time is scarce because the advisor''s
  outside company often pulls students toward product work rather than research.'
- '2026-05-18 user proposal: embed software-engineering and systems-engineering course-like
  thinking directly into product coding and self-directed learning.'
- Existing brainstorming-lab records already emphasize problem definition, implementation
  friction, AI systems engineering, real-world deployment, governance, auditability,
  and AI security.
- The local repo practice already includes version-control discipline, claim boundaries,
  structured repo architecture, reproducibility checks, safety gates, context management,
  reviewer mindset, and Idea OS maturity scoring.
- Product lanes such as ASR plus LLM triage, medical workflow support, agent reliability,
  portal/checklist automation, and AI assurance repeatedly surface real deployment
  constraints rather than toy benchmark-only issues.
- Prior Idea OS records identify AI Systems Engineering for Real-world Deployment
  and AI System Security/Governance as stronger personal positioning than generic
  model training.
baseline:
- 'Delivery-only loop: build the requested product feature, fix bugs, demo it, then
  move on without extracting a reusable lesson.'
- 'Company-task queue: allow external product requests to define the entire PhD identity.'
- 'Course-shopping loop: collect software engineering vocabulary without applying
  it to current artifacts.'
- 'Tool novelty loop: chase new models, frameworks, agents, or terminals while losing
  the main research thread.'
- 'Pure resentment loop: treat product work only as stolen research time and miss
  the field evidence inside it.'
- 'Generic portfolio loop: build many demos but no signature method, framework, benchmark,
  or worldview.'
metrics:
- Each substantial product feature creates at least one ADR or decision note naming
  the alternatives, trade-off, chosen boundary, and rollback condition.
- 'Each serious failure creates a short postmortem: trigger, impact, root cause, missing
  signal, fix, prevention, and research question.'
- Every product-to-research extraction card names one system constraint, one repeated
  failure pattern, one possible generalized principle, and one smallest test.
- Weekly review distinguishes delivery output from extracted engineering knowledge.
- 'Monthly output includes at least one reusable artifact: framework, evaluation rubric,
  architecture pattern, benchmark fixture, failure taxonomy, or governance checklist.'
- Quarterly review checks whether the work still supports one main axis instead of
  expanding into unrelated tasks.
- 'A new product request is mapped to a research lens before implementation begins:
  reliability, human workflow, uncertainty, governance, latency, auditability, or
  deployment constraint.'
- The user can explain the same project as product value, engineering lesson, research
  question, and career evidence.
insights:
- Product work is not the enemy of research; unabstracted product work is.
- A product-oriented PhD should not blindly imitate a pure-theory PhD schedule.
- The scarce resource is not task volume but abstraction time and intellectual territory.
- Being useful to a company can hide the risk of becoming useful but intellectually
  unowned.
- 'Research identity comes from a worldview: which failures you notice, which trade-offs
  you measure, and which constraints you repeatedly formalize.'
- Software engineering and systems engineering are not only courses; they are habits
  of documenting decisions, interfaces, state, failure modes, verification, and operations.
- A real product is a field site for AI systems research when its messy constraints
  are captured instead of erased.
- The deeper skill being built is decision ability in high-pressure, ambiguous, multi-stakeholder
  systems.
- Deep accumulation zones matter more than short bursts of learning many unrelated
  tools.
