role: idea
value:
  impact: high
  feasibility: high
first_principle:
  scarce_resource: abstraction time and intellectual territory, not raw product-task
    throughput
  core_object: a repeatable product-work-to-research-methodology conversion loop
  not_the_core:
  - doing every company task faster
  - avoiding all product work
  - collecting course vocabulary without artifact practice
  - chasing every new AI tool
  - treating demos as research evidence by default
  core_question: How can a product-constrained PhD turn messy delivery work into a
    coherent research identity and systems-engineering methodology?
  smallest_useful_unit: one Product-to-Research Extraction Card written after a real
    feature, bug, demo, or failure.
  decision_boundary: Use product work as a research field site only when the resulting
    artifact names a constraint, trade-off, failure pattern, evaluation hook, and
    possible generalized lesson.
main_axis_candidates:
- Human-in-the-loop AI decision systems under real-world constraints
- Operational AI systems for high-stakes environments
- AI-assisted decision workflows with governance and uncertainty control
- Evidence-centric AI systems for review, triage, and operational assurance
engineering_research_os:
  input_events:
  - product feature request
  - bug or outage
  - demo pressure
  - stakeholder disagreement
  - deployment limitation
  - latency or reliability failure
  - AI model, prompt, agent, or workflow drift
  core_artifacts:
  - name: Architecture Decision Record
    purpose: capture a technical choice, alternatives, trade-offs, boundary, and rollback
      condition
  - name: Failure Postmortem
    purpose: turn bugs and breakdowns into recurring failure patterns and prevention
      mechanisms
  - name: System Requirement Note
    purpose: separate stakeholder need, functional requirement, nonfunctional constraint,
      and verification path
  - name: Assumption Log
    purpose: record what the system currently believes about users, data, models,
      runtime, and workflow
  - name: Evaluation Rubric
    purpose: make success measurable beyond demo completion
  - name: Deployment Constraint Register
    purpose: track latency, compute, privacy, governance, integration, and human-review
      limits
  - name: Research Question Backlog
    purpose: store generalized questions extracted from product friction
  - name: Technical Debt Register
    purpose: separate speed debt, architecture debt, data debt, and governance debt
  loops:
  - 'delivery loop: implement the requested product increment'
  - 'reflection loop: record what was hard, ambiguous, slow, risky, or repeated'
  - 'abstraction loop: translate the event into a system pattern, trade-off, or failure
    mode'
  - 'theory-extraction loop: decide whether the pattern can become a framework, evaluation,
    paper seed, or reusable engineering method'
product_to_research_translation:
- product_problem: LLM context explosion
  research_lens: long-context memory management and context-governance failure
- product_problem: agent drift
  research_lens: agent reliability, traceability, and stop-condition design
- product_problem: questionnaire too long
  research_lens: cognitive load modeling and adaptive questioning
- product_problem: ASR latency
  research_lens: streaming inference, edge optimization, and degraded-mode operation
- product_problem: physician distrust of AI
  research_lens: trust calibration, explainability boundaries, and human-in-the-loop
    review
- product_problem: triage flow design
  research_lens: adaptive decision systems under uncertainty
- product_problem: kiosk or device integration
  research_lens: cyber-physical AI systems and operational resilience
- product_problem: reviewer fatigue
  research_lens: human-AI collaboration and workload-aware evaluation
- product_problem: multi-model orchestration
  research_lens: distributed AI workflow reliability and observability
pressure_test:
  setting: One week is dominated by company product tasks, a demo, and bug fixes,
    leaving almost no protected paper-writing block.
  expected_failure_mode: The user produces many commits and features but no research
    artifact, no extracted pattern, and no clearer thesis identity.
  smallest_observable_test: After one product feature or failure, write a one-page
    Product-to-Research Extraction Card.
  pass_metric: The card names the product event, affected actor, system constraint,
    repeated failure pattern, decision trade-off, possible generalized principle,
    and one smallest next test.
  revise_or_kill_signal: If three consecutive product events cannot produce a meaningful
    card, the work is probably too operational or too disconnected from the user's
    research axis.
deep_accumulation_zones:
- uncertainty-aware AI workflows
- adaptive questioning systems
- human trust calibration
- operational AI governance
- agent memory and context reliability
- AI triage and evidence-centric review systems
- software/system engineering methods for real-world AI deployment
