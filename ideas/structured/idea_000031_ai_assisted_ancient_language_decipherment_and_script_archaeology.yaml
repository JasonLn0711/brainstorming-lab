status: execution_ready
problem_statement:
  raw: Given ancient languages and scripts with damaged text, scarce corpora, uncertain
    segmentation, missing bilingual anchors, and unclear grounding, study how language
    models, deep learning, multimodal models, graphs, and self-supervised methods
    can assist restoration, transcription, attribution, translation, and pattern discovery
    without pretending to have fully deciphered an unknown civilization.
  normalized: Given damaged or partially understood ancient scripts, optimize evidence-grounded
    restoration and structure discovery under constraints of sparse data, missing
    parallel corpus, unknown tokenization, domain-expert uncertainty, archaeological
    context, image degradation, cultural grounding, and high hallucination risk.
  structure:
    given: damaged or partially understood ancient scripts and inscriptions
    optimize: evidence-grounded restoration, transcription, attribution, translation
      assistance, and hidden-structure discovery
    constraints:
    - sparse corpus
    - missing or incomplete parallel corpus
    - unknown token segmentation
    - uncertain reading direction
    - image or inscription damage
    - lack of semantic grounding
    - domain expert disagreement
    - archaeological context dependence
    - hallucination and overclaim risk
summary: 'AI is already being used in ancient-text research: Pythia restores damaged
  ancient Greek inscriptions; Ithaca extends this to restoration, geographical attribution,
  and dating; Aeneas contextualizes ancient texts with generative neural networks;
  Fabricius uses machine learning to support Egyptian hieroglyph work; neural machine
  translation has been tested for Akkadian; Markov and entropy methods have been used
  on the Indus script; and machine learning helped read parts of Herculaneum scrolls.
  The harder frontier is not ordinary translation but low-information structure reconstruction:
  detecting patterns, possible grammar, sign co-occurrence, provenance, material context,
  and whether a symbol system even encodes natural language.'
source_note_zh: AI 解古語言目前最有價值的地方不是宣稱『模型破解古文明』，而是把破損、低資源、無 ground truth 的古文字問題改寫成 evidence
  reconstruction：修復、轉寫、對齊、歸因、年代推測、context retrieval、uncertainty reporting。
human_note: ideas/2026-05-18-ai-assisted-ancient-language-decipherment.md
assumptions:
- Known or partially known languages with digitized corpora are suitable for supervised
  or self-supervised restoration, translation assistance, and attribution.
- Undeciphered scripts such as Linear A, Indus Script, Rongorongo, or Proto-Elamite
  cannot be solved by a generic LLM prompt because the model lacks ground truth, segmentation,
  phonology, and semantic anchors.
- 'The Rosetta Stone lesson is computationally important: bilingual or multilingual
  anchors create alignment evidence similar in spirit to a parallel corpus.'
- For undeciphered scripts, AI should first behave like a pattern-analysis and hypothesis-ranking
  tool, not a confident translator.
- Multimodal context matters because inscriptions are not isolated strings; material,
  site, iconography, date, social role, object type, and neighboring artifacts can
  change interpretation.
- The right output is a ranked set of hypotheses with evidence, uncertainty, and expert-review
  hooks.
- 'This area shares a first-principles structure with cyber evidence reconstruction:
  both infer hidden structure from incomplete traces.'
evidence:
- '2026-05-18 user question and synthesis: AI is increasingly used for ancient languages
  and unknown scripts, but the hardest cases are not direct translation; they are
  pattern archaeology under missing ground truth.'
- 'Pythia paper: Assael, Sommerschield, and Prag present a deep-learning model for
  restoring damaged ancient Greek inscriptions; the arXiv abstract reports PHI-ML
  training and top-20 restoration hypotheses.'
- 'DeepMind Ithaca blog: Ithaca restores missing text, predicts location, and helps
  date ancient Greek inscriptions; DeepMind reports 62% restoration accuracy, 71%
  location accuracy, and dating within 30 years of ground-truth ranges.'
- 'Nature 2025 Aeneas article: introduces a generative neural network for contextualizing
  ancient texts and identifying meaningful historical connections beyond literal matches.'
- 'Google Fabricius post: Fabricius uses machine learning to help collate, catalogue,
  understand, and learn Egyptian hieroglyphs.'
- 'PNAS Nexus Akkadian NMT paper: NLP/CNN methods translated Akkadian from cuneiform
  Unicode glyphs or transliteration to English and proposed human-in-the-loop improvement
  as more digitized texts appear.'
- 'Indus Script Markov-model work: computational models can analyze undeciphered scripts
  by measuring sequence structure and predicting missing signs, while not conclusively
  proving natural-language encoding.'
- 'Nature 2024 Herculaneum scroll report: Vesuvius Challenge researchers used machine-learning
  algorithms on scans of rolled-up papyri to reveal Greek writing in charred scrolls.'
baseline:
- Treat every ancient-script AI headline as if AI has independently deciphered a lost
  language.
- Prompt a general LLM to translate unknown signs without corpus, grammar, phonology,
  or grounding.
- Use only text strings while ignoring artifact image, material, site, date, object
  type, and cultural context.
- Produce one confident reading instead of ranked hypotheses with uncertainty.
- Conflate restoration of damaged known-language text with decipherment of an unknown
  writing system.
- Ignore expert disagreement and archaeological provenance.
metrics:
- 'The workflow separates tasks: image enhancement, sign segmentation, transcription,
  restoration, attribution, dating, translation assistance, context retrieval, and
  undeciphered-script structure analysis.'
- For known-language restoration, evaluation reports character/token accuracy, top-k
  candidate recall, and expert review outcomes.
- For undeciphered scripts, evaluation reports structure metrics such as entropy,
  n-gram/Markov predictability, sign co-occurrence, positional constraints, directionality
  hypotheses, and comparison against known linguistic and non-linguistic symbol systems.
- Every model output includes uncertainty and evidence provenance rather than a single
  authoritative translation.
- A small fixture compares one known-script restoration task with one undeciphered-script
  pattern-analysis task to prevent category confusion.
- A multimodal record links sign sequence, artifact image, archaeological site, material,
  date range, object type, and bibliography.
insights:
- Ancient-language AI is a low-information inference problem, not merely an NLP benchmark.
- 'The key bottleneck is grounding: the model must connect signs to sound, word, object,
  institution, ritual, person, place, or event.'
- A bilingual inscription is not just a historical luck event; it is an alignment
  dataset.
- LLMs are strong when there is latent statistical structure in known corpora, but
  weak when the corpus is tiny and the sign system is not grounded.
- For unknown scripts, AI can still be valuable before decipherment by showing what
  hypotheses are impossible, underdetermined, or statistically plausible.
- 'The field needs calibrated historical copilot systems: candidate generation, retrieval,
  anomaly detection, and uncertainty display, with domain experts making the interpretive
  jump.'
- 'This is structurally close to forensic and cybersecurity reasoning: reconstruct
  a hidden system from fragmentary traces, preserve uncertainty, and avoid overclaiming.'
- The research opportunity is a multimodal evidence graph for ancient scripts, not
  a magical translator.
