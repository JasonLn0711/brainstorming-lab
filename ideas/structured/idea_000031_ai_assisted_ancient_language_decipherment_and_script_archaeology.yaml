role: idea
value:
  impact: high
  feasibility: medium
first_principle:
  scarce_resource: grounded evidence for meaning
  core_object: hidden linguistic or symbolic structure in damaged, sparse, or undeciphered
    ancient records
  not_the_core:
  - headline-style AI decipherment
  - asking a general chatbot to translate unknown symbols
  - single-answer translation
  - ignoring archaeologists and epigraphists
  - treating all symbol systems as natural language
  smallest_useful_unit: one evidence-preserving benchmark card that contrasts a known-language
    restoration task with an undeciphered-script pattern-analysis task
  decision_boundary: Use AI to generate, rank, test, and document hypotheses; do not
    claim decipherment without external grounding, expert validation, and converging
    evidence.
research_tracks:
  known_language_restoration:
    examples:
    - 'Ancient Greek inscriptions: Pythia, Ithaca, Aeneas'
    - Akkadian cuneiform translation assistance
    - Herculaneum scroll ink/text detection
    model_role: restore damaged text, rank candidate completions, attribute location/date,
      and support expert reading
  ancient_egyptian_and_hieroglyphs:
    examples:
    - Fabricius
    - Rosetta Stone as alignment anchor
    model_role: support collation, cataloguing, sign recognition, learning, and translation
      workflow rather than replacing Egyptologists
  undeciphered_script_analysis:
    examples:
    - Indus Script
    - Linear A
    - Rongorongo
    - Proto-Elamite
    model_role: analyze entropy, sign order, co-occurrence, directionality, positional
      patterns, repetition, and candidate grammar
  multimodal_archaeology:
    inputs:
    - artifact image
    - sign sequence
    - site
    - material
    - object type
    - date range
    - iconography
    - bibliography
    model_role: connect text hypotheses with archaeological context and evidence graph
      retrieval
  graph_based_civilization_modeling:
    nodes:
    - person
    - place
    - deity
    - dynasty
    - trade route
    - artifact
    - inscription
    - sign variant
    model_role: represent historical context and test whether candidate readings fit
      broader networks
safety_and_claim_boundary:
  safe_claims:
  - AI can help restore, transcribe, classify, retrieve, contextualize, and generate
    hypotheses.
  - AI can accelerate expert work on known or partially understood scripts.
  - AI can analyze structure in undeciphered scripts without translating them.
  unsafe_or_overstated_claims:
  - AI has independently cracked unknown ancient languages.
  - A model output is a confirmed translation without expert review.
  - Statistical language-like structure proves natural-language encoding.
  - A generic LLM can solve undeciphered scripts without new evidence.
pressure_test:
  setting: A student wants to test AI on the Indus Script after reading headlines
    about AI decoding ancient languages.
  expected_failure_mode: The project becomes a fake translation demo because there
    is no ground-truth language, tokenization, phonology, or bilingual anchor.
  smallest_observable_test: 'Build a non-translation analysis card: corpus size, sign
    inventory, sequence length distribution, n-gram predictability, sign-position
    constraints, directionality hypotheses, comparison to known language and non-language
    symbol systems, and uncertainty notes.'
  decision_metric: Pass if the output avoids translation claims and instead produces
    a ranked evidence map showing which structural hypotheses are plausible, unsupported,
    or falsified.
