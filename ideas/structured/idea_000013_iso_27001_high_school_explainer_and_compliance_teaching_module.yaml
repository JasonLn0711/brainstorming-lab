  reader to summarize ISO/IEC 27001 back in five bullet points.
- Create a short quiz fixture with questions on ISMS, scope, controls, certification,
  version timeline, and real-world cases.
- Create an LDO procurement-review worksheet with the 10 product-specific ISO 27001
  questions and a column for evidence links / certificate-scope notes.
- If useful for planning sync, promote only the title, ID, status, canonical path,
  and one next test.
