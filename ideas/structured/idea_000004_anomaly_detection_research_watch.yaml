problem_statement:
  raw: Given noisy activity logs, identify anomalies worth human review under limited
    reviewer time and uncertain ground truth.
  normalized: Given noisy activity logs, identify anomalies worth human review under
    limited reviewer time and uncertain ground truth, optimize review-worthy candidate
    discovery under constraints of limited reviewer time, uncertain ground truth.
  structure:
    given: noisy activity logs, identify anomalies worth human review under limited
      reviewer time and uncertain ground truth
    optimize: review-worthy candidate discovery
    constraints:
    - limited reviewer time
    - uncertain ground truth
summary: A research-watch idea for turning anomaly detection candidates into reviewable
  evidence packets instead of opaque alerts.
assumptions:
- The system should optimize for reviewable anomalies, not maximum alert volume.
- Ground truth may be incomplete, so the workflow must preserve uncertainty.
- The first test can use synthetic or public non-sensitive fixtures.
insights:
- This is a bridge between cybersecurity review assist and broader evidence-routing
  ideas.
