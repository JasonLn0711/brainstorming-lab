    raw_transcript_lines:
      - "16:14 吳冠廷: https://sakana.ai/fugu-beta/"
      - "21:38 吳冠廷: 跟 Sakana AI 提出申請了XD"
      - "21:38 吳冠廷: 希望會通過"
      - "21:38 吳冠廷: 我研究了一下覺得還滿有意思的"
      - "21:39 吳冠廷: 不愧是能去 ICLR 的題目"
      - "21:39 吳冠廷: GPT-5.5-Thinking (heavy) 的整理如下"
      - "現有類似架構確實很多。AutoGen 早已是可建立多 agent、讓 agent 彼此對話解任務的框架；LangGraph 也提供可客製化的單 agent、多 agent、階層式控制流程；Mixture-of-Agents 則已經用多個 LLM 分層產生與改寫答案。換言之，「planner / worker / verifier」、「multi-agent debate」、「self-refine」、「多模型集成」這些元素本身都不是新東西。([Microsoft][1])"
      - "Fugu / Conductor 比較值得注意的地方，是它不是單純由人手寫一個固定流程，而是訓練一個小模型去學會「如何管理其他模型」。Sakana 的 Conductor paper 說它用 reinforcement learning 訓練一個 7B conductor，讓它決定要呼叫哪個 agent、給什麼子任務、哪些前文要放進 context，而且簡單問題可以只問一個模型，困難 coding 問題則會自動組成 planner、coder、verifier 類型的 pipeline。這點和一般寫死的 LangGraph / AutoGen workflow 不同。([Sakana AI][2])"
      - "第二個差異是，它把「模型池協調」當成主要能力，而不是把單一模型本身變強。Conductor 論文聲稱它可以在 open-source 與 closed-source worker LLM pool 上學習協調策略，並且透過 randomized agent pools 適應不同可用模型集合；Fugu 產品頁也強調它會動態協調 GPT、Gemini、Claude 等 frontier foundation models，而不是要求使用者自己切換 API 或手動設計工作流。([arXiv][3])"
      - "第三個才是你貼的那段：recursive test-time scaling。它允許 conductor 把「自己」也選為 worker，讀取上一輪團隊輸出，判斷失敗點，再啟動修正流程。這和普通的「再想一次」不同；普通 self-refine 是固定模板，例如先回答、再批判、再修正。Fugu 的說法是：遞迴本身進入協調器的 action space，由 conductor 決定要不要把自己再次納入工作流程，因此「遞迴深度」變成推理時計算量的一個調節軸。([Sakana AI][4])"
      - "所以我會這樣分級："
      - "不特別的部分：多 agent、worker-verifier、self-reflection、recursive loop、model ensemble，這些都已有大量前例。任何熟悉 LangGraph、AutoGen、DSPy、CrewAI 或手寫 agent scaffold 的人，都可以做出某種弱版本。"
      - "中度特別的部分：它不是手刻流程，而是訓練一個 coordinator / conductor 來學 workflow selection、model selection、context allocation 與 subtask prompting。這比較接近「學會 prompt engineer / project manager」的小模型。"
      - "真正有研究價值的部分：如果它在固定成本、固定 token budget、未見過的任務與未見過的模型池中，仍然能穩定勝過人類手寫 agent workflow，那就有意義。這表示 agent architecture 從「人工設計 pipeline」走向「learned orchestration policy」。"
      - "但我不會把它視為完全顛覆性的東西。原因是：第一，遞迴推理本身很容易變成昂貴的 loop；第二，若沒有外部工具、ground truth verifier 或 domain-specific evaluation，遞迴可能只是把錯誤包裝得更漂亮；第三，目前 Fugu 的產品頁展示 benchmark 表現，但這種 multi-model system 是否真的優於單一 frontier model，必須做 cost-normalized、latency-normalized、independent evaluation 才能判斷。Fugu 頁面確實列出 GPQA、LiveCodeBench、SWEPro 等分數，但也註明其中一些評估 scaffold 與比較基準有特定設定，不能直接當成普遍結論。([Sakana AI][4])"
      - "我會給它的評價是：概念本身不是全新，但把「協調策略」模型化、訓練化、遞迴化，這點是有研究價值的。它不是「新的 agent 概念」，而比較像是把 agent engineering 從 prompt/template/programming framework，推向一種可學習的 meta-control policy。"
      - "對你而言，最值得借鑑的不是「做很多 agent」，而是這個問題意識：在醫學 AI 或自動研究流程裡，能不能訓練或至少系統性搜尋一個 conductor，讓它決定何時呼叫 radiologist-style reviewer、statistical reviewer、literature reviewer、code executor、error checker，而不是每次都用固定 pipeline。這比單純堆 agent 更有研究價值。"
      - "[1]: https://www.microsoft.com/en-us/research/project/autogen/?utm_source=chatgpt.com \"AutoGen - Microsoft Research\""
      - "[2]: https://sakana.ai/learning-to-orchestrate/ \"Learning to Orchestrate Agents in Natural Language with the Conductor\""
      - "[3]: https://arxiv.org/abs/2512.04388 \"[2512.04388] Learning to Orchestrate Agents in Natural Language with the Conductor\""
      - "[4]: https://sakana.ai/fugu-beta/ \"Sakana Fugu: A Multi-Agent Orchestration System as a Foundation Model\""
      - "21:40 吳冠廷: 建立了一個 7B 小模型來協調跟調度"
