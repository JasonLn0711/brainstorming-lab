status: execution_ready
problem_statement:
  raw: Can a learned or systematically searched conductor choose better medical AI
    and automated research workflows than a fixed multi-agent pipeline?
  normalized: Given heterogeneous medical AI and automated research tasks, optimize
    orchestration policy selection under constraints of cost, latency, verification
    quality, domain safety, and generalization to unseen task and model pools.
  structure:
    given: heterogeneous medical AI and automated research tasks
    optimize: orchestration policy selection
    constraints:
    - cost budget
    - latency budget
    - verification quality
    - domain safety
    - generalization to unseen task and model pools
summary: The research angle is not simply adding more agents. The useful test is whether
  a learned or searched conductor can choose between a cheap single-model path, a
  fixed specialist-review pipeline, tool-backed verification, and recursive re-review
  for medical AI or automated research tasks.
first_principle:
  scarce_resource: verified orchestration decisions under cost, latency, safety, and
    reviewer-capacity limits
  not_the_core:
  - more agents
  - a prettier recursive loop
  - benchmark wins without cost or latency normalization
  core_question: Can a learned or searched conductor choose the right workflow depth
    better than a fixed human-written pipeline?
  canonical_home: brainstorming-lab owns detailed thinking, transcript evidence, assumptions,
    baselines, metrics, and kill criteria.
  planning_boundary: planning-everything-track should keep only status, capacity impact,
    canonical path, and the next decision gate.
  execution_boundary: No standalone project repo or model-training sprint until primary-source
    verification, hardware feasibility, and a tiny no-real-patient-data fixture are
    defined.
  smallest_next_test: Verify primary sources and lab-hardware feasibility, then specify
    a tiny fixture set comparing single-model, fixed-pipeline, self-refine, and conductor-policy
    paths.
  kill_condition: Park or kill the idea if it cannot beat a fixed specialist pipeline
    after cost, latency, error-detection, and abstention normalization.
assumptions:
- Generic planner/worker/verifier loops, debate, self-refine, and model ensembles
  are baselines, not novelty.
- The possible contribution is a meta-control policy for workflow selection, model
  selection, context allocation, and subtask prompting.
- Recursive review is useful only when grounded by tools, fixtures, ground-truth checks,
  or domain-specific verifiers.
- Without cost-normalized and latency-normalized evaluation, multi-agent benchmark
  gains are not enough evidence.
- The first experiment can avoid real patient data by using synthetic fixtures or
  public benchmark-style tasks.
evidence:
