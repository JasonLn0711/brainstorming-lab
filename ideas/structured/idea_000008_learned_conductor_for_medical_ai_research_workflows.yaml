problem_statement:
  raw: "Can a learned or systematically searched conductor choose better medical AI and automated research workflows than a fixed multi-agent pipeline?"
  normalized: "Given heterogeneous medical AI and automated research tasks, optimize orchestration policy selection under constraints of cost, latency, verification quality, domain safety, and generalization to unseen task and model pools."
  structure:
    given: "heterogeneous medical AI and automated research tasks"
    optimize: "orchestration policy selection"
    constraints:
      - "cost budget"
      - "latency budget"
      - "verification quality"
      - "domain safety"
      - "generalization to unseen task and model pools"
summary: "The research angle is not simply adding more agents. The useful test is whether a learned or searched conductor can choose between a cheap single-model path, a fixed specialist-review pipeline, tool-backed verification, and recursive re-review for medical AI or automated research tasks."
first_principle:
  scarce_resource: "verified orchestration decisions under cost, latency, safety, and reviewer-capacity limits"
  not_the_core:
    - "more agents"
    - "a prettier recursive loop"
    - "benchmark wins without cost or latency normalization"
  core_question: "Can a learned or searched conductor choose the right workflow depth better than a fixed human-written pipeline?"
  canonical_home: "brainstorming-lab owns detailed thinking, transcript evidence, assumptions, baselines, metrics, and kill criteria."
  planning_boundary: "planning-everything-track should keep only status, capacity impact, canonical path, and the next decision gate."
  execution_boundary: "No standalone project repo or model-training sprint until primary-source verification, hardware feasibility, and a tiny no-real-patient-data fixture are defined."
  smallest_next_test: "Verify primary sources and lab-hardware feasibility, then specify a tiny fixture set comparing single-model, fixed-pipeline, self-refine, and conductor-policy paths."
  kill_condition: "Park or kill the idea if it cannot beat a fixed specialist pipeline after cost, latency, error-detection, and abstention normalization."
assumptions:
  - "Generic planner/worker/verifier loops, debate, self-refine, and model ensembles are baselines, not novelty."
  - "The possible contribution is a meta-control policy for workflow selection, model selection, context allocation, and subtask prompting."
  - "Recursive review is useful only when grounded by tools, fixtures, ground-truth checks, or domain-specific verifiers."
  - "Without cost-normalized and latency-normalized evaluation, multi-agent benchmark gains are not enough evidence."
  - "The first experiment can avoid real patient data by using synthetic fixtures or public benchmark-style tasks."
evidence:
  - "User-provided GPT conversation summarizing AutoGen, LangGraph, Mixture-of-Agents, Sakana Conductor, and Fugu; not independently verified in this turn."
  - "Conversation claim: Conductor is framed as a small learned coordinator that chooses agents, subtasks, context, and recursive calls."
  - "Conversation claim: Fugu emphasizes dynamic coordination across frontier models and recursive test-time scaling."
  - "Official Sakana Fugu beta page verified on 2026-05-05: Fugu is described as a small model that coordinates pools of frontier foundation models, learns adaptive collaboration patterns, exposes an OpenAI-compatible API, and can use recursive test-time scaling."
  - "Existing repo themes include healthcare AI triage and workflow optimization."
  - "LINE conversation with 吳冠廷 on 2026-05-04: he shared the Fugu beta link, said he applied to Sakana AI, and judged the topic interesting and ICLR-level."
  - "LINE conversation claim: a 7B-scale coordinator model may be trainable with the lab's hardware."
baseline:
  - "Single frontier model with a fixed prompt."
  - "Hand-written LangGraph or AutoGen-style planner/specialist/verifier pipeline."
  - "Fixed self-refine template: answer, critique, revise."
  - "Static model ensemble or majority vote."
metrics:
  - "Task success or accuracy on held-out fixtures."
  - "Cost per solved task."
  - "Latency per solved task."
  - "Escalation precision: easy cases stay cheap, hard cases receive deeper review."
  - "Error detection rate before final answer."
  - "Calibration of not-enough-evidence and abstention decisions."
  - "Generalization to unseen task types or changed model pools."
insights:
  - "Research value comes from policy learning or policy search, not from the number of agents."
  - "The conductor should decide when to call radiology-style review, statistical critique, literature review, code execution, error checking, or recursive re-review."
  - "A medical AI framing needs evidence gates and safety boundaries; it must not imply autonomous clinical deployment."
  - "The smallest useful artifact is a conductor-policy simulator and evaluation protocol before a full agent framework."
  - "吳冠廷's hardware note makes the near-term research path more practical: start with a 7B-scale conductor or policy-search simulator rather than assuming only frontier-model orchestration."
  - "The collaboration context matters: 吳冠廷 has already applied to Sakana AI/Fugu and may become a useful person to compare notes with if access is approved."
