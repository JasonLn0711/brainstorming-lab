baseline:
- Single frontier model with a fixed prompt.
- Hand-written LangGraph or AutoGen-style planner/specialist/verifier pipeline.
- 'Fixed self-refine template: answer, critique, revise.'
- Static model ensemble or majority vote.
metrics:
- Task success or accuracy on held-out fixtures.
- Cost per solved task.
- Latency per solved task.
- 'Escalation precision: easy cases stay cheap, hard cases receive deeper review.'
- Error detection rate before final answer.
- Calibration of not-enough-evidence and abstention decisions.
- Generalization to unseen task types or changed model pools.
- Valid proof-artifact rate under a fixed time, command, and token budget.
- Checkpoint quality before long exploration loops.
- 'Context-efficiency ratio: useful uncertainty reduction per token and command.'
- State-ledger retention across context compaction.
- Preservation of proof obligations, forbidden actions, and hidden assumptions after
  summarization.
- Drift rate after one or more compaction boundaries.
- 'Proof-first plan integrity: whether a plan item can be marked complete only when
  its proof artifact or explicit failure report exists.'
- 'Exploration inertia: commands/tokens spent after the current best hypothesis stops
  reducing uncertainty.'
insights:
- Research value comes from policy learning or policy search, not from the number
  of agents.
- The conductor should decide when to call radiology-style review, statistical critique,
  literature review, code execution, error checking, or recursive re-review.
- A medical AI framing needs evidence gates and safety boundaries; it must not imply
  autonomous clinical deployment.
- The smallest useful artifact is a conductor-policy simulator and evaluation protocol
  before a full agent framework.
- '吳冠廷''s hardware note makes the near-term research path more practical: start with
  a 7B-scale conductor or policy-search simulator rather than assuming only frontier-model
  orchestration.'
- 'The collaboration context matters: 吳冠廷''s Sakana AI/Fugu beta access is now approved,
  so the old application-result gate is closed.'
- 'idea_000019 is the engineering scaffold counterpart: it treats AI Scientist as
  an upstream research engine and Codex CLI as the governed orchestration, logging,
  claim-review, and human-gate layer.'
- Sakana/Fugu access is a collaboration and evaluation opportunity, not an execution
  mandate; useful testing must be private, bounded, cost-aware, latency-aware, and
  verification-aware.
- 吳冠廷's suggestion that Jason may fit Sakana AI's biologically inspired AI direction
  strengthens the career/research-positioning signal, but should not become a job-application
  sprint unless a separate career lane is opened.
- 'The API handoff makes the smallest useful next step practical: a private, defensive,
  low-token fixture that tests orchestration value without publishing beta outputs
  or generating offensive security instructions.'
- 'The fugu-ultra Project II stress test sharpens the evaluation question: process
  competence is not enough. Learned orchestration must produce valid proof artifacts
  under explicit budgets, not only conduct impressive exploration.'
- 'The run suggests a likely failure mode for recursive or long-agent orchestration:
  context movement can become the scarce resource. A conductor should decide when
  to stop exploring, summarize state, switch tools, ask for human input, or return
  an honest failure report.'
- The useful research object is not "Fugu is good or bad"; it is a budgeted decision
  policy for when deeper agentic work is worth the marginal cost.
- 'The GPT follow-up analysis clarifies why context compaction matters: it is not
  only an implementation detail but the memory layer that allows long-horizon task
  execution, and it is also the failure surface where hidden assumptions can disappear.'
- Goal-directed persistence may be the more important near-term agent capability than
  raw coding skill. The fugu-ultra trace should therefore be evaluated by state preservation,
  operational consistency, and proof production, not only by whether it emits plausible
  technical steps.
- 'The capability boundary should stay explicit: the trace suggests high-grade workflow
  autocomplete plus reasoning scaffolding, but does not prove a true OS or exploitation
  world model, original vulnerability-class discovery, or stable long-term memory.'
- 'The continuation sharpens the long-agent lesson: an honest failure report is useful,
  but not equivalent to success. The conductor must distinguish process progress,
  validation failure, and proof artifacts as separate states.'
- Plan-completion semantics matter. If the UI marks broad steps complete while the
  central proof artifact is absent, the orchestration layer needs a proof-first critic
  that blocks false closure.
- The combined pasted records crossed 9.8M reported total tokens without Project II
  success, making context allocation and stopping policy first-class research variables.
