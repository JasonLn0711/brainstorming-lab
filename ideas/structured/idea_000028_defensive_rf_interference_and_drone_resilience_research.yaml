problem_statement:
  raw: Viral videos about blocking Bluetooth or drone signals are usually framed as
    gadget tricks, but the deeper research object is how wireless systems fail under
    interference, spoofing, protocol abuse, and contested spectrum, and how defenders
    can observe, classify, and build resilience without creating illegal or unsafe
    jamming behavior.
  normalized: Given consumer wireless systems, GNSS-dependent drones, and viral RF-interference
    claims, optimize defensive RF understanding, anomaly detection, and communication
    resilience under constraints of radio law, public safety, no unauthorized transmission,
    shared spectrum, incomplete ground truth, noisy environments, protocol diversity,
    and human review burden.
  structure:
    given: consumer wireless systems, GNSS-dependent drones, and viral RF-interference
      claims
    optimize: defensive RF understanding, anomaly detection, and communication resilience
    constraints:
    - radio law and licensing
    - public safety
    - no unauthorized transmission
    - shared spectrum externalities
    - incomplete ground truth
    - noisy real-world RF environments
    - Bluetooth, BLE, Wi-Fi, Zigbee, cellular, and GNSS protocol diversity
    - drone firmware and fail-safe variation
    - human review burden
    - safety boundary between education and operational interference
summary: 'Treat jammer curiosity as an entry point into defensive wireless security,
  RF forensics, and resilient autonomous systems. A jammer is conceptually a device
  or behavior that intentionally degrades wireless communication by raising noise,
  creating confusing signals, or exploiting protocol assumptions, but the useful research
  direction is not building jammers. The durable direction is a safe taxonomy and
  evidence workflow for distinguishing RF noise, protocol-layer disruption, spoofing,
  natural interference, device failure, and operator error, especially for Bluetooth/BLE/Wi-Fi/GNSS
  and drone systems. The project should stay defensive: passive spectrum observation,
  shielded or authorized test discussion, wireless IDS, GNSS resilience, anti-drone
  sensing, protocol robustness, and RF incident review.'
human_note: ideas/2026-05-18-defensive-rf-interference-drone-resilience.md
assumptions:
- Many social-media "block Bluetooth" clips are exaggerated demonstrations of BLE
  spam, Bluetooth flooding, Wi-Fi management-frame abuse, or local RF interference,
  not reliable total signal denial.
- Bluetooth and Wi-Fi share crowded ISM spectrum, but frequency hopping, adaptive
  rates, retransmission, and protocol behavior make total denial harder than viral
  videos suggest.
- Small boards such as ESP32-like devices are more plausible for protocol-layer experiments
  or spam-like behavior than for stable wide-area RF denial.
- True RF jamming is legally and ethically high risk because spectrum is shared and
  interference can affect bystanders, medical devices, IoT, navigation, and emergency
  workflows.
- GPS/GNSS receivers are vulnerable to nearby interference because satellite signals
  arrive extremely weak at ground level, but discussing this should stay at the conceptual
  risk and resilience level.
- 'Drone interference is multi-channel: GNSS, control link, video downlink, telemetry,
  and onboard sensing can fail differently, and fail-safe behavior depends on the
  drone model and firmware.'
- High-value drone defense is not only emitting RF energy; it also needs detection,
  identification, tracking, policy, and safety-aware response.
- Many mature wireless-security questions are about systems trusting the wrong signal,
  not only about stronger or weaker energy.
- Defensive learning can use passive receive-only observation, public documentation,
  synthetic traces, shield-box-only experiments, and incident-taxonomy work without
  unauthorized transmission.
