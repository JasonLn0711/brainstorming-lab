baseline:
- Treat jammer videos as gadget entertainment and either imitate them or dismiss them
  without extracting the wireless-security lesson.
- Explain jamming only as "high power electromagnetic waves" and miss protocol-layer
  disruption, receiver sensitivity, distance, timing, and trust assumptions.
- Focus on active interference instead of passive detection, resilience, forensics,
  and legal boundaries.
- Discuss drone jamming as if drones simply fall from the sky, ignoring fail-safe
  behavior such as hover, return-to-home, auto-land, or degraded attitude mode.
- Treat all RF failures as malicious jamming when natural interference, congestion,
  device bugs, multipath, operator error, and bad configuration may explain the event.
- Build a tool-centered project before defining safety, legality, and measurement
  boundaries.
metrics:
- The note cleanly separates jamming, interference, spoofing, protocol flooding, fuzzing,
  and wireless IDS as different concepts.
- The safety boundary forbids actionable jammer construction, transmit parameters,
  unauthorized deauthentication steps, BLE spam procedures, and active drone interference
  instructions.
- A student can explain why GPS/GNSS can be fragile without learning how to deploy
  a jammer.
- A student can explain why drones may hover, return home, auto-land, or drift under
  degraded navigation rather than assuming immediate crash.
- A passive RF-observation plan identifies bands, devices, legal constraints, and
  expected benign signals without transmitting.
- A defensive incident-review template distinguishes evidence of RF noise, protocol
  abuse, spoofing, congestion, device failure, and environmental effects.
- An anti-drone sensing map includes RF detection, radar, computer vision, acoustic
  sensing, protocol analysis, operator policy, and safe response options.
- Any future experiment states whether it is receive-only, simulated, shield-boxed,
  licensed, or otherwise authorized.
insights:
- A jammer is best taught as a failure-mode lens for wireless systems, not as a device-building
  target.
- 'The coffee-shop analogy is useful: jamming is like making the room too noisy for
  a listener, but protocol attacks are more like impersonating a trusted speaker or
  sending confusing instructions.'
- Power matters, but distance, antenna pattern, timing, frequency match, receiver
  sensitivity, and protocol assumptions often matter more than raw strength.
- Human discomfort is not a reliable indicator of RF danger; safety depends on exposure
  level, duration, distance, frequency, and whether equipment follows legal emission
  limits.
- The main public-safety risk of illegal jammers is not only human health. It is disruption
  of shared communication, navigation, medical, emergency, and bystander systems.
- 'GPS/GNSS illustrates asymmetric fragility: a far satellite signal can be weaker
  at the receiver than a nearby local interferer.'
- 'Drone security should be framed as contested autonomy: sensing, localization, control,
  communication, fail-safe design, and operator policy all interact.'
- More advanced wireless attacks often try to look legitimate rather than only louder,
  which connects jamming/spoofing to authentication, trust, and protocol design.
- 'The best student-facing output is a concept map plus safe research routes: SDR
  receive-only analysis, RF incident taxonomy, wireless IDS, GNSS resilience, and
  anti-drone sensing.'
