safety_boundary:
  allowed:
  - Conceptual explanation of wireless interference, spoofing, and protocol failure
    modes.
  - Defensive taxonomy, incident review, RF forensics, wireless IDS, and anti-jamming
    resilience.
  - Passive receive-only observation plans and public-source study.
  - Shielded, licensed, supervised, or otherwise authorized research framing.
  - Discussion of legal, ethical, public-safety, and health boundaries.
  not_allowed:
  - Jammer construction instructions.
  - Transmit power, antenna, range, waveform, timing, or frequency-tuning guidance
    meant to disrupt real systems.
  - Step-by-step Wi-Fi deauth, BLE spam, GNSS jamming, or drone interference procedures.
  - Advice for bypassing law, avoiding detection, or affecting third-party devices.
educational_frame:
  plain_definition_zh: Jammer 是故意讓無線通訊變難或失敗的干擾來源；它可能靠噪音蓋住訊號，也可能靠看起來像合法訊號的假封包或錯誤資訊讓系統做錯判斷。
  first_principle_zh: 無線通訊是在空氣中從雜訊裡辨認有用訊號；防禦研究要問的是系統如何辨認、信任、恢復、記錄與告警，而不是如何把別人的訊號蓋掉。
  teacher_angle_zh: 對資工學生來說，jammer 是理解無線協定、訊號處理、系統韌性、法規邊界與安全工程的入口，不是值得模仿的 gadget。
research_tracks:
- name: Passive RF awareness
  question: What benign wireless activity is visible in a receive-only spectrum or
    packet-observation workflow, and how should it be documented without transmitting?
- name: RF incident taxonomy
  question: How can an analyst distinguish jamming, interference, spoofing, protocol
    abuse, congestion, device failure, and environmental noise?
- name: Drone resilience map
  question: How do GNSS, control link, video, telemetry, onboard sensing, and fail-safe
    modes interact under degraded wireless conditions?
- name: Wireless IDS
  question: What evidence should a defensive monitor preserve before alerting a human
    that a wireless anomaly may be malicious?
- name: GNSS and autonomy resilience
  question: How should autonomous systems degrade safely when GNSS is unavailable,
    inconsistent, or suspicious?
pressure_test:
  setting: A university lab wants to teach why viral Bluetooth/drone jammer clips
    are misleading while staying legal and safe.
  expected_failure_mode: The lesson becomes a curiosity-driven jammer build or an
    overconfident claim that any wireless failure is an attack.
  smallest_observable_test: Create a one-page taxonomy and a receive-only observation
    worksheet that asks students to classify benign wireless observations and failure
    stories without transmitting or affecting other devices.
  decision_metric: Students can explain jamming versus spoofing versus interference,
    name the legal/safety boundary, and propose one defensive monitoring or resilience
    improvement without giving operational attack steps.
