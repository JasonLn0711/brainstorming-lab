planning_boundary:
  sync_rule: "Keep the detailed cognition-OS reasoning in brainstorming-lab. Planning should receive only a short bridge if this changes repo architecture, weekly review, or daily planning behavior."
  planning_summary_shape:
    - title
    - id
    - status
    - maturity_score
    - next_test
    - canonical_path
    - capacity_note
concept_frame:
  core_claim: "Personal planning becomes more powerful when treated as a distributed cognition system: human values set direction, external memory preserves state, and AI recombines context across bounded repositories."
  human_limits:
    - "Working memory cannot reliably hold large dependency graphs."
    - "Long inference chains decay unless written down."
    - "Emotional priority and identity are not naturally represented by file structure alone."
  external_memory_layers:
    - "daily notes"
    - "weekly plans"
    - "canonical idea YAML"
    - "Markdown reasoning notes"
    - "project repos"
    - "paper labs"
    - "Git history"
    - "search and indexes"
    - "AI-readable summaries"
  ai_strengths:
    - "large-context synthesis"
    - "cross-file linking"
    - "state summarization"
    - "dependency reconstruction"
    - "candidate next-step generation"
    - "routine implementation through tools"
    - "drafting and verification loops"
  human_responsibilities:
    - "decide what matters"
    - "set capacity and priority"
    - "resolve value conflicts"
    - "choose which future is worth building"
    - "kill or park ideas honestly"
    - "authorize decisions whose consequences the human must live with"
    - "notice embodied signals such as exhaustion, fear, desire, grief, and meaning"
  division_of_labor:
    human_should_not_be_forced_to:
      - "remember everything"
      - "manually reconstruct context chains"
      - "format every artifact"
      - "compare every option from scratch"
      - "act like a database"
    ai_should_not_be_forced_to:
      - "pretend to have the user's lived history"
      - "decide the user's identity"
      - "erase moral responsibility through optimization language"
      - "choose life direction without human authorization"
    collaboration_rule: "Let AI carry context-heavy extension work so the human can spend scarce attention on value, meaning, responsibility, and embodied priority."
  digital_cognitive_twin:
    claim: "A deeply externalized life system can let AI build a high-resolution descriptive model of the person."
    inputs:
      - "daily notes"
      - "brainstorming records"
      - "repo history"
      - "decision logs"
      - "emotional reflections"
      - "research goals"
      - "communication style"
      - "relationship patterns when explicitly provided"
    possible_outputs:
      - "preference map"
      - "decision tendency model"
      - "emotional association map"
      - "life trajectory hypotheses"
      - "recurring conflict patterns"
      - "future preference simulation"
    boundary: "This can produce descriptive understanding, but it does not give AI first-person existence or make AI become the user."
agent_era_reflection:
  question: "If AI agents can increasingly perform reasoning, planning, and implementation, what remains distinctly human?"
  answer: "The human layer is not raw reasoning speed. It is lived consequence, value selection, meaning-making, responsibility, and identity formation."
  risk: "If the system treats every life decision as an optimization problem, it may hide the human cost and moral ownership behind agent-generated plans."
  design_implication: "Planning tools should label which decisions are AI-executable, which are AI-advisable but human-authorized, and which require human-only value reflection before any execution."
understanding_distinction:
  descriptive_understanding: "AI can model the user's patterns, values, fears, preferences, decisions, and emotional associations from enough externalized context."
  functional_understanding_view: "If AI predicts, responds, and helps well enough, some theories would treat that as a real form of understanding."
  existential_understanding_view: "Other theories require subjective experience, embodiment, and first-person feeling; under that view, AI can describe pain without being the one in pain."
  fire_analogy: "AI can know the chemistry, temperature, and injury model of fire, but that differs from being burned."
  practical_rule: "Use AI's descriptive model as a mirror and advisor, but do not outsource the final meaning of lived experience to the model."
smallest_next_test: "Run one weekly review pass where an agent reads planning, this brainstorming repo, and one execution repo, then produces a next-step recommendation that explicitly separates AI-derived context synthesis from human-only value/capacity judgment."
