portfolio_projects:
- name: Agentic SOC Copilot
  purpose: Demonstrate agentic workflow, cyber triage, tool use, approval gates, and
    auditability.
  features:
  - ingest phishing email, logs, alerts, URLs, attachment metadata
  - triage and enrich evidence
  - map observations to MITRE ATT&CK
  - generate incident report with confidence
  - require human approval for high-risk actions
  - log every tool call
  interview_signal: I can place AI agents inside real security workflows without losing
    control.
- name: MCP / Agent Security Lab
  purpose: Show both attack understanding and defensive architecture for tool-using
    agents.
  features:
  - vulnerable agent fixture
  - defended agent fixture
  - prompt injection tests
  - indirect prompt injection from document or email
  - tool over-permission
  - data exfiltration
  - memory poisoning
  - unsafe autonomous action
  - denial-of-wallet guard
  interview_signal: I understand agentic AI security beyond generic OWASP naming.
- name: Cybercrime Intelligence Graph
  purpose: Turn cybercrime investigation background into visible applied AI product
    skill.
  features:
  - entity_extraction
  - relationship_graph
  - risk_scoring
  - case_timeline
  - natural_language_query
  - report_generation
  interview_signal: I can connect public cybercrime intelligence, graph reasoning,
    and explainable reporting.
