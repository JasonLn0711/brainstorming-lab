market_thesis:
  first_principle: Economic value capture flows first to the binding bottleneck, then
    to the actor that controls workflow, distribution, data, and durable pricing power.
  short_claim: 台股漲的是 AI 的建設權；下一階段美股與全球軟體公司要爭的是 AI 的抽稅權。
  staged_model:
  - stage: 'Stage 1: AI infrastructure bottleneck'
    timing: 2023-2026 and continuing
    value_capture: chips, foundry, advanced packaging, servers, cooling, power, networking,
      data centers
    example_regions: '["Taiwan", "United States", "Japan", "Korea"]'
  - stage: 'Stage 2: cloud and model platform'
    timing: 2025-2027
    value_capture: frontier models, cloud GPU capacity, developer APIs, enterprise
      agent tooling, model distribution
    example_regions: '["United States", "United Kingdom", "France", "Canada"]'
  - stage: 'Stage 3: workflow and application control'
    timing: 2026H2-2028H1 as the first large re-rating window
    value_capture: coding agents, enterprise workflow agents, sales/service agents,
      legal/compliance/finance agents, knowledge-work platforms
    example_regions: '["United States", "Singapore", "Australia", "Taiwan for integration/security
      niches"]'
  - stage: 'Stage 4: digital labor steady state'
    timing: 2028-2030 and beyond
    value_capture: software-defined work units, digital colleagues, agent marketplaces,
      AI governance, labor-market and policy redesign
  value_pool_warning: White-collar wage displacement or augmentation estimates describe
    a gross addressable labor-cost pool, not direct shareholder value. The useful
    investment question is who can capture a durable percentage through platform tax,
    workflow tax, distribution tax, or governance-critical control.
  cisco_analogy_boundary: Cisco is useful as a value-migration analogy, not as proof
    that AI infrastructure winners must fail. Internet infrastructure was necessary,
    but later consumer and enterprise platforms captured the larger durable software
    value.
timing_judgment:
  base_case: The next stage has already started, but broad financial and equity re-rating
    is more likely in 2026H2-2028H1.
  why_not_later_only: Coding agents and enterprise agent platforms are already being
    sold and integrated; waiting for infrastructure spend to slow would miss the overlap.
  why_not_fully_now: Many enterprises still lack workflow integration, permissioning,
    evals, data plumbing, governance, and reliable enterprise-wide EBIT evidence.
  observable_signals:
  - AI software engineering agents become budget-line items rather than experimental
    tools.
  - Enterprise agent platforms publish repeatable customer ROI beyond pilot case studies.
  - Agent security, audit, and governance roles become standard in AI platform deployments.
  - SaaS companies report attach rates, retention, and margin effects from agent products.
  - Security incidents involving tool-using agents increase demand for agent governance.
