      "Sourcegraph"]'
  - service: Enterprise workflow agent
    why: connects CRM, ERP, ITSM, HR, finance, support, and sales processes to digital
      labor
    examples: '["Microsoft Copilot Studio", "Salesforce Agentforce", "ServiceNow AI
      Agents", "SAP", "Oracle", "Workday"]'
  - service: Customer support and sales ops agent
    why: high-volume, measurable, repetitive, data-rich workflows
    examples: '["Salesforce", "Intercom", "Sierra", "Decagon", "Zendesk", "ServiceNow"]'
  - service: AI cyber / SOC agent
    why: security teams face chronic alert overload and need triage, enrichment, report
      drafting, and controlled response
    examples: '["Microsoft Security", "CrowdStrike", "Palo Alto Networks", "Wiz",
      "Cloudflare", "Google Mandiant", "Trend Micro"]'
  - service: Legal, compliance, finance, and knowledge-worker platforms
    why: document-heavy, high-wage, review-oriented workflows with strong audit needs
    examples: '["Harvey", "Thomson Reuters", "Bloomberg", "Palantir", "Glean", "Notion",
      "Atlassian", "Databricks", "Snowflake"]'
