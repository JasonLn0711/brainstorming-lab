risk_register:
- risk: Financial thesis becomes overconfident or time-stale.
  mitigation: Keep market figures as refresh-required citation leads and avoid treating
    the note as investment advice.
- risk: Career plan becomes too broad.
  mitigation: Choose one portfolio artifact and one target job family for the first
    4-6 week sprint.
- risk: Portfolio becomes a generic chatbot.
  mitigation: Force every project to include permissions, audit logs, evals, human
    approval, and security failure cases.
- risk: Pure AI research ambition diffuses execution.
  mitigation: Keep frontier-model research as reach optionality and make applied AI
    security the mainline.
- risk: Company lists become stale.
  mitigation: Refresh job postings and role names before applying; treat this as a
    map, not a final application list.
