learning_path_from_zero:
  main_axis: AI Systems Engineering for Real-world Deployment
  security_answer: Security is included by default because deployed AI systems operate
    in an untrusted world with users, data, APIs, permissions, logs, infrastructure,
    adversarial inputs, and sometimes sensors or physical effects.
  first_principle: Security is not primarily tool usage. Security is the discipline
    of making a system remain trustworthy when inputs, users, dependencies, data,
    networks, and environments cannot be fully trusted.
  phase_1_normal_systems:
    goal: Learn how systems normally work before studying how they fail.
    topics:
    - Linux processes, permissions, filesystems, services, SSH, logs, systemd, environment
      variables
    - TCP, UDP, DNS, HTTP, TLS, sockets, NAT, proxy, VPN, WebSocket
    - Web architecture, frontend/backend boundaries, REST, cookies, sessions, JWT,
      OAuth, CORS, rate limiting
    - Docker, docker compose, CI/CD, deployment, logging, monitoring, nginx, model
      serving
    practice_project: Build a small streaming ASR or triage service with WebSocket
      input, API boundaries, logs, Docker compose, and one deployment/runbook.
  phase_2_security_foundations:
    goal: Understand how normal systems are broken only after the normal path is clear.
    topics:
    - threat modeling
    - authentication and authorization
    - access control and least privilege
    - secrets management
    - OWASP Top 10
    - SQL injection, XSS, SSRF, auth bypass, insecure deserialization at a conceptual
      and defensive level
    - logging, audit trail, incident review, and rollback
    practice_project: Add auth, rate limits, audit logs, input validation, and a simple
      threat model to the ASR or triage service.
  phase_3_ai_security:
    goal: Apply security thinking to AI pipelines, LLMs, RAG, ASR, agents, and model
      serving.
    topics:
    - prompt injection and indirect prompt injection
    - adversarial or misleading audio input
    - fake or poisoned medical documents
    - RAG provenance and citation reliability
    - model hallucination boundaries
    - tool permissions and excessive agency
    - data poisoning and model supply chain
    - privacy, auditability, and human-in-the-loop control
    practice_project: Create an AI triage threat model and evaluation fixture with
      prompt-injection cases, fake-document cases, ASR failure cases, abstain mode,
      and doctor-review logs.
  phase_4_cyber_physical_branch:
    goal: Enter RF, SDR, drone, and cyber-physical security only after systems and
      security foundations are stable.
    topics:
    - sensor fusion
    - degraded mode
    - resilient networking
    - GNSS trust and fallback
    - passive SDR observation
    - RF incident taxonomy
    - wireless IDS
    - anti-drone sensing
    boundary: Study passive observation, resilience, and forensics first; do not jump
      into jammer construction or active interference.
  scope_guard:
    warning: The user's main risk is range explosion, not lack of ambition.
    rule: Keep the main axis as AI Systems Engineering for Real-world Deployment,
      then add one security layer at a time.
    not_now:
    - deep RF engineering
    - FPGA
    - broad electronic warfare
    - Kubernetes-first learning
    - exploit-development identity as the primary route
  triage_security_map:
  - risk: Prompt injection from patient speech or documents
    defensive_question: Can the system preserve the clinical task boundary and flag
      suspicious instructions instead of obeying them?
  - risk: Fake or poisoned medical document
    defensive_question: Can the system track provenance, source trust, and evidence
      level before using a document?
  - risk: Adversarial, replayed, or misleading audio
    defensive_question: Can ASR uncertainty, speaker/source context, and human review
      prevent silent trust in bad transcripts?
  - risk: Privacy and sensitive health data exposure
    defensive_question: Are access control, logging, retention, redaction, and local-only
      boundaries explicit?
  - risk: Hallucinated medical reasoning
    defensive_question: Does the system abstain, route to clinician review, and log
      claim boundaries instead of giving autonomous advice?
  - risk: Model or dependency supply-chain drift
    defensive_question: Are model versions, prompts, embeddings, containers, and eval
      results traceable?
