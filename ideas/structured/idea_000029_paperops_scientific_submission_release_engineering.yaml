first_principle:
  scarce_resource: author attention, submission-cycle trust, reviewer trust, and final-packet
    integrity
  core_object: a reproducible and auditable submission release path
  not_the_core:
  - making papers look technically sophisticated
  - automating actual portal submission
  - using npm because the manuscript is a JavaScript app
  - adding gates that do not block real failure modes
  - acceptance-probability theater
  smallest_useful_unit: one repo-local `ready` gate that validates build, packet,
    declarations, portal mapping, and artifact manifest for one target submission
  decision_boundary: Use PaperOps to prepare and audit the submission packet; keep
    final portal submit as an explicit human action.
npm_concepts_for_students:
  npm: Node.js ecosystem package manager and command runner.
  package_json: 'Project identity card plus automation map: dependencies, scripts,
    version, and project metadata.'
  npm_install: Installs dependencies declared by the project.
  npm_run: Runs a named script from `package.json`.
  npm_run_ready: Runs the repo's total local readiness gate; it does not submit anything
    externally.
  portal_check: Checks local portal-facing documents and mappings; it does not log
    in to a journal system.
real_world_instances:
  frontend_site: '`npm install` installs React/Vite dependencies; `npm run dev` starts
    a local development server.'
  backend_api: '`npm install express` adds an API framework; `npm run start` launches
    the service.'
  test_system: '`npm run test` runs Jest, Vitest, or another test runner to catch
    regressions.'
  formatting_gate: '`npm run format` may run Prettier so a team shares one code style.'
  manuscript_repo: '`npm run ready` can build LaTeX, check claims, validate portal
    packet files, and confirm the submission artifact set.'
paperops_modules:
  submission_state_machine:
    states:
    - draft
    - internal-review
    - pre-submission
    - portal-ready
    - submitted
    - revision
    - camera-ready
    purpose: Make it impossible to confuse drafting, local readiness, portal readiness,
      and completed submission.
  artifact_hash_lock:
    command_candidate: npm run artifact:freeze
    purpose: Generate a manifest with hashes for the exact manuscript, title page,
      figures, supplementary files, cover letter, declarations, and rebuttal artifacts.
  portal_dry_run:
    command_candidate: npm run portal:dryrun
    purpose: Check portal-facing fields and file constraints before the human enters
      the external journal system.
  reviewer_simulation:
    command_candidate: npm run reviewer:redteam
    purpose: Find overclaim, unsupported causal language, vague novelty, missing baseline,
      ethical ambiguity, synthetic/public boundary confusion, and reviewer workload
      risks.
  deviation_log:
    purpose: Record intentional exceptions and mismatches so future agents or coauthors
      know what was accepted and why.
pressure_test:
  setting: Final 24 hours before journal submission after a coauthor edits the title,
    abstract, figure exports, and AI-use declaration.
  expected_failure_mode: The repo appears clean, but portal fields, uploaded files,
    and manuscript metadata drift apart; the author may submit the wrong PDF or miss
    a declaration.
  smallest_observable_test: Create a local fixture submission packet, run `npm run
    ready`, run a prototype artifact manifest check, and manually compare the dry-run
    portal mapping against the packet.
  decision_metric: Pass if the pipeline catches mismatched title/abstract, missing
    declaration, PDF rebuild drift, and missing supplementary file without requiring
    the author to remember those checks manually.
safety_boundary:
  allowed:
  - local validation
  - artifact checks
  - portal mapping
  - dry-run checklist
  - reviewer-risk simulation
  - manifest and deviation logs
  not_allowed:
  - automatic external journal submission
  - credential handling
  - bypassing author confirmation
  - pretending reviewer simulation predicts acceptance
