status: execution_ready
problem_statement:
  raw: "Given a PhD student moving from solution-first tool thinking toward independent research judgment, optimize the habit of letting implementation friction, mental execution simulation, and reality observation generate real problem definitions before selecting methods under constraints of uncertainty, incomplete evidence, long time horizons, emotional energy, and existing project boundaries."
  normalized: "Given a PhD student moving from solution-first tool thinking toward independent research judgment, optimize problem definition through implementation friction, mental execution simulation, and bottleneck diagnosis under constraints of uncertainty, incomplete evidence, long time horizons, emotional energy, and existing project boundaries."
  structure:
    given: "a PhD student moving from solution-first tool thinking toward independent research judgment"
    optimize: "problem definition through implementation friction, mental execution simulation, and bottleneck diagnosis"
    constraints:
      - uncertainty
      - "incomplete evidence"
      - "long time horizons"
      - "emotional energy"
      - "existing project boundaries"
summary: "A training frame for becoming a researcher who can define problems before choosing tools: do real work or mentally simulate execution, observe friction, separate symptom/problem/tool/metric/constraint, run a five-layer why chain, map the system, name who suffers, state the smallest falsifiable next test, and iterate the worldview."
source_note_zh: "博士班真正訓練的，不只是會做研究，而是能不能開始對世界上的某個問題建立自己的判斷系統；問題定義要從眼前真正卡住的地方開始，而且常常是在實作或腦內模擬實作時，因為摩擦自然浮出來。"
assumptions:
  - "Problem-definition thinking is trainable through repeated local diagnosis, not only through abstract philosophy."
  - "The first unit of practice should be the user's current research/workflow friction, because that is where evidence and emotional cost are visible."
  - "Valuable research questions usually come from doing work, simulating work seriously, or watching reality closely enough that friction becomes visible."
  - "The practice is not to force clever questions; it is to get close enough to implementation that real obstacles appear."
  - "A lecture becomes useful when the listener mentally executes the speaker's system and asks what would break, who arbitrates, what state is preserved, and where auditability lives."
  - "Solution-first language such as AI agent, graph, RL, RAG, bigger model, or LangGraph is usually a tool category, not a research problem."
  - "A strong problem statement identifies who is affected, what bottleneck blocks progress, which evidence is missing, and what would change if the bottleneck were removed."
  - "Uncertainty is normal in research; mature judgment is the ability to keep moving while updating the problem definition."
  - "Research endurance matters because long-running ambiguous work fails when emotional burning outruns system progress."
  - "Not every diagnosed problem deserves a project; some should be parked or killed with a reason."
evidence:
  - "2026-05-07 conversation on PhD thinking, independent judgment, problem definition, five-layer why, and problem/tool/metric/constraint separation."
  - "2026-05-07 follow-up insight: problems are often not invented by sitting and thinking, but emerge naturally when implementation, experiments, operations, or lecture-time execution simulation reveal friction."
  - "Existing brainstorming-lab themes already emphasize reviewer burden, governance, evidence paths, auditability, workflow bottlenecks, and human-AI decision systems."
  - "Weekly Paper Lab W19 ARIS reading pass: full autonomous-agent adoption was reframed into a bounded claim-ledger fixture because provider/API/MCP setup and causal-evaluation gaps exposed the real bottleneck as unsupported-success measurement."
baseline:
  - "Solution-first framing: start from the desired method, such as agent, graph, RL, RAG, fine-tune, or bigger model."
  - "Question-theater framing: try to ask impressive questions without having mentally or practically run the system."
  - "Knowledge-collection framing: read more papers without compressing them into a judgment system."
  - "Metric-first framing: treat accuracy, benchmark score, or paper count as the problem itself."
  - "Mood-driven research: sprint when excited, stall when the direction becomes ambiguous or boring."
metrics:
  - "Problem/tool/metric/constraint split completed before choosing a method."
  - "Five-layer why chain ends in a bottleneck, affected actor, and smallest test rather than a tool name."
  - "System diagram identifies at least one interaction bottleneck instead of only a component-level weakness."
  - "At least one question per lecture, paper, or demo is generated by mentally executing the system and naming where it might break."
  - "Implementation notes record concrete friction events before abstracting them into research questions."
  - "Weekly review records which problem definitions were validated, revised, parked, or killed."
  - "New technique impulses are converted into problem statements before implementation starts."
  - "Research workload remains bounded enough that emotional energy does not become the main failure point."
insights:
  - "The PhD shift is from solving assigned problems to defining which problem is worth solving."
  - "A paper is a carrier of a viewpoint; the deeper output is a judgment system and worldview."
  - "Most weak research starts by solving a symptom instead of diagnosing the bottleneck."
  - "Good questions are usually mined from reality, not manufactured from ambition."
  - "Implementation friction is an epistemic instrument: it reveals constraints, hidden state, human trust gaps, failure modes, and maintenance cost."
  - "Listening to a talk can become research practice when the listener mentally runs the proposed system and notices execution-level failure points."
  - "Being good at asking questions may be downstream of being sensitive to real-world friction."
  - "Problem definition is iterative: scam detector can become reviewer assist, then governed triage, then scalable human-AI evidence workflow."
  - "The useful first-principles question is not what tool to use, but what bottleneck changes the system if removed."
  - "System diagrams are a research thinking tool because many real problems live in interactions, not isolated components."
  - "Research maturity includes tolerating not knowing, admitting wrong turns, and updating the worldview without collapse."
