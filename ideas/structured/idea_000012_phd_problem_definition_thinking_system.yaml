problem_definition_frame:
  core_question: "What is the real bottleneck preventing this system from moving forward?"
  source_of_questions: "Questions should be harvested from implementation, experiments, operations, field observation, lecture-time execution simulation, and repeated friction, then sharpened into explicit problem definitions."
  distinguish:
    problem: "The real friction, cost, risk, or blocked transformation."
    symptom: "The visible pain, such as bad ASR, too many scams, or low accuracy."
    tool: "A possible method, such as agent, graph, RAG, RL, or bigger model."
    metric: "A measurement proxy, such as accuracy, review time, recall, or false positive rate."
    constraint: "A boundary such as privacy, governance, GPU, time, legal auditability, or reviewer capacity."
  five_layer_why:
    - "What symptom is visible?"
    - "Why does this symptom happen in this situation?"
    - "Why does that cause real cost or risk?"
    - "Why is the current system unable to resolve it?"
    - "What bottleneck, if removed, would change the system?"
  smallest_next_test: "Pick one current lane and write a one-page problem-definition card: symptom, affected actor, bottleneck, evidence gap, tool temptations, smallest falsifiable test."
friction_to_question_loop:
  principle: "Do not force a smart question first. Move close enough to reality that the system pushes back, then name exactly where and why it pushed back."
  sources:
    implementation: "Build or operate the smallest version and record where the workflow breaks, slows, becomes ambiguous, or loses trust."
    experiment: "Run a bounded fixture and record which assumptions fail before interpreting the result."
    lecture: "Mentally execute the speaker's method as if deploying it: state, arbitration, failure recovery, audit trail, latency, governance, and human workload."
    paper_reading: "Translate the method into a runnable workflow and ask which steps depend on hidden assumptions."
    field_observation: "Watch where people hesitate, repeat work, ignore the system, or create informal workarounds."
  conversion_steps:
    - "Record the concrete friction event."
    - "Name the affected actor and consequence."
    - "Separate symptom, tool temptation, metric, and constraint."
    - "Ask five-layer why until the answer names a bottleneck."
    - "State the smallest test that would confirm, revise, or kill that bottleneck hypothesis."
  lecture_question_examples:
    - "If this multi-agent system fails, which component notices first and who arbitrates?"
    - "What state must persist across agents, and how is memory consistency verified?"
    - "Which part should be deterministic rather than agentic?"
    - "What evidence trail would let a reviewer reconstruct the decision?"
    - "What workload is shifted to humans, and how is reviewer fatigue measured?"
training_loop:
  - "Do a small implementation, experiment, or lecture-time mental execution pass."
  - "Capture the current friction in plain language."
  - "Separate symptom, problem, tool, metric, and constraint."
  - "Run the five-layer why chain until the answer is a bottleneck, not a technology."
  - "Draw the system path: input, actor, decision, evidence, bottleneck, output, feedback."
  - "Name the affected actor and the cost of leaving the bottleneck unsolved."
  - "State what would change if the bottleneck were removed."
  - "Define the smallest test that can revise the problem statement."
  - "After the test, update the worldview: validated, revised, parked, or killed."
