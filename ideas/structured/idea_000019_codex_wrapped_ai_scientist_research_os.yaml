status: execution_ready
problem_statement:
  raw: Can a forked Sakana AI Scientist pipeline become a weekly controlled research
    system by keeping upstream mostly untouched and wrapping it with a Codex CLI orchestration,
    logging, governance, and human-approval layer instead of hard isolation?
  normalized: Given an upstream autonomous research pipeline, optimize a governed
    Codex CLI research OS that can run controlled weekly research cycles under constraints
    of traceability, recoverability, reproducibility, citation traceability, claim
    boundaries, safety review, cost awareness, and human approval for public actions.
  structure:
    given: an upstream autonomous research pipeline
    optimize: a governed Codex CLI research OS for controlled weekly research cycles
    constraints:
    - traceability
    - recoverability
    - reproducibility
    - citation traceability
    - claim boundaries
    - safety review
    - cost awareness
    - human approval for public actions
summary: Do not turn Sakana AI Scientist into an unchecked autonomous lab. Keep the
  Sakana core as an upstream dependency and add a Codex CLI control layer that owns
  repo hygiene, git-based run tracking, manifests, run logging, report generation,
  reproducibility metadata, claim/citation/safety review, and hard human gates before
  any publication, upload, email, or external submission.
human_note: ideas/2026-05-09-codex-wrapped-ai-scientist-research-os.md
first_principle:
  scarce_resource: trustworthy research-cycle evidence, not more autonomous steps
  not_the_core:
  - rewriting Sakana AI Scientist's internal research logic
  - pretending traceability is the same as operating-system isolation
  - treating generated papers as publishable because the pipeline completed
  - optimizing for full paper generation before auditability
  core_question: Can a Codex-governed wrapper make automated research cycles reproducible,
    reviewable, and bounded enough to become a weekly PhD research input?
  canonical_home: brainstorming-lab owns the idea record, assumptions, safety architecture,
    scaffold spec, and next tests.
  planning_boundary: planning-everything-track should only receive title, ID, status,
    maturity score, next test, canonical path, and capacity note if this becomes scheduled
    work.
  execution_boundary: A standalone auto-research repo can start as a soft-control
    prototype once the run manifest, git tracking, review outputs, disclosure note,
    and no-public-action gate are explicit.
  smallest_next_test: Build the sibling auto-research-os repo skeleton, run preflight,
    and complete one Codex dry-run research cycle before integrating real AI Scientist-v2
    experiments.
  kill_condition: Park the project if the wrapper cannot produce machine-checkable
    evidence paths, citation provenance, reproducibility metadata, and human-gate
    stop points better than a manual research notebook.
assumptions:
- The useful contribution is a research operating system around an autonomous research
  engine, not a fork that deeply edits the engine.
- 'Codex CLI is best treated as a conductor and maintainer: check repo state, invoke
  runs, read logs, repair local failures, write reports, run validation, and mark
  gates.'
- 'The user explicitly does not want four hard controls in v0.1: Docker for every
  run, a block against agent edits to launcher scripts, network restrictions, or GPU/CPU/disk
  quotas.'
- Without those hard controls, v0.1 should protect research quality through traceability,
  recovery, conservative review, and explicit final human judgment.
- AI Scientist-v2 should live under upstream/AI-Scientist-v2 as an upstream dependency,
  while orchestration files live in scripts, prompts, governance, and research_runs.
- The first controlled domain should be cybersecurity-agentic-LLM because it matches
  existing research interests, but it must stay defensive, benchmark-oriented, and
  non-operational.
- The first version should produce review artifacts and decision support, not external
  submissions or public claims.
- A run that lacks seed, config, commit hash, cost, evidence paths, and citation traceability
  is not accepted even if it produces a manuscript.
- Human gates are part of the system design, not a temporary limitation.
evidence:
- '2026-05-09 user-provided architecture note: fork Sakana AI Scientist, keep upstream
  mostly untouched, and wrap it with Codex CLI executor, Ubuntu sandbox, repo governance,
  experiment logging, human approval gates, and claim/citation/safety reviewers.'
- '2026-05-09 user revision: v0.1 should not require Docker for every run, should
  not forbid launcher-script self-modification, should not restrict network access,
  and should not enforce GPU/CPU/disk quotas; instead it should use run_id, manifests,
  git diff summaries, claim boundary reviews, and next-step recommendations.'
- 'Local Codex CLI help checked on 2026-05-09: codex exec supports --model, --sandbox,
  --ask-for-approval, --json, and --output-last-message; --dangerously-bypass-approvals-and-sandbox
  is marked extremely dangerous and intended only for externally sandboxed environments.'
- 'Official AI Scientist README verified on 2026-05-09: the v1 repository describes
  idea generation, experiments, paper write-up, automated review, template-based operation,
  Semantic Scholar citation support, and a community Docker container.'
- 'Official AI Scientist README verified on 2026-05-09: v1 README says the project
  uses The AI Scientist Source Code License and requires prominent disclosure of AI
  use in resulting scientific manuscripts or papers.'
- 'Official AI Scientist-v2 README verified on 2026-05-09: v2 is described as autonomous
  hypothesis generation, experiment execution, analysis, manuscript writing, and progressive
  agentic tree search guided by an experiment manager agent.'
- 'Official AI Scientist-v2 README verified on 2026-05-09: v2 cautions that the codebase
  executes LLM-written code and should be run inside a controlled sandbox such as
  Docker.'
- 'Official AI Scientist Source Code License verified on 2026-05-09: generated or
  disseminated scientific manuscripts, research papers, or technical reports must
  prominently disclose machine generation or use of The AI Scientist.'
- Weekly Paper Lab W19 ARIS reading pass already reframed autonomous research systems
  into claim-ledger gates, reviewer independence, and unsupported-claim detection
  as measurable bottlenecks.
- '2026-05-09 local implementation: created sibling repo ../auto-research-os with
  soft-control scaffold, upstream AI Scientist-v2 clone, Codex prompts, governance
  checklists, run manifest generation, preflight logging, smoke mode, dry-run runner,
  and failed-run finalizer.'
- '2026-05-09 local validation: make smoke passed in ../auto-research-os after commit
  795f44d, creating research_runs/20260509_070115_auto_research with manifest and
  required reports.'
- '2026-05-09 dry-run evidence: upstream AI Scientist-v2 inspection found missing
  tiktoken for ideation import and missing torch for BFTS launcher import before any
  full experiment was accepted.'
- '2026-05-09 environment evidence: Codex CLI workspace-write sandbox failed on this
  Ubuntu host with a bwrap network namespace error, so the runner now defaults to
  a documented configurable local fallback while preserving a workspace-write retry
  path.'
baseline:
- Directly fork and modify AI Scientist core without an outer governance layer.
- Manual weekly research notebook with ad hoc scripts and no structured run root.
- A fully unattended autonomous research loop that writes papers and continues execution
  without stop gates.
- A LangGraph or shell wrapper that launches tools but does not enforce claim/citation/reproducibility
  acceptance criteria.
- A read-only literature automation tool that produces summaries but never runs controlled
  experiments.
metrics:
- 'Run completeness: every controlled cycle creates experiment summary, novelty assessment,
  reproducibility report, claim boundary review, and next-step recommendation.'
- 'Evidence coverage: every paper claim maps to at least one evidence path or is explicitly
  downgraded, rejected, or marked insufficient.'
- 'Citation traceability: every citation has a source URL, retrieved metadata, and
  usage context.'
- 'Reproducibility completeness: seed, config, dataset/source identity, upstream commit
  hash, orchestrator commit hash, model identifiers, and environment metadata are
  recorded.'
- 'Gate precision: public actions, external submissions, emails, uploads, and upstream
  modifications stop pending human approval.'
- 'Failure containment: run failures stay inside the run root and sandbox, with no
  uncontrolled upstream edits or repo-wide churn.'
- 'Recovery quality: each run preserves preflight logs, manifests, git diff patches,
  git status after execution, and a final recommendation so failed runs can be inspected
  or rolled back.'
- 'Reviewer burden: governance artifacts reduce manual review time enough to justify
  the orchestration overhead.'
- 'Research conversion quality: weekly cycles produce either a killed idea, parked
  idea, revised question, or candidate formal research topic.'
insights:
- 'The target system is a research OS: AI Scientist core proposes and executes, while
  Codex owns orchestration policy, evidence accounting, repo hygiene, and stop conditions.'
- The safety problem is not only harmful content. It includes overclaiming, citation
  drift, baseline unfairness, self-repair loops, hidden cost, and unreproducible runs.
- The wrapper should turn autonomous research output into an auditable candidate,
  not a finished paper.
- A weekly cycle is more useful than a fully autonomous loop because it creates a
  stable human decision point for PhD direction selection.
- 'Removing hard isolation moves the design center from system protection to research-quality protection: trace what happened, preserve diffs, review claims, and keep final promotion human-owned.'
- v0.1 should not chase weekly paper generation. It should produce candidate ideas,
  a minimum experiment plan or small run, failure analysis, claim boundary review,
  and next-step recommendation.
