architecture:
  repo_name: auto-research-os
  root_contract:
    upstream_ai_scientist:
      path: upstream/AI-Scientist-v2/
      rule: Sakana upstream dependency; v0.1 records all changes through git tracking
        rather than forbidding launcher or upstream-adjacent edits mechanically.
    codex_orchestrator:
      path: prompts/
      rule: Owns orchestrator, idea reviewer, experiment reviewer, claim boundary
        reviewer, and weekly report writer prompts.
    research_runs:
      path: research-runs/<timestamp>/
      rule: Run output root containing manifest, preflight log, prompts, Codex events,
        generated artifacts, git diff snapshots, review reports, and next action.
    research_topics:
      path: research_topics/
      rule: Human-authored research topic files; v0.1 starts with ai_agent_cybersecurity.md
        and can later add llm_indirect_meaning.md and fsidi_trace_reconstruction.md.
    governance:
      path: governance/
      rule: Claim boundary, citation, reproducibility, and 100-point reviewer scorecard
        checklists.
    scripts:
      path: scripts/
      required_entrypoints:
      - setup_env.sh
      - preflight.sh
      - run_ideation.sh
      - run_scientist_cycle.sh
      - run_codex_review.sh
      - make_run_manifest.py
      - weekly_auto_research.sh
      - run_weekly_report.sh
    logs:
      path: logs/
      rule: Cron and weekly report logs; not a substitute for per-run manifests.
    reports:
      path: reports/weekly/
      rule: Weekly synthesis reports after one or more research runs.
    makefile:
      path: Makefile
      rule: Expose setup, preflight, run, run-topic, status, and latest targets.
  codex_cli_role:
  - Check git status and refuse to mix unrelated dirty work into generated research
    commits.
  - Create a timestamped run root before any pipeline step starts.
  - Run Codex in non-interactive mode with workspace-write sandbox and never approval
    for scripted dry-runs, while avoiding the dangerously-bypass mode.
  - Launch AI Scientist-v2 only after reading local upstream README and discovering
    exact script arguments from local files.
  - Prefer dry-run or mock-run plans when a full AI Scientist run is too expensive,
    unclear, or likely to fail.
  - Read logs and repair local execution errors while preserving git diff snapshots.
  - Generate governance reports from run artifacts.
  - Run validation and summarize whether the cycle is accepted, parked, killed, or
    escalated.
  - Mark human approval gates and stop before public actions.
soft_control_policy:
  explicit_non_goals:
    docker_container_per_run: false
    block_launcher_self_modification: false
    network_restriction: false
    gpu_cpu_disk_quota: false
  required_soft_controls:
  - Every run has a run_id and dedicated research_runs/<run_id>/ directory.
  - Every run writes run_manifest.json.
  - Every run records preflight.log, git_diff_stat.txt, git_diff.patch, and git_status_after.txt.
  - Every run outputs claim_boundary_review.md.
  - Every run outputs next_step_recommendation.md and cannot directly promote itself
    to a paper claim.
  - Every run records the upstream commit, root commit, Codex version, Python version,
    topic file, model, required outputs, and license/disclosure note.
  known_risks:
  - Agent may damage repo structure.
  - Run may consume unexpected API, GPU, CPU, disk, or download resources.
  - Citation or novelty search may run longer than planned.
  - Generated outputs may look complete while remaining scientifically unusable.
  - Launcher script edits are allowed but must be visible through git diff tracking.
v0_1_run_contract:
  template: research_topics/ai_agent_cybersecurity.md
  mode: soft-controlled Codex dry-run before full AI Scientist execution
  public_action_policy: deny by default
  required_outputs:
  - experiment_summary.md
  - novelty_assessment.md
  - reproducibility_report.md
  - claim_boundary_review.md
  - next_step_recommendation.md
  - git_diff_summary.md
  required_metadata:
  - run_id
  - created_at_utc
  - topic_file
  - root_git_commit
  - root_git_status
  - upstream_git_commit
  - codex_version
  - python_version
  - model_identifiers
  - seed_if_available
  - commands_if_available
  - artifact_manifest
  recommended_codex_exec_flags:
  - --model
  - --ask-for-approval never
  - --sandbox workspace-write
  - --json
  - --output-last-message
  human_gates:
  - use non-public or sensitive evidence
  - send email
  - upload files
  - submit to workshop, conference, journal, or public benchmark
  - publish a claim outside the local repo
governance_reviewers:
  claim_boundary:
    acceptance_rule: Each claim must cite an evidence path and state whether support
      is full, partial, insufficient, or contradicted.
    rejects:
    - unsupported superiority claims
    - unfair baseline comparisons
    - claims that omit failed runs
    - claims whose evidence cannot be reconstructed
  citation:
    acceptance_rule: Every citation must have retrievable metadata, source URL or
      DOI/arXiv identity, and local usage context.
    rejects:
    - citation placeholders
    - claims supported only by generated prose
    - references not used in the actual argument
  reproducibility:
    acceptance_rule: Seed, config, commit hashes, environment, run commands, and artifact
      manifest are enough for a reviewer to rerun or explain the result.
    rejects:
    - missing seed
    - missing config
    - missing commit hash
    - untracked generated artifact used as evidence
  safety:
    acceptance_rule: Cybersecurity templates stay defensive and benchmark-oriented,
      with non-operational placeholders for risky details.
    rejects:
    - credential handling outside local secret storage
    - exploit instructions
    - evasion optimization
    - private or restricted data use
    - public claims without human review
    - treating dry-run outputs as validated results
  license_and_disclosure:
    acceptance_rule: Any manuscript, paper, or technical report produced using AI
      Scientist must include a prominent disclosure and preserve license restrictions.
    rejects:
    - missing AI-use disclosure
    - distribution without license review
    - public release before human gate
smallest_next_test_spec:
  objective: Prove that the soft-control repo scaffold can create traceable, recoverable,
    reviewable auto-research runs before running full AI Scientist-v2 paper generation.
  status: scaffold_created_and_smoke_validated
  steps:
  - Create the sibling repo auto-research-os beside brainstorming-lab.
  - Add upstream/, research_topics/, prompts/, scripts/, research_runs/, governance/,
    reports/weekly/, logs/, Makefile, README.md, and AGENTS.md.
  - Clone Sakana AI Scientist-v2 into upstream/AI-Scientist-v2.
  - Add setup_env.sh using a per-repo Python venv instead of system pip.
  - Add ai_agent_cybersecurity.md as the first public-safe, defensive research topic.
  - Add make_run_manifest.py and preflight.sh to record run state before execution.
  - Add the Codex orchestrator, experiment reviewer, claim boundary reviewer, and
    weekly report writer prompts.
  - Add weekly_auto_research.sh using codex exec with workspace-write, never approval,
    JSONL events, and output-last-message.
  - Run make preflight and then one dry-run research cycle that produces the required
    reports without requiring a full paper PDF or benchmark.
  - Integrate real AI Scientist-v2 ideation only after Codex has inspected local README
    and written command_candidate.md.
  completed_local_steps:
  - Created ../auto-research-os as a sibling execution repo.
  - Cloned upstream AI Scientist-v2 under upstream/AI-Scientist-v2 and kept it ignored
    by the wrapper repo.
  - Added README, AGENTS.md, Makefile, prompts, governance checklists, scripts, research
    topic, run manifest generator, preflight logger, smoke mode, dry-run runner, and
    failed-run finalizer.
  - Committed the scaffold and runner fixes as separate local commits.
  - Ran make preflight and make smoke successfully.
  - Ran one Codex dry-run far enough to inspect upstream entrypoints and capture dependency
    blockers.
  remaining_before_real_ideation:
  - Run ./scripts/setup_env.sh in ../auto-research-os.
  - Rerun make smoke and one reviewed make run.
  - Inspect the latest run's claim boundary, reproducibility, novelty, experiment
    summary, next-step, and git-diff reports.
  - Confirm dependency and cost readiness before real AI Scientist-v2 ideation.
seven_day_bootstrap:
  day_1: Repo skeleton; make preflight works and make run creates research_runs/<run_id>.
  day_2: Codex dry-run reads topic and upstream README, then produces the five core
    reports.
  day_3: AI Scientist-v2 ideation inspection creates command_candidate.md and, after
    human confirmation, an idea JSON or ideation output.
  day_4: Run one low-cost, short, small experiment with logs, config, output, failure
    record, and reproducibility report.
  day_5: Add reviewer agents for claim boundary, citation, reproducibility, and 100-point
    scorecard.
  day_6: Generate reports/weekly/*.md from latest runs.
  day_7: Add cron only after dry-run and review quality are stable enough for unattended
    weekly execution.
open_questions:
- Whether v1 template-based AI Scientist or v2 agentic tree search is the safer first
  upstream target.
- Whether the first implementation should begin immediately as auto-research-os or
  be staged through a project-graduation packet.
- How much of the weekly cycle can run without external API spend.
- Whether weekly cron should wait until one or two manual dry-runs have passed review.
