first_principle:
  scarce_resource: stable spatial state in real-world AI systems
  core_object: 3D orientation representation
  not_the_core:
  - mystical 4D visualization
  - formula memorization
  - using quaternion everywhere without understanding frames
  - treating Euler angles as always wrong
  - AI model training detached from geometry
  smallest_useful_unit: one toy orientation fixture that rotates a vector using Euler
    angles and unit quaternions, then demonstrates gimbal-lock and smooth interpolation
    differences
  decision_boundary: Use quaternion as an engineering representation for rotation
    state, not as a vague metaphor for intelligence.
math_frame:
  definition: q = w + xi + yj + zk
  basis_rule: i^2 = j^2 = k^2 = ijk = -1
  unit_quaternion_rule: For pure 3D rotation, keep ||q|| = 1.
  axis_angle: q = cos(theta/2) + (ux i + uy j + uz k) sin(theta/2)
  vector_rotation: v_rotated = q v q^-1, where v is embedded as 0 + vx i + vy j +
    vz k.
  important_caveats:
  - q and -q represent the same physical rotation.
  - Quaternion multiplication order matters.
  - Numerical systems should renormalize quaternions after repeated updates.
  - Coordinate-frame conventions must be explicit.
real_world_instances:
  game_engines: Unity and Unreal-style engines use quaternions internally for object
    and camera rotation even when editors expose Euler angles.
  drone_attitude: Flight controllers combine IMU signals and orientation estimates
    so the drone knows roll, pitch, yaw, and attitude changes.
  spacecraft: Satellites and spacecraft need stable attitude representation for pointing
    antennas, sensors, solar panels, or thrust direction.
  robotics: Robot arms and mobile robots use orientation representation for end-effector
    pose, navigation, and sensor transforms.
  ar_vr: Headset tracking needs low-latency smooth orientation updates; discontinuities
    are immediately visible and uncomfortable.
  slam_and_cv: SLAM and camera-pose pipelines represent camera rotation and translation
    while reconstructing the world.
  animation: Skeleton joints interpolate rotation; quaternions help avoid ugly axis
    flips and discontinuities.
  ai_world_models: Embodied AI needs object pose, camera pose, agent orientation,
    and frame transforms to reason about 3D scenes.
pressure_test:
  setting: A student builds a tiny drone/AR/camera-pose simulator and tries to rotate
    an object through a near-vertical pitch using Euler angles and quaternions.
  expected_failure_mode: Euler representation becomes ambiguous or discontinuous near
    gimbal-lock-like configurations, while quaternion code may still fail if normalization
    or coordinate-frame conventions are ignored.
  smallest_observable_test: Implement a small script or notebook-free CLI fixture
    that rotates a vector with both representations, logs axis conventions, checks
    vector length preservation, and plots or prints orientation continuity.
  decision_metric: 'Pass if the student can explain the observed failure, state why
    unit quaternions help, and name the remaining engineering risks: normalization,
    frame convention, multiplication order, and q/-q equivalence.'
learning_path:
- Start with 2D complex-number rotation.
- Then learn 3D Euler angles and deliberately observe gimbal lock.
- Then learn unit quaternion axis-angle representation.
- Then implement q v q^-1 for one vector.
- Then compare SLERP interpolation with naive Euler interpolation.
- 'Then connect to one real system: drone attitude, AR/VR head pose, robot arm orientation,
  or camera pose in SLAM.'
