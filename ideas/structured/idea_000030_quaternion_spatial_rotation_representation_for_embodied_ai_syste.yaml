problem_statement:
  raw: Given AI systems that need to understand or control 3D orientation, capture
    quaternion as a practical mathematical foundation for representing rotation in
    drones, robotics, AR/VR, graphics, SLAM, pose estimation, and embodied world models
    without confusing it with a literal fourth spatial dimension.
  normalized: Given embodied AI and 3D systems, optimize stable orientation representation
    and spatial reasoning through unit quaternions under constraints of gimbal lock,
    sensor noise, interpolation smoothness, numeric drift, coordinate-frame ambiguity,
    and deployment across game engines, robotics, drones, IMUs, AR/VR, and camera-pose
    pipelines.
  structure:
    given: embodied AI and 3D systems that need stable orientation representation
    optimize: rotation stability, pose consistency, and spatial reasoning
    constraints:
    - gimbal lock in Euler angles
    - sensor noise and IMU drift
    - smooth interpolation
    - numeric normalization
    - coordinate-frame ambiguity
    - camera, robot, drone, and graphics engine conventions
    - student confusion between four numbers and four-dimensional space
summary: Quaternion is a four-component number system, usually written as w + xi +
  yj + zk, that represents 3D rotation compactly and robustly when restricted to unit
  quaternions. The durable idea is not that AI needs mysterious 4D math for its own
  sake, but that real-world AI systems need reliable spatial pose representations.
  Quaternions connect Hamilton's formula, gimbal-lock avoidance, drone/IMU attitude
  estimation, robot orientation, SLAM camera pose, AR/VR head tracking, animation
  skeletons, game engines, and future AI world models.
source_note_zh: 四元數對資工學生的重要性，不是背公式，而是理解 3D 世界裡「姿態」怎麼被穩定表示；AI 一旦進入相機、機器人、無人機、AR/VR
  或 3D world model，就一定會碰到 rotation representation。
human_note: ideas/2026-05-18-quaternion-spatial-rotation-for-embodied-ai.md
assumptions:
- 'A quaternion has one scalar part and three imaginary basis directions: w + xi +
  yj + zk.'
- The famous rule i^2 = j^2 = k^2 = ijk = -1 is the algebraic core, but engineering
  use usually focuses on unit quaternions for 3D rotation.
- Quaternion multiplication is non-commutative, so rotation order matters.
- 'A unit quaternion can encode an axis-angle rotation: q = cos(theta/2) + (ux i +
  uy j + uz k) sin(theta/2).'
- A 3D vector can be rotated by embedding it as a pure quaternion and applying q v
  q^-1.
- The useful correction for students is that four quaternion components do not mean
  the object lives in a literal fourth spatial dimension.
- Euler angles are intuitive for humans, but they can create gimbal lock and discontinuities
  in control, interpolation, and optimization.
- 'Quaternions still need care: normalization, coordinate-frame conventions, handedness,
  and q versus -q equivalence can cause bugs.'
evidence:
- 2026-05-18 user supplied screenshot and notes about a video explaining quaternion
  as a formula carved on a bridge and used to change aerospace and 3D worlds.
- '2026-05-18 user explanation: Hamilton introduced quaternions in 1843, with the
  core formula i^2 = j^2 = k^2 = ijk = -1.'
- '2026-05-18 user explanation: quaternions are widely used in 3D game engines, aerospace
  control, drones, robotics, VR/AR, computer graphics, animation, satellites, and
  IMU orientation tracking.'
- '2026-05-18 user explanation: quaternions help avoid gimbal lock compared with Euler
  angles.'
- Existing Idea OS themes already include drone resilience, real-world AI deployment,
  foundation vision, object tracking, and cyber-physical systems.
baseline:
- Explain 3D rotation only through Euler angles and miss gimbal lock, interpolation
  discontinuity, and axis-order bugs.
- Treat quaternion as a mysterious 4D object instead of a practical 3D orientation
  representation.
- Use matrices everywhere without explaining why quaternions are more compact and
  stable for repeated rotation composition.
- Teach AI systems as pure model training without the geometry needed for cameras,
  robots, drones, AR/VR, or embodied agents.
- Ignore coordinate-frame conventions until deployment bugs appear.
metrics:
- Student can distinguish real numbers, complex numbers, Euler angles, rotation matrices,
  and quaternions as different representation tools.
- Student can explain why unit quaternions represent 3D rotations without saying the
  object moves in four-dimensional physical space.
- A toy fixture compares Euler-angle rotation near pitch 90 degrees with quaternion
  rotation and shows the gimbal-lock failure mode.
- A toy fixture rotates a 3D vector using q v q^-1 and verifies length preservation
  after normalization.
- A camera/drone/robot pose note identifies coordinate frame, handedness, axis convention,
  and normalization policy.
- 'A future 3D AI workflow names where quaternion appears: IMU fusion, camera extrinsics,
  SLAM, animation joints, simulation, or world-model state.'
insights:
- Quaternion is a bridge between abstract algebra and real control of 3D space.
- The practical question is not 'what is 4D math?' but 'how do we represent orientation
  without breaking under composition, interpolation, or control?'
- Euler angles are good for UI and human explanation; quaternions are often better
  for internal state and smooth rotation.
- 'Gimbal lock is a systems failure: the representation loses a degree of freedom
  at a critical configuration.'
- For drones and spacecraft, orientation is not decoration; it is control state.
- For AR/VR, small orientation errors become human-visible discomfort.
- For AI world models, spatial intelligence needs pose, frame, transform, and uncertainty,
  not only object labels.
- 'Quaternions are a concrete example of why math foundations matter for AI systems
  engineering: the right representation changes what can be built reliably.'
