status: research_candidate
problem_statement:
  raw: "Given mosquitoes are weak targets for open Tesla coil fly-trap geometry, design a smarter mosquito trap as a mosquito decision system that senses conditions, predicts active periods, adjusts attraction, confirms targets, captures safely, and learns from outcomes."
  normalized: "Given small fast mosquitoes in open air, optimize adaptive detection and capture usefulness under constraints of electrical safety, no exposed high voltage, low cost, false positives, indoor usability, energy use, noise, and measurable benefit over simple commercial traps."
  structure:
    given: "small fast mosquitoes in open air"
    optimize: "adaptive detection and capture usefulness"
    constraints:
      - "electrical safety"
      - "no exposed high voltage"
      - "low cost"
      - "false positives"
      - "indoor usability"
      - "energy use"
      - noise
      - "measurable benefit over simple commercial traps"
summary: "Design an adaptive AIoT mosquito trapping system that improves on always-on commercial lamps by using environment sensing, acoustic or vision confirmation, dynamic attraction control, safe fan-assisted capture, and outcome logging. The first usable version should be a low-voltage v1 with rules, fan capture, and data logging; AI detection comes after baseline operation is stable."
assumptions:
  - "Mosquito effectiveness depends more on lure, contact density, airflow, and dwell time than on visually dramatic arcs."
  - "AI is useful for detection, counting, false-positive filtering, and experiment measurement, not for bypassing electrical safety."
  - "The first test can use public or synthetic video/proxy targets before any live-insect or energized hardware experiment."
  - "The useful upgrade over a basic lamp is adaptive control: run strong attraction only when environmental and target signals justify it."
  - "Sound and camera classifiers are research hypotheses until tested against dust, fan noise, other insects, and room lighting changes."
evidence:
  - conversation
  - "fly-versus-mosquito mechanism comparison"
  - "commercial mosquito trap contrast"
  - "architecture sketch from conversation"
  - "ESP32 beginner explanation from conversation"
