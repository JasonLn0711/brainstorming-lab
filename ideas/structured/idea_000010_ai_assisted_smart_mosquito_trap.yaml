research_question: "Compared with an always-on commercial mosquito lamp, does adaptive sensing plus dynamic attraction improve capture rate, energy per capture, false attraction, runtime, and nighttime noise?"
system_design:
  hardware_decision:
    decision_rule: "Choose the controller from the required sensing and inference, not from maximum compute."
    esp32_primer:
      plain_definition: "ESP32 is a small low-power microcontroller with WiFi, Bluetooth, and GPIO pins for sensing and device control."
      project_role: "Read sensors, apply simple decision rules, control the fan and attraction cues, and log or transmit data."
      mental_model:
        - "Mac or PC: powerful general computer"
        - "Raspberry Pi: small Linux computer"
        - "ESP32: smaller controller for sensors, motors, lights, and low-power IoT behavior"
      suitable_tasks:
        - "read temperature and humidity"
        - "read light or simple microphone signals"
        - "control UV or weak visual cue"
        - "control fan or relay through safe driver circuitry"
        - "send logs over WiFi"
        - "run simple rule-based automation"
      not_suitable_for:
        - "large programs"
        - "desktop-style software"
        - "image-heavy AI"
        - "full dashboard or server workloads"
      beginner_summary: "ESP32 is the simplest controller for turning this idea into a real low-voltage device that senses, decides, and actuates."
    questions:
      - "Does v1 need a camera?"
      - "Does the device need to run sound or vision AI locally?"
      - "Does it need long-duration low-power operation?"
    options:
      - controller: ESP32
        use_when: "No camera AI is needed; v1 only needs sensors, rules, fan control, lighting control, and logging."
        strengths:
          - "low cost"
          - "low power"
          - "stable long-running operation"
          - "fast MVP build"
        limits:
          - "not suitable for image AI"
          - "audio analysis should stay simple"
      - controller: "ESP32 plus TinyML"
        use_when: "v2 needs lightweight mosquito-like sound classification while preserving low power."
        strengths:
          - "microphone inference on device"
          - "lower power than Raspberry Pi"
          - "enough for a research prototype if the model is small"
        limits:
          - "limited model size"
          - "requires a carefully collected audio dataset"
      - controller: "Raspberry Pi"
        use_when: "v3 needs camera, motion tracking, YOLO-style models, dashboard, larger storage, or multimodal fusion."
        strengths:
          - "supports camera-heavy prototypes"
          - "easier local data logging and dashboard"
          - "better for demonstration or paper-grade multimodal AI"
        limits:
          - "higher cost"
          - "higher power draw"
          - "more system complexity"
  modules:
    attraction:
      purpose: "Bring mosquitoes near the capture inlet without relying only on UV."
      candidate_parts:
        - "UV or weak visual cue"
        - "safe commercial lure or odor cue"
        - "low-temperature heat cue"
        - "airflow cue"
        - "CO2 candidate module, only if safety and sourcing are reviewed"
    sensing:
      purpose: "Decide when strong attraction is worth running."
      candidate_parts:
        - "temperature and humidity sensor"
        - "light sensor"
        - "CO2 sensor as occupancy or environment signal"
        - "microphone for acoustic candidate events"
        - "small camera pointed at the inlet"
        - "PIR for room occupancy context"
    decision:
      levels:
        - name: "Level 1 environment score"
          method: "Rules over humidity, temperature, night period, occupancy, and possible acoustic events."
        - name: "Level 2 acoustic classifier"
          method: "FFT or spectrogram features with a small classifier after the logging dataset exists."
        - name: "Level 3 visual confirmation"
          method: "Background subtraction or tiny object tracking near the inlet after v1 is stable."
    capture:
      preferred: "Fan-negative-pressure funnel into a capture box, sticky insert, or fine mesh bag."
      deferred: "Only consider an enclosed commercial low-risk grid module after separate safety review."
    learning:
      logs:
        - timestamp
        - temperature
        - humidity
        - "light level"
        - "audio event score"
        - "camera event count"
        - runtime
        - "capture or entry evidence"
mvp:
  name: "Smart Mosquito Trap v1"
  scope:
    - "ESP32 controller"
    - "temperature and humidity sensor"
    - "microphone module"
    - "UV or weak visual cue"
    - "small fan"
    - "capture box"
    - "simple rule engine"
  rule_engine: "If it is night, humidity is above 60%, temperature is roughly 24-30 C, and there is a possible mosquito-like audio event, run attraction plus fan mode for a bounded interval and log the outcome."
  minimum_parts:
    - "ESP32 development board"
    - "DHT22 temperature and humidity sensor, or DHT11 for cheaper rough testing"
    - "5V small fan"
    - "MOSFET module or relay module for fan switching"
    - "jumper wires"
    - "breadboard for bench testing"
    - "USB cable for power and programming"
    - "capture box or fine mesh bag"
  deferred_parts:
    - "UV or purple LED module"
    - "light sensor or RTC for real night detection"
    - "microphone classifier"
  wiring_notes:
    - "DHT22 VCC to ESP32 3.3V, GND to GND, DATA to GPIO 4."
    - "Use a 10k pull-up resistor from DHT22 DATA to 3.3V."
    - "Do not power or drive the fan directly from an ESP32 GPIO pin."
    - "Use GPIO 16 to control a MOSFET or relay module that switches the 5V fan."
    - "If the fan uses a separate 5V supply, share ground with the ESP32 control circuit."
  v1_rule: "If night mode is enabled, humidity is above 60%, and temperature is 24-32 C, run the fan for a bounded window, then turn it off."
  success_criteria:
    - "ESP32 reads temperature and humidity stably."
    - "Fan turns on when the rule is satisfied."
    - "Fan turns off when the rule is not satisfied or the run window ends."
    - "Prototype runs 6-8 hours without crashing."
    - "No exposed high voltage is present."
