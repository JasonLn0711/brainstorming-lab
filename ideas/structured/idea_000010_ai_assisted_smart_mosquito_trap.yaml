baseline:
  - "always-on UV lamp with fan or grid"
  - "commercial UV zapper or capture lamp"
  - "fan-based mosquito trap"
  - "simple timed outlet control"
  - "manual video counting"
metrics:
  - "mosquito-like target detection precision and recall on video snippets or proxy footage"
  - "false activation rate from dust, shadows, and non-target insects"
  - "capture or entry rate only after a separately reviewed safe physical trap exists"
  - "prototype has no exposed high-voltage components"
  - "capture rate per night compared with always-on baseline"
  - "energy per capture"
  - "runtime reduction versus all-night operation"
  - "false attraction or non-target insect ratio"
  - "nighttime noise level"
  - "ESP32 reads temperature and humidity reliably"
  - "fan turns on only when threshold logic is satisfied"
  - "fan turns off outside threshold logic or after the bounded run window"
  - "prototype can run 6-8 hours without crashing"
insights:
  - "A fly trap and a mosquito trap are different design problems because target size and contact geometry dominate the discharge path."
  - "Dense grid, fan capture, or adhesive/mechanical interception is more plausible than an open Tesla coil field for mosquitoes."
  - "The research value is the measurement loop: detect approach events, count outcomes, compare lure strategies, and avoid false positives."
  - "Any energized grid should be treated as a later safety-reviewed module, not the first prototype."
  - "Think of the device as a mosquito decision system: attract only when conditions are favorable, verify the target, then record the outcome."
  - "The MVP should not begin with deep learning. Start with a rule engine over time of day, humidity, temperature, and possible acoustic events."
  - "A fan-negative-pressure capture path is the safest first capture mechanism because it avoids exposed high voltage and leaves countable evidence."
  - "Raspberry Pi is not required for v1. Hardware should be chosen by needed sensing and inference: ESP32 for rules, ESP32 plus TinyML for lightweight acoustic classification, Raspberry Pi only for camera-heavy or full multimodal AI."
  - "For a beginner-facing build, explain ESP32 as a tiny low-power connected controller for reading sensors and controlling lights, fans, and simple automation, not as a Linux computer."
  - "The v1 success target is a stable sensing-control loop, not high mosquito capture volume."
  - "Keep UV or purple-light attraction as a second-stage add-on; first prove ESP32 sensing and fan actuation."
