system_sketch:
  candidate_pipeline:
    - "Video ingestion: decode, sample, resize, and preserve deployment metadata."
    - "Fast perception: YOLO or similar detector creates object candidates and coarse alerts."
    - "Representation review: DINOv2/ViT features compare scene regions against normal patterns, hard negatives, and target-domain examples."
    - "Transformer candidate path: DETR/RF-DETR-style detector is tested as an alternate or second-stage detector where global relations matter."
    - "Temporal memory path: Mamba/SSM, tracker, temporal transformer, or action-recognition baseline estimates behavior, persistence, and context shifts across clips."
    - "Identity path: ReID, DINOv2/CLIP embeddings, location/time priors, and optional physical identity tags rank candidate identities for human confirmation."
    - "Decision layer: thresholds, abstention, escalation, and human review are tuned by operational cost."
    - "Evidence ledger: every alert stores frame slice, model outputs, confidence, feature similarity, threshold policy, latency, and review outcome."
