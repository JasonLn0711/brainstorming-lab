  architecture_hypotheses:
    - name: "YOLO-first production baseline"
      role: "fast real-time perception and deployment anchor"
      risk: "closed-world category failure and weak scene understanding"
    - name: "DETR/RF-DETR candidate detector"
      role: "object-set prediction and global relation candidate path"
      risk: "training instability, GPU memory, small-object weakness, query matching, and deployment export issues"
    - name: "DINOv2/ViT representation review"
      role: "semantic feature review, hard-negative filtering, domain-shift diagnosis, and anomaly scoring"
      risk: "latency, spatial precision, and hardware cost"
    - name: "Mamba/SSM temporal memory"
      role: "long-video state, streaming anomaly evolution, and low-latency temporal pattern tracking"
      risk: "2D spatial encoding, object-boundary precision, small-object retention, and weaker explicit relation lookup"
    - name: "Bicycle ReID and identity-prior layer"
      role: "recover persistent identity for one target bicycle among many similar bicycles using appearance embedding, location/time priors, track history, and optional physical tags"
      risk: "near-duplicate bikes, occlusion, lighting change, privacy constraints, and false confidence from weak visual matches"
    - name: "Human decision layer"
      role: "uncertainty-aware escalation, alert review, evidence audit, and threshold governance"
      risk: "review burden, alert fatigue, and unclear accountability"
case_studies:
  ntu_bicycle_reid:
    problem: "In a dense National Taiwan University-style bicycle parking environment, the system must find the user's bicycle among hundreds of detected bicycles."
    distinction:
      detection_question: "Where are the bicycles?"
      identity_question: "Which detected bicycle is the same physical object as the user's registered bicycle?"
    proposed_pipeline:
      - "Register the user's bicycle with multiple clean photos from front, side, rear, basket/handlebar, seat, lock, sticker, and any distinctive marks."
      - "Detect all bicycles in the current scene with YOLO, RF-DETR, RT-DETR, or another detector."
      - "Crop detected bicycle candidates and extract appearance embeddings with DINOv2, CLIP, ViT, or a bicycle/vehicle ReID network."
      - "Rank candidates with cosine similarity against the registered bicycle gallery."
      - "Fuse location and time priors: usual parking zone, camera identity, last seen timestamp, and expected movement path."
      - "Use tracking when the bike is observed entering or leaving the area."
      - "Optionally add physical identity signals: QR tag, RFID, Bluetooth, UWB, AirTag-like locator, sticker, or high-contrast marker."
      - "Return a top-k shortlist for human confirmation rather than an unqualified automatic identity claim."
    likely_hard_cases:
      - "many black commuter bikes with baskets"
      - "same-brand or same-model Giant/Merida-style bikes"
      - "U-bike-like near-duplicate designs"
      - "occluded bikes parked in dense rows"
      - "night, rain, motion blur, CCTV noise, and compression artifacts"
      - "partial views where only basket, wheel, or handlebar is visible"
      - "accessories moved or removed after registration"
    privacy_boundary:
      - "Prefer user-owned bicycle registration and local inference."
      - "Avoid identifying unrelated people."
      - "Store only bicycle crops, embeddings, location priors, and human-confirmed outcomes needed for the user's search task."
      - "Do not turn the case study into generalized campus surveillance without explicit governance."
    smallest_test:
      - "Create a small personal bicycle gallery with 8 to 12 photos of one bicycle."
      - "Collect or simulate 50 to 100 candidate bicycle crops from a dense parking scene."
      - "Measure whether DINOv2/CLIP/ReID embeddings can place the correct bicycle in top-5."
      - "Repeat with partial crops and similar-looking negative bicycles."
      - "Add a location prior and compare top-k improvement."
