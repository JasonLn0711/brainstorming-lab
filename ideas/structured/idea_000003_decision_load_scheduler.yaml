status: structured
problem_statement:
  raw: Given many possible next actions, optimize the next decision so the user spends
    less energy choosing and more energy executing.
  normalized: Given many possible next actions, optimize the next decision so the
    user spends less energy choosing and more energy executing under constraints of
    limited resources.
  structure:
    given: many possible next actions
    optimize: the next decision so the user spends less energy choosing and more energy
      executing
    constraints:
    - limited resources
summary: A scheduling and review layer that ranks ideas, tasks, and experiments by
  maturity, capacity impact, and next-test clarity.
assumptions:
- Decision fatigue is reduced when ideas expose score, next test, and capacity impact.
- Planning should receive only a short bridge, not the full reasoning trail.
- A weekly top-N selection is enough for a first useful loop.
insights:
- Idea maturity can become an input to weekly planning without becoming a hidden backlog.
