problem_statement:
  raw: Given overloaded clinical intake, optimize which cases need human review first
    under safety and audit constraints.
  normalized: Given overloaded clinical intake, optimize which cases need human review
    first under constraints of safety, audit constraints.
  structure:
    given: overloaded clinical intake
    optimize: which cases need human review first
    constraints:
    - safety
    - audit constraints
summary: A clinical triage assistant that structures patient intake, flags uncertainty,
  and routes cases to clinicians with evidence rather than replacing medical judgment.
assumptions:
- The useful output is safer prioritization, not autonomous diagnosis.
- Clinicians need provenance and uncertainty markers more than another chat surface.
- A small synthetic workflow can test review-burden reduction before any real patient
  data.
insights:
- This idea shares the same reviewer-assist pattern as cybersecurity candidate review.
- The first metric should be reduction in time-to-first-safe-action.
