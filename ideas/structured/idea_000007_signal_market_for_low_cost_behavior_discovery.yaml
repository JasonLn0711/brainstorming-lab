    features:
      誘導聯絡: 0/1
      保證收益: 0/1
      社群導流: 0/1
      reply_funnel: 0/1
      needs_thread: 0/1
  embedding:
    model:
    dim:
    vector:
  review:
    decision: scam / non_scam / uncertain
    confidence:
    review_time_seconds:
    second_review_required:
  PART 3 - SPARSE ENGINE (PRIMARY SYSTEM)
  Location:
  /engine/sparse/
  Implement:
  1. SVS calculator
  SVS = (yield_rate * information_density)
  / (review_time * cognitive_load)
  2. Sparse clustering
  Use rule-based similarity:
  - shared features count
  - weighted overlap
  Output:
  /outputs/sparse_clusters/
  3. Signal ranking
  Output:
  /metrics/signal_scores/
  PART 4 - EMBEDDING ENGINE (DISCOVERY ONLY)
  Location:
  /engine/embedding/
  Implement:
  1. Similarity computation
  - cosine similarity
  - nearest neighbors
  2. Clustering (experimental only)
  - KNN graph or simple clustering
  Output:
  /outputs/embedding_clusters/
  PART 5 - DISCREPANCY DETECTION (CRITICAL)
  Compare:
  sparse_clusters vs embedding_clusters
  Detect:
  1. Items close in embedding but NOT in sparse cluster
  2. Items in same sparse cluster but FAR in embedding
  Output:
  /outputs/discrepancy_reports/
