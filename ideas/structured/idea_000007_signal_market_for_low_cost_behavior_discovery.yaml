    decision_boundary: "Exploration proposes; sparse and human review decide."
    pace_boundary: "Keep each batch small, usually 10-15 candidates, to protect reviewer load."
    query_boundary: "Query strategies are executable plans, not automated collection authority."
  immediate_operating_principle: "Solve the small-data hard spot by strategic expansion, not by broad crawling; the system decides where and how to look, while humans or approved safe tools control actual lookup."
