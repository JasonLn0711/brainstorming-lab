status: execution_ready
problem_statement:
  raw: "Given Track B Threads investment-scam source-arm uncertainty, optimize the selection of high-information-density behavior signals under tight reviewer labor, governance, hard-negative, and aggregate-only constraints."
  normalized: "Given noisy Threads investment-scam candidate streams, optimize high-information-density behavior discovery under constraints of low reviewer labor, hard-negative protection, governance, uncertainty preservation, and aggregate-only reporting."
  structure:
    given: "noisy Threads investment-scam candidate streams and uncertain source arms"
    optimize: "high-information-density behavior discovery and source-arm investment decisions"
    constraints:
      - "low reviewer labor"
      - "hard-negative protection"
      - governance
      - "uncertainty preservation"
      - "aggregate-only reporting"
      - "no raw evidence in git"
summary: "Treat every source arm or signal family as an asset in a Signal Market, score it by behavior information gained per unit of reviewer effort, and upgrade the target project from a record-and-execute workflow into a Research Operating System that can compare batches, evolve signal taxonomy, generate research directions, keep clustering explainable through local sparse vectors, deliberately explore beyond already-seen patterns, and translate exploration tasks into auditable query strategies. The Fugu-style upgrade is a learned or searched conductor layer that chooses which modules to run, how much review depth to spend, and when to recurse instead of forcing every scam-research case through one fixed pipeline."
source_note_zh: "瓶頸不是找更多方法，而是不知道哪一種方法值得長大；下一步是建立會告訴你哪條路值得走的 Signal Market。"
v2_source_note_zh: "v2 核心是把 repo 從記錄與執行系統，升級成會自己產生方向的研究引擎；v1 問哪裡有 scam，v2 問哪種訊號最值得人類花時間。"
assumptions:
  - "The current bottleneck is not method generation; it is deciding which method deserves to scale."
  - "Replies, comments, and interactions may carry higher behavior density than top-level posts alone."
  - "The real optimization target is behavior information per reviewer hour, not raw candidate count."
  - "Batch 0003 should compare signal combinations rather than run a single source arm as another manual trial."
  - "Human cognitive load is part of the system and should be modeled directly."
  - "Cross-batch comparability is the missing capability that prevents the repo from becoming a research engine."
  - "A useful v2 needs taxonomy, evaluation, and evolution, not only batch execution records."
  - "Formal clustering should find units whose decisions can be merged, not merely items with high semantic similarity."
  - "Sparse features do not all need to be hand-authored; the system can define the observation language while data proposes emergent features."
  - "Embedding is useful as a scout and feature generator, but it should not become the decision layer at this stage."
  - "If the system only learns from existing candidates, it will overfit to the already-seen world and become slow to notice new scam forms."
  - "The next capability is not a better model; it is an exploration layer that learns where to look for data."
  - "The project has too little old data for a purely retrospective learning loop; the hard missing capability is strategic data discovery."
  - "Self-directed exploration should propose where to look and what to look for, while actual access and adjudication remain in the existing governed review flow."
  - "Fugu-style orchestration is useful only if the conductor chooses between cheap triage, evidence expansion, hard-negative review, query strategy generation, and report synthesis under explicit cost and review-labor budgets."
  - "The coordinator must optimize for reviewer burden, uncertainty preservation, and false-confidence control, not raw agent count."
  - "Recursive retry should be allowed only when it produces an explicit evidence delta, a clearer abstention, or a narrower next test."
  - "The official Sakana Fugu page supports the system-level orchestration framing, but product benchmark claims still need independent cost-normalized and latency-normalized validation before they become research evidence."
insights:
  - "Post-level evidence is often too coarse; reply, comment, and interaction traces expose behavior."
  - "Micro-behavior extraction can normalize visually different scams into repeated action units."
  - "Reviewer behavior modeling turns cognitive burden into a measurable design variable instead of an anecdote."
  - "A good discovery system should automatically produce research-candidate statements when a signal has high yield under low review cost."
  - "The deeper research object is information-efficiency optimization: how much high-value signal a reviewer can safely judge per unit time."
  - "Behavior graphs can expose funnel depth, branching, redirect, and coordination patterns without relying only on message semantics."
  - "The right v2 clustering default is local sparse vectors because the repo needs controllable and auditable behavior-pattern clusters."
  - "A sparse-vs-embedding discrepancy loop can tell the researcher where their current observation language is missing or too broad."
  - "The current system compresses, compares, and abstracts known candidates; exploration must add controlled exposure to unknown or low-signal regions."
  - "Embedding should also look for unlike cases, not only similar cases: outliers are potential sources of new feature language."
  - "The next upgrade is not a crawler; it is an exploration decision layer that produces source-pattern-risk tasks and metadata-only candidate stubs."
  - "A system that suggests where to look can expand data strategically while preserving the repo's auditability and low-reviewer-labor design."
  - "The bridge from exploration to execution is query strategy generation: convert an EXP task into search intent, query patterns, structure patterns, filters, and risk controls."
  - "The system is still not collecting data; it is generating a plan for how a governed human or future safe tool should look."
  - "The useful AI unit is not a single model; for this project, it is a governed review system with a coordinator, workers, evaluators, evidence logs, and stop rules."
  - "The scam-research version of Fugu-style design is not product magic from a model pool; it is a local control policy over attack simulation, detector review, judge evaluation, hard-negative review, query strategy, and report synthesis."
  - "The existing AI A / AI B / Judge structure maps cleanly onto Attacker / Detector / Evaluator workers, but the research value comes from the conductor deciding when each role is worth the extra cost."
research_operating_system_v2:
  thesis: "Upgrade the target repo from workflow, governance, and batch execution into a market plus decision engine that can generate research direction."
  first_principle: "The goal is not scam detection; the goal is to maximize high-value candidate discovery per unit reviewer effort."
  missing_capability: "Cross-batch comparability."
  transformation:
    from: "record and execute system"
    to: "research engine that compares, evolves, and generates insight"
  layers:
    - name: "Signal Layer"
      purpose: "Define what the world looks like before review."
      fields:
        - signal_family
        - source_arm
        - behavior_pattern
        - context
    - name: "Measurement Layer"
      purpose: "Turn every signal into a comparable asset."
      fields:
        - yield_rate
        - review_time
        - confidence
        - false_positive_pressure
        - information_density
    - name: "Market Layer"
      purpose: "Make signals compete through Signal Value Score."
      fields:
        - signal_value_score
        - per_signal_ranking
        - per_batch_ranking
    - name: "Evolution Layer"
      purpose: "Generate clusters, hypotheses, anomalies, and research candidates."
      fields:
        - cluster
        - hypothesis
        - anomaly
        - research_candidate
fugu_style_orchestration_layer:
  source_note: "Captured from the 2026-05-05 discussion of Sakana Fugu as an AI orchestration layer and verified against the official Sakana Fugu beta page."
  first_principle: "The goal is not to run more agents. The goal is to choose the cheapest reliable workflow depth for each scam-research question while preserving evidence boundaries."
  paradigm_shift: "Move from one model answering everything to a system that decides how multiple specialized models or modules should cooperate."
  core_definition: "Make the thinking workflow itself learnable, schedulable, and evaluable. The system improves how models are used, not only which model is stronger."
  decision_architecture_frame:
    thesis: "Fugu-style architecture is not primarily a model architecture. It is a decision architecture for organizing intelligence under uncertainty, cost, and feedback limits."
    core_question: "For this task state, who should work, in what order, with what context, under whose review, and when should the system stop?"
    strategic_choices:
      - "train a larger model"
      - "rerun the same model more times"
      - "build a system that decomposes, assigns, checks, repairs, and stops"
    chosen_path: "Use decomposition, assignment, evaluation, and repair as the learnable object."
    research_translation: "The research object is workflow policy learning, not simply prompt engineering or agent count."
  economic_model:
    principle: "Division of labor creates quality gains, but coordination can consume those gains."
    total_value_formula: "total_value = task_quality_gain - coordination_cost - inference_cost - error_propagation_cost"
    decision_rule: "Use extra workers only when expected quality or safety gain exceeds coordination, inference, and propagation costs."
    cost_terms:
      - communication_cost
      - duplicate_work_cost
      - context_loss_cost
      - inter_agent_misunderstanding_cost
      - budget_overrun_cost
      - error_propagation_cost
  policy_learning_formalization:
    policy: "policy(task_state) -> workflow_action"
    state:
      - task
      - current_answer
      - failure_signals
      - evidence_state
      - risk_level
      - spent_cost
      - remaining_budget
      - reviewer_load
    action:
      - select_worker
      - assign_subtask_prompt
      - select_context
      - set_communication_topology
      - add_parallel_review
      - recurse_with_named_gap
      - stop_accept
      - stop_abstain
      - park_for_human_review
    reward:
      - answer_correctness
      - evidence_sufficiency
      - hard_negative_protection
      - format_validity
      - cost_control
      - latency_control
      - reviewer_burden_reduction
      - user_decision_value
    conductor_poster_mapping:
      - "participating agents"
      - "subtasks assigned to each agent"
      - "communication topology between agents"
  organization_theory_frame:
    metaphor: "The conductor is a temporary organization designer."
    routing_examples:
      simple: "one worker answers directly"
      medium: "one worker drafts and one worker checks"
      high_risk: "multiple reviewers plus final judge"
      high_uncertainty: "explore first, decide later"
    bounded_rationality_link: "Single agents have limited cognition, so the system uses procedure, hierarchy, review, and stop rules to approximate better decisions."
  control_theory_frame:
    open_loop: "input -> model -> output"
    closed_loop: "input -> plan -> execute -> evaluate -> repair -> output"
    feedback_signals:
      - inconsistent_answer
      - missing_evidence
      - invalid_format
      - reasoning_jump
      - budget_overrun
      - hard_negative_disagreement
    control_action: "Adjust the next workflow action based on evaluator-observed deviation."
  intelligence_formula: "intelligence = model_capability * orchestration_policy * feedback_quality * cost_constraint"
  minimal_architecture:
    flow: "User query -> Coordinator -> Task Graph -> Workers -> Evaluator -> Output"
    coordinator_output_schema:
      plan:
        - step: analyze
          worker: detector
          reason: "Score known behavior features first."
        - step: verify
          worker: hard_negative_reviewer
          reason: "Check false-positive and legitimacy risk."
        - step: judge
          worker: judge
          reason: "Decide output, recursion, abstention, or park."
    task_graph_rules:
      - "The graph is regenerated per case rather than fixed as one linear pipeline."
      - "Parallel branches are allowed for detector review and hard-negative review when ambiguity is high."
      - "Back edges are allowed only through a named evaluator finding, such as missing evidence or inconsistency."
      - "Every added node must declare expected evidence delta, cost, and stop condition."
    worker_interchangeability: "Workers may be LLMs, scripts, local scoring tools, search-intent generators, or database/report builders; routing should depend on task need, not provider identity."
  coordinator:
    role: "Conductor that chooses the workflow, worker mix, recursion depth, and stop condition per task."
    possible_implementation_paths:
      - "hand-scored policy table for the first fixture"
      - "searched orchestration policy over a small action space"
      - "learned conductor only after enough governed fixture traces exist"
  worker_pool:
    - name: "Attack simulator"
      purpose: "Generate plausible adversarial behavior hypotheses or scam evolution patterns without creating operational abuse instructions."
    - name: Detector
      purpose: "Score candidate metadata, sparse behavior features, and signal-family fit."
    - name: "Hard-negative reviewer"
      purpose: "Protect legitimate or ambiguous cases from being over-labeled."
    - name: "Exploration generator"
      purpose: "Suggest EXP_xxx tasks from SVS gaps, outliers, and underexplored source arms."
    - name: "Query strategy generator"
      purpose: "Translate exploration tasks into auditable search intent and risk controls."
    - name: Judge
      purpose: "Evaluate whether the workflow produced enough evidence, should recurse, should abstain, or should stop."
    - name: "Report writer"
      purpose: "Compress accepted evidence into aggregate-only, reviewer-readable output."
  routing_policy_sketch:
    cheap_path: "Known pattern, low ambiguity, sufficient metadata -> detector plus judge only."
    hard_negative_path: "High reputational or false-positive risk -> detector, hard-negative reviewer, judge."
    exploration_path: "Low coverage or outlier signal -> exploration generator, query strategy generator, judge."
    recursive_path: "Judge finds an explicit evidence gap -> conductor selects one more bounded pass with a named purpose."
    stop_path: "No evidence delta after recursion budget -> abstain or park instead of polishing a weak claim."
  evaluator_loop:
    question: "Is the result good enough for this evidence boundary?"
    retry_triggers:
      - "low confidence score"
      - "detector and hard-negative reviewer disagree"
      - "missing required metadata field"
      - "claim lacks aggregate-only evidence support"
      - "judge detects inconsistency between signal family and recommendation"
    allowed_responses:
      - "retry with a narrower prompt"
      - "route to a different worker"
      - "request one bounded context addition"
      - "add a hard-negative review branch"
      - "abstain or park when evidence is insufficient"
    loop_limits:
      max_iterations: 3
      require_named_reason: true
      require_cost_budget: true
      require_evidence_delta: true
      stop_on_raw_evidence_risk: true
  implementation_layers:
    layer_1_fixed_pipeline:
      status: "current baseline"
      flow: "AI A attack/hypothesis generation -> AI B detection/filtering -> Judge evaluation"
      goal: "Keep the fixed pipeline as the control group."
    layer_2_evaluator_loop:
      status: "next build"
      flow: "Run fixed pipeline, then let Judge trigger bounded retry/refine/abstain actions."
      done_condition: "Each retry records trigger, selected action, cost, and outcome."
    layer_3_dynamic_strategy:
      status: "research upgrade"
      flow: "Coordinator chooses whether to add a worker, skip a worker, recurse, or stop based on case type and evidence state."
      done_condition: "Conductor-selected routing beats fixed pipeline after cost, latency, worker-call, hard-negative, and abstention normalization."
  design_questions:
    rerun_trigger: "Use confidence score, consistency check, rule-based missing-field triggers, and hard-negative disagreement."
    infinite_loop_control: "Set max_iterations=3, cost_limit, raw-evidence stop, and require a named evidence gap for every loop."
    quality_evaluation: "Combine rule-based schema checks, cross-worker agreement, and external or synthetic fixture truth where available."
  test_time_scaling_boundary:
    allowed: "Spend more inference only when the extra pass is tied to a named uncertainty, evidence gap, or review-risk reduction."
    forbidden: "Unlimited self-reflection loops, crawler expansion, raw evidence storage, or legal fraud determination."
  mermaid_mind_model: |
    flowchart TD
        A[User Task / Problem] --> B[Conductor / Coordinator]
        B --> C{Task Difficulty / Uncertainty / Risk / Cost Budget}
        C -->|Simple| D[Direct Answer Agent]
        C -->|Medium| E[Planner Agent]
        C -->|Hard| F[Dynamic Multi-Agent Team]
        E --> E1[Subtask 1]
        E --> E2[Subtask 2]
        E --> E3[Subtask 3]
        F --> F1[Research Agent]
        F --> F2[Reasoning Agent]
        F --> F3[Critic Agent]
        F --> F4[Writer Agent]
        D --> G[Draft Output]
        E1 --> G
        E2 --> G
        E3 --> G
        F1 --> H[Shared Working Memory]
        F2 --> H
        F3 --> H
        F4 --> H
        H --> G
        G --> I[Evaluator / Judge]
        I --> J{Good Enough?}
        J -->|Yes| K[Final Answer]
        J -->|No| L[Repair Decision]
        L --> L1[Ask More Context]
        L --> L2[Change Agent]
        L --> L3[Rewrite Prompt]
        L --> L4[Run More Iterations]
        L --> L5[Stop Due to Budget]
        L1 --> B
        L2 --> B
        L3 --> B
        L4 --> B
        L5 --> K
  smallest_next_test: "Build a tiny 6-case synthetic fixture comparing fixed pipeline versus conductor-selected path: two obvious cases, two hard negatives, one outlier, and one insufficient-evidence case."
  success_metric: "Conductor path reduces unnecessary worker calls while preserving or improving hard-negative protection, evidence sufficiency, and abstention quality."
  kill_condition: "If a fixed pipeline matches the conductor after cost, latency, and reviewer-labor normalization, keep the simpler fixed workflow."
  codex_prompt_minimal_fugu_fixture: |
    You are implementing the first Minimal Fugu fixture for a governed scam-research system.
    Goal:
    Compare a fixed AI A / AI B / Judge pipeline against a conductor-selected workflow.
    Inputs:
    - six synthetic, non-sensitive cases:
      1. obvious scam-like behavior
      2. obvious scam-like behavior
      3. hard negative / legitimate ambiguous case
      4. hard negative / legitimate ambiguous case
      5. outlier behavior pattern
      6. insufficient-evidence case
    Components:
    - Coordinator: choose workflow nodes and stop condition.
    - Task Graph: record selected nodes, edges, reasons, cost estimate, and expected evidence delta.
    - Workers: attack simulator, detector, hard-negative reviewer, exploration generator, query strategy generator, judge, report writer.
    - Evaluator: decide accept, retry, add worker, abstain, or park.
    Rules:
    - Do not use raw platform content.
    - Do not include PII.
    - Do not make legal fraud determinations.
    - Every recursive pass needs a named trigger and evidence delta.
    - max_iterations = 3.
    - Track worker_call_count, estimated_cost, latency_proxy, hard_negative_protection, abstention_quality, and evidence_sufficiency.
    Output:
    - a fixture YAML schema
    - a conductor action-space YAML
    - one dry-run trace for fixed pipeline
    - one dry-run trace for conductor-selected routing
    - a comparison table showing whether dynamic routing earned its extra complexity
v2_critical_capabilities:
  - name: "Problem Normalization Engine"
    purpose: "Convert each candidate into a problem representation so different-looking scams can map to reusable templates."
    representation_fields:
      - goal
      - mechanism
      - target
      - channel
    example:
      goal: "引導聯絡"
      mechanism: "社群信任建立"
      target: "投資新手"
      channel: reply
  - name: "Behavior Graph"
    purpose: "Represent a thread as a graph instead of a single observation."
    graph_model:
      nodes:
        - user
        - message
      edges:
        - reply
        - mention
        - redirect
    derived_metrics:
      - funnel_depth
      - branching_pattern
      - coordination_signal
  - name: "Reviewer Cost Modeling"
    purpose: "Measure the cognitive cost of review so optimization targets effective signal per second."
    observable_fields:
      - time_spent
      - scroll_depth
      - re_read_count
      - uncertainty_flag
    optimization_target: effective_signal_per_second
v2_repo_module_map:
  meta-system:
    signal_registry: "Signal definitions and approved source-arm taxonomy."
    behavior_units: "Standardized micro-behavior catalog."
    problem_templates: "Normalized goal, mechanism, target, channel templates."
    signal_clusters: "Cross-batch signal and behavior clusters."
  metrics:
    batch_logs: "Structured candidate-review metadata by batch."
    signal_scores: "SVS outputs, rankings, and anomaly flags."
    reviewer_metrics: "Reviewer time, uncertainty, scroll, re-read, and cognitive-load traces."
  experiments:
    batch_variants: "Controlled batch variants with hypotheses and measurement plans."
  engine:
    svs_calculator: "Compute SVS per signal and per batch."
    clustering_engine: "Group behavior units and problem templates."
    research_generator: "Generate research candidates from high-SVS or anomalous patterns."
  outputs:
    research_candidates: "Editor- or project-facing candidate statements."
    cluster_reports: "Cluster summaries and merge/duplicate pattern reports."
batch_as_experiment:
  definition: "Batch = controlled experiment."
  required_fields:
    - hypothesis
    - variant
    - expected_outcome
    - measurement_plan
  rationale: "Without this structure, the repo is only running workflow rather than learning across batches."
agent_assisted_research_system:
  automation_targets:
    - "Find clusters through embedding and similarity."
    - "Detect anomalies such as sudden yield increases."
    - "Generate research questions from ranked signal behavior."
  example_research_question: "Why does reply funnel produce higher yield than post-level review under the same reviewer budget?"
cluster_engine_strategy:
  decision: "Use local sparse vectors for v2 formal clustering."
  rationale: "The current need is controllable, explainable decision support rather than maximum semantic abstraction."
  rejected_options:
    embedding_as_primary:
      reason: "Too early; clustering becomes a black box before the signal space is defined."
      risk:
        - "weak governance explanation"
        - "harder reviewer audit"
        - "premature semantic optimization"
    schema_only:
      reason: "Too shallow; schema without clustering will not produce insight."
      risk:
        - "stays in design mode"
        - "does not reduce duplicate reviewer work"
  sparse_vector_principle: "Sparse = decision backbone; embedding = scout and feature generator."
  sparse_cluster_goal: "Find behavior-pattern groups where reviewer decisions may be merged or repeated work reduced."
  vector_example:
    誘導聯絡: 0/1
    保證收益: 0/1
    社群導流: 0/1
    reply_funnel: 0/1
    needs_thread: 0/1
    review_time_bucket: "low / medium / high"
  feature_layers:
    - name: "Core features"
      owner: human-defined
      size_hint: "10-20 features"
      examples:
        - "誘導聯絡"
        - "保證收益"
        - "社群導流"
        - reply_funnel
        - needs_thread
      purpose: "Stable cognitive frame for governance and review."
    - name: "Emergent features"
      owner: data-proposed
      examples:
        - LINE_ID_pattern
        - emoji_money_pattern
        - repeated_script_template
      promotion_rule: "Appears repeatedly in reviewed batches, especially high-risk candidates, then enters human review."
      purpose: "Let the feature space grow without forcing humans to define every detail up front."
    - name: "Experimental features"
      owner: reviewer-proposed
      examples:
        - has_screenshot_claim
        - has_fake_testimonial
      lifecycle: "Use for one or a few batches, then promote, revise, or delete."
      purpose: "Support temporary tests without polluting the stable schema."
  feature_schema:
    fields:
      - feature_id
      - type
      - definition
      - activation_rule
      - status
      - supporting_cases
      - reviewer_decision
    activation_example:
      feature_id: LINE_ID_pattern
      type: emergent
      activation_rule: "contains('LINE') AND contains_number"
  dual_track_pipeline:
    principle: "Run sparse and embedding separately; let them meet only at feature-discovery review."
    pipeline_a:
      name: "Sparse Decision Engine"
      role: primary
      outputs:
        - SVS
        - formal_sparse_clusters
        - reviewer_output
      decision_authority: true
    pipeline_b:
      name: "Embedding Discovery Engine"
      role: secondary
      outputs:
        - similarity_graph
        - exploratory_embedding_clusters
        - anomaly_or_pattern_suggestions
      decision_authority: false
    only_intersection:
      name: "Feature Discovery Engine"
      process:
        - "Compare sparse clusters against embedding clusters."
        - "Detect close-in-embedding but separated-in-sparse cases."
        - "Detect same-sparse-cluster but far-in-embedding cases."
        - "Generate feature candidates."
        - "Send feature candidates to human review before schema update."
  discrepancy_types:
    missed_pattern: "Embedding groups cases that sparse features do not explain; candidate new feature may be needed."
    over_generalization: "Sparse groups cases that embedding separates; feature definition may be too broad."
  evolution_path:
    v2: "sparse vector -> explainable clusters"
    v3: "hybrid sparse + embedding, with sparse still preserving governance-facing explanation"
exploration_layer:
  thesis: "Move from learning from data to learning where to look for data."
  problem: "A system trained only on existing candidates can reinforce known patterns, add increasingly complex features, and stall insight."
  self_directed_direction: "Prioritize system-generated exploration tasks because the current historical dataset is too small and the target repo lacks its own data-discovery capacity."
  framing:
    current_system:
      - "compression through sparse vectors"
      - "contrast through embedding-vs-sparse discrepancy"
      - "abstraction through feature discovery"
    limitation: "All three rely on candidates that have already been collected."
    needed_shift: "Add data acquisition strategy to representation learning."
  exploitation_vs_exploration:
    exploitation: "Prioritize high-SVS known signals and refine existing behavior representations."
    exploration: "Deliberately sample uncertain, low-signal, random, or outlier regions to discover unseen patterns."
  exploration_modes:
    - name: "Weak exploration"
      level: immediate
      mechanism: "Add controlled randomness to batch selection."
      default_policy: "80 percent high-SVS or known-promising signals, 20 percent random, low-signal, or unknown-source candidates."
      purpose: "Expose the system to low-probability regions where new patterns may hide."
      examples:
        - fake_testimonial_threads
        - emotional_scam_without_investment_language
        - weak_contact_cues
    - name: "Medium exploration"
      level: near-term
      mechanism: "Use embedding outlier detection to find candidates unlike known clusters."
      prompt_question: "What does not fit any known cluster?"
      outputs:
        - outlier_candidates
        - unknown_behavior_notes
        - feature_candidate_prompts
    - name: "Strong exploration"
      level: v3
      mechanism: "Let the system propose where to search next based on SVS gaps and missing evidence."
      example_gap: "reply funnel is strong, but DM transition has little data"
      example_suggestion: "Explore DM-based interaction patterns under governance-safe metadata-only constraints."
  exploration_policy_config:
    exploit_ratio: 0.7
    explore_ratio: 0.3
    random_sampling_ratio: 0.2
    max_candidates_per_batch: 15
    outlier_priority: high
    underexplored_signal_boost: true
    outlier_detection: true
    low_signal_sampling: true
    unknown_source_required_per_batch: true
    embedding_outlier_review: "metadata-only, discovery-only, never decision authority"
  batch_selection_policy:
    known_signal_ratio: 0.8
    exploration_ratio: 0.2
    required_unknown_slot: true
    selection_buckets:
