        explore_ratio: 0.3
        outlier_priority: high
        underexplored_signal_boost: true
        max_candidates_per_batch: 15
    - name: "Exploration Generator"
      purpose: "Turn SVS ranking, discrepancy reports, and embedding outliers into structured exploration tasks."
      input:
        - "SVS ranking"
        - "sparse-vs-embedding discrepancy"
        - "embedding outliers"
      output_fields:
        - task_id
