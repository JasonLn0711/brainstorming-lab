      - "missing behavior units"
      - "reviewer uncertainty"
    output_format:
      - gap_id
      - missing_evidence
      - suggested_exploration_source
      - expected_learning_value
      - governance_boundary
  anti_overfit_rules:
    - "Every batch should include a small unknown-source or low-signal allocation unless governance risk is elevated."
