  3. Run embedding clustering
  4. Detect discrepancy
  5. Generate feature candidates
  6. Human review
  7. Update sparse schema
  PART 9 - GUARDRAILS
  STRICT RULES:
  - embedding results are NEVER used for decision
  - sparse is the ONLY decision layer
  - no raw Threads content stored
  - no PII
  - only structured metadata
  PART 10 - OUTPUTS
  Generate:
  1. sparse_clusters
  2. embedding_clusters (exploratory)
  3. discrepancy_report
  4. feature_candidates
  5. updated_sparse_schema (after approval)
  FINAL GOAL
  The system must:
  - improve feature set over time
  - reduce reviewer cost
  - increase high-value discovery rate
  - remain explainable and auditable
  Think like a system that learns structure, not a model that predicts labels.
