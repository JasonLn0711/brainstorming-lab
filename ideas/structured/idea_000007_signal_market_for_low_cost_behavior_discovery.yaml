      - low_signal_or_sparse_unknowns
      - embedding_outliers
      - source_arm_gaps
  outlier_detector:
    role: "Find candidates far from all known clusters in embedding or sparse-feature space."
    outputs:
      - candidate_id
      - distance_to_nearest_cluster
      - nearest_known_cluster
      - possible_new_pattern_note
      - recommended_review_priority
    guardrail: "Outlier status is a discovery signal, not a risk label."
  source_arm_gap_detector:
    role: "Suggest what source arm or interaction pattern needs more data."
    inputs:
