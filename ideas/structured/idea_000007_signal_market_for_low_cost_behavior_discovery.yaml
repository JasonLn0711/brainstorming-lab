  The goal is NOT classification.
  The goal is:
  "maximize high-value candidate discovery per unit reviewer effort,
  while maintaining explainability and governance."
  PART 1 - CORE ARCHITECTURE
  Implement TWO SEPARATE pipelines:
  Pipeline A = Sparse Decision Engine (PRIMARY)
  Pipeline B = Embedding Discovery Engine (SECONDARY)
  DO NOT merge them into one model.
  PART 2 - DATA STRUCTURE
  Create schema:
  /data/candidates/
  Each candidate file:
  candidate_id:
  batch_id:
