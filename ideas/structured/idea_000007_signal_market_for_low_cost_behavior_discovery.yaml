  learning_goal: "The system should tell the researcher not only what the known world looks like, but where the current map is probably incomplete."
self_directed_data_discovery_layer:
  core_design: "Let the system generate where to look, what to look for, and why; keep access, collection, and judgment inside the existing safe workflow."
  not_a_crawler: true
  boundary_statement: "The system creates exploration tasks and metadata-only candidate stubs; it does not directly access external systems, store raw Threads content, or decide risk."
  current_flow:
    - "human selects source arm"
    - "human collects data"
