        source_hint: "reply/comment funnel"
        search_cues:
          - "contact cue"
          - "numeric id pattern"
        priority: high
        reason:
          - "high discrepancy"
          - "sparse under-representation"
    - name: "Query Strategy Generator"
      purpose: "Convert exploration tasks into executable search strategies without accessing external systems."
      input:
        - "EXP_xxx exploration task"
      output_fields:
        - task_id
        - search_intent
        - query_patterns
        - structure_patterns
        - where_to_look
        - what_to_ignore
        - risk_control
      example:
        task_id: EXP_0007
        search_intent: "find reply threads containing contact transition behavior"
        query_patterns:
          - "私訊我"
          - "加LINE"
          - "帶你操作"
          - "穩定獲利"
        structure_patterns:
          - "reply chain length >= 2"
          - "repeated contact cue across replies"
        where_to_look:
          - "reply sections"
          - "comment threads"
        what_to_ignore:
          - "pure discussion without action guidance"
          - "single-line ads without interaction"
        risk_control:
          - "do not record account IDs"
          - "do not store raw conversation text"
          - "record only boolean or categorical pattern presence"
    - name: "Candidate List Builder"
      purpose: "Convert exploration tasks into small metadata-only candidate stubs."
      output_fields:
        - candidate_stub_id
        - task_id
        - signal_hint
        - expected_behavior
        - collection_method
      example:
        candidate_stub_id: STUB_0012
        task_id: EXP_0007
        signal_hint: reply_funnel
        expected_behavior: contact_transition
        collection_method: "manual-assisted / safe query"
    - name: "Outlier Engine"
      purpose: "Mark candidates that are unlike all known clusters as discovery leads."
      rule: "if distance_to_all_clusters > threshold, mark as OUTLIER"
      output_fields:
        - outlier_id
        - reason
        - suggested_focus
      example:
        outlier_id: O_0003
        reason: "far from all known clusters"
        suggested_focus: "non-investment emotional manipulation?"
  task_to_stub_loop:
    - "Existing data updates SVS and clusters."
    - "Discrepancy and outlier signals feed the Exploration Generator."
    - "The generator creates EXP_xxx exploration tasks."
    - "Query Strategy Generator turns EXP_xxx tasks into search templates."
    - "Candidate List Builder creates metadata-only STUB_xxx records."
    - "Stubs enter governed sparse plus review flow."
    - "Observed new features and SVS changes update exploration policy."
  task_schema:
    task_id: EXP_0000
    hypothesis: "What under-covered behavior or source arm might produce high-value candidates?"
    source_hint: "source arm or interaction surface"
    search_cues:
      - cue_a
      - cue_b
    priority: "low / medium / high"
    reason:
