      - action
      - "social interaction"
      - "pain and pleasure"
      - "memory across lived time"
      - "survival and care"
    feedback_loop: "prediction -> action/perception -> consequence -> model revision"
    stakes: "error can cause pain, loss, social harm, or death"
  llm_prediction:
    source:
      - "language distribution"
      - "human-written explanations"
      - "latent textual patterns"
      - "tool or multimodal feedback when added by system design"
    feedback_loop: "context -> token prediction -> external evaluation or optional tool/agent correction"
    stakes: "usually no intrinsic pain, homeostasis, mortality, or self-preservation"
  open_question: "Are embodiment and stakes necessary for understanding, or only for a specifically human kind of understanding?"
research_frame:
  candidate_fields:
    - pragmatics
    - implicature
    - theory_of_mind
    - mental_state_inference
    - embodiment
    - literary_theory
    - cognitive_science
    - ai_evaluation
    - predictive_processing
    - philosophy_of_mind
    - semantic_grounding
    - embodied_cognition
  proposed_question: "How well can LLMs infer implied psychological states in culturally situated literary language, and where do they fail when surface style is separated from pragmatic context?"
  possible_contribution: "A small literary-pragmatics and understanding-level benchmark that separates literal reading, implied emotion, evidence-grounded interpretation, ambiguity handling, predictive updating, action-grounding, and embodiment-aware limits."
  candidate_fixture_examples:
    - phrase: "寒梅著花未"
      layers:
        literal: "asking whether the cold-season plum blossoms have bloomed"
        implied: "homesickness and fear of asking more painful questions, expressed indirectly through inquiry about hometown scenery"
        mechanisms:
          - "借景抒情"
          - "indirect expression"
          - "cultural memory"
          - "emotional restraint"
          - "不敢問"
          - "defensive buffering"
    - phrase: "這裡有點冷"
      layers:
        literal: "the room is somewhat cold"
        implied: "possibly an indirect request to close a window or adjust the room"
        mechanisms:
          - "indirect request"
          - pragmatics
          - "context dependence"
    - phrase: "欲說還休"
      layers:
        literal: "wanting to speak, then stopping"
        implied: "pain remains unsaid because speaking may invite trivialization, failed comfort, or further injury"
        mechanisms:
          - "不敢說"
          - "failed reception"
          - "emotional self-protection"
          - loneliness
