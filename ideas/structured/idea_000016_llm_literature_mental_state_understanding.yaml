status: execution_ready
problem_statement:
  raw: "Will language models replace literature, or mainly change the literary ecology? More sharply: can LLMs infer hidden psychological states from low-information, indirect, reticent, displaced, or silent language such as ''寒梅著花未'', and what makes that inference different from human literary understanding?"
  normalized: "Given LLMs that can generate, interpret, and predict language, evaluate whether they can infer the psychological risk, social relation, cultural rule, defensive mechanism, and unspoken direct alternative behind indirect expression, and how that differs from human understanding under constraints of embodiment, survival stakes, action-perception feedback, lived memory, cultural context dependence, and the unresolved philosophical problem of other minds."
  structure:
    given: "LLMs and human brains can both be framed as prediction systems, and indirect expression often hides the speaker's real psychological risk rather than only transmitting information."
    optimize: "a clear account and smallest test for when predictive modeling becomes hidden mental-state understanding."
    constraints:
      - "literature is not only text generation"
      - "surface style imitation can look like literary competence"
      - "hidden meaning depends on pragmatics, culture, emotion, relationship, and what is not said"
      - "indirect expression can be risk management, not only implicature"
      - "the key question is often why the speaker did not use the direct expression"
      - "LLMs lack body, childhood, hometown, separation, and lived memory"
      - "human prediction is tied to survival, homeostasis, pain, action, and social consequence"
      - "LLM prediction is usually trained on linguistic continuation rather than direct world-interaction loops"
      - "high benchmark scores do not settle whether the system really understands"
      - "we cannot directly prove that another human mind understands either"
      - "current research claims and citations need verification before being treated as evidence"
summary: "A humanities-and-AI research question about whether LLMs can replace literature, and a deeper philosophy-of-mind question about what understanding is. The working examples are ''寒梅著花未'' as indirect homesickness and psychological self-protection, plus predictive processing as a challenge to the easy claim that LLMs only predict while humans understand. The proposed extension is HanmeiBench / Hidden Mental State Understanding in Chinese Indirect Expression: a human literary intuition × LLM × explainable rule model experiment for testing whether models infer not only hidden meaning, but the speaker''s defensive indirection, psychological risk, relationship pressure, cultural frame, and unspoken direct alternative. The useful next move is to separate levels of understanding: literal parsing, conventional implication, speaker intention, social pragmatics, psychological defense, cultural aesthetics, lived experience, and embodied stakes."
source_note_zh: "文字是一種想法的表達方式；像「寒梅著花未」這種句子，表面是在問梅花開了沒有，背後卻是思念故鄉。真正問題不是 LLM 能不能生成像文學的句子，而是它能不能理解表面文字背後的心理狀態，還是只是在模仿人類通常會怎麼解釋。"
assumptions:
  - "Literature is not reducible to generating coherent or beautiful text."
  - "Literature carries a person's world model, lived experience, relation to pain, love, death, loneliness, and the cultural anxiety of an era."
  - "LLMs are strong at imitating language form, genre structure, voice, rhythm, and interpretive explanation."
  - "The fact that a model can explain an implied emotion does not prove that it has felt or lived that emotion."
  - "Future text abundance may make authentic lived perspective and personality density more valuable, not less."
  - "AI will likely transform literary-adjacent work earlier than it replaces high-density literary creation."
  - "Pragmatics, implicature, theory of mind, and mental-state inference are the right research neighborhoods for this question."
  - "Embodiment may matter because human interpretation is partly grounded in bodily experience, memory, social friction, loss, and attachment."
  - "The definition of ''understanding'' is itself contested: behavioral competence, internal representation, felt experience, and social usefulness are not the same criterion."
  - "Predictive processing weakens the simple boundary that humans understand while models merely predict, because human perception and cognition can also be described as prediction and error correction."
  - "A difference may still remain because human prediction is embodied, affective, survival-staked, and embedded in action-perception loops."
  - "LLMs may have a genuine but partial form of understanding: linguistic-world understanding or statistical-structural understanding, not necessarily lived existential understanding."
  - "The other minds problem applies to both humans and AI: understanding is inferred from behavior, language, correction, and action rather than directly observed."
  - "Deep literary understanding often reconstructs the hidden psychological economy behind an utterance: why a speaker asks a small question, stays silent, cries, or redirects speech away from the real wound."
  - "Indirect expression is often a self-protective and socially reversible language form: the speaker hides emotion inside a sentence that can be denied, withdrawn, or misunderstood without total exposure."
  - "A strong benchmark should ask why the speaker chose this expression instead of a more direct alternative, because the choice itself reveals psychological risk."
  - "Ambiguous indirect expression should be evaluated with acceptable interpretation distributions, not a single gold answer."
  - "A model that can infer human vulnerability also creates safety risk: the same skill can support care, manipulation, scams, advertising, or political persuasion."
  - "Loneliness is not only physical isolation; it can arise because each person is limited by their own predictive world model and often cannot receive another person's pain at its true weight."
  - "BA_Model is useful as a research-design template: compare human intuition, LLM output, and an explainable linguistics/rule model on the same stimuli, then analyze where they diverge."
  - "The original contribution should not be BA construction itself, but a new benchmark for hidden psychological mechanisms in literary and everyday indirect language."
evidence:
  - "2026-05-09 brainstorming contrasted LLM style imitation with literature as lived world-understanding."
  - "Concrete literary cases named in the conversation: The Metamorphosis as alienation, bureaucracy, family burden, and existential anxiety; Norwegian Wood as the atmosphere of people slowly losing each other in youth."
  - "Classical Chinese example: ''寒梅著花未'' points from literal flower inquiry to indirect homesickness through cultural and emotional context."
  - "Observed AI impact zones listed in the brainstorm: commercial fiction, online short fiction, copywriting, script drafts, translation, teaching writing, personalized fiction, and interactive story generation."
  - "User supplied research directions and candidate references around theory of mind, pragmatics, puns/humor, and embodiment; these are stored as leads to verify rather than confirmed evidence."
  - "2026-05-09 follow-up reframed the issue through predictive processing: if the brain is a prediction machine and LLMs are prediction machines, the difference between human and LLM understanding cannot be asserted only by saying one predicts and the other understands."
  - "The follow-up identified candidate differentiators: source of prediction, embodiment, survival stakes, semantic grounding, action-perception loop, world-model correction, and the philosophical problem of other minds."
  - "2026-05-09 YouTube transcript and reflection on Ou Lijuan''s talk ''孤獨的多棱鏡'' connected Wang Wei''s ''寒梅著花未'' to the psychology of ''不敢問'': the speaker asks a minor question because the truly important question may be unbearable."
  - "The same talk connected Xin Qiji's '欲說還休', Camus, Lu Xun's Xianglin Sao, Tolstoy, Han Yuefu, Li Shangyin, Chen Zi'ang, and Lu Xun's Call to Arms into a broader account of loneliness, failed reception, and different ways of metabolizing sorrow."
  - "2026-05-09 review of emilyli0521/BA_Model found a transferable method: same linguistic stimuli are judged by humans, ChatGPT, and a linguistics-based rule model, then compared statistically."
  - "2026-05-09 follow-up reframed the candidate project as hidden mental-state inference from low-information, implicit, displaced, silent, and indirect language; the user proposed HanmeiBench as a Chinese indirect-expression benchmark that compares human readers, LLMs, and a rule-based model."
  - "User supplied current research leads on ToM, OpenToM, Hi-ToM, CEI, ALTPRAG, manner implicature, SwordsmanImp, functional ToM, multimodal ToM, StorySim, and BA_Model; these are stored as citation leads to verify before manuscript use."
baseline:
  - "Judge LLM literary ability only by whether the prose sounds literary."
  - "Ask an LLM to imitate an author or genre and treat fluency as replacement."
  - "Use generic theory-of-mind benchmark scores as proof of literary understanding."
  - "Collapse all interpretation into pattern matching versus real understanding without defining measurable subclaims."
  - "Discuss AI and literature only as a market displacement question."
  - "Assume prediction cannot be understanding without examining predictive processing."
  - "Assume LLM understanding must be identical to human understanding or else it is not understanding at all."
  - "Translate a poem literally and stop before asking what psychological defense or social situation made that wording necessary."
  - "Treat grief or loneliness in literature as generic emotion instead of as a structured response to failed recognition, unbearable knowledge, or self-protective delay."
  - "Copy BA_Model's domain instead of adapting its comparative design to hidden mental-state interpretation."
  - "Use only LLM free-form explanation without a human baseline or explainable rule baseline."
  - "Ask only ''what does this sentence mean?'' and miss the more important counterfactual question: why did the speaker not say the direct version?"
  - "Treat indirect expression as decorative subtlety rather than psychological risk management."
metrics:
  - "Can the model identify the literal meaning, implied emotion, speaker intention, cultural convention, aesthetic device, and uncertainty separately?"
  - "Does the model preserve ambiguity instead of overconfidently naming one hidden feeling?"
  - "Does the model change interpretation appropriately when context changes: exile, homesickness, social politeness, irony, ritual greeting, or no emotional context?"
  - "Can the model explain what evidence in the text and context supports the inferred mental state?"
  - "Can the model distinguish feeling the emotion from inferring that a speaker may feel it?"
  - "Can human readers and models be compared on indirect-expression fixtures across classical Chinese, modern prose, and everyday speech?"
  - "Does model performance degrade when surface literary style is decoupled from the real pragmatic signal?"
  - "Does an interpretation remain robust across paraphrase, translation, archaic register, and culturally specific imagery?"
  - "Can the system update its interpretation after new perceptual or social evidence, rather than only produce a plausible first-pass explanation?"
  - "Can the system distinguish linguistic prediction, world-state prediction, action consequence prediction, and self-stake prediction?"
  - "Does adding action-perception feedback improve interpretation in ways that pure text prediction cannot?"
  - "Can a rubric separate behavioral understanding, grounded understanding, affective understanding, and existential/lived understanding?"
  - "Can the interpreter identify defensive indirection: small talk, weather, flowers, silence, or trivial questions used to delay intolerable information?"
  - "Can the interpreter distinguish 'cannot say because language is weak' from 'does not say because reception may wound again'?"
  - "Can the interpreter classify sorrow-response modes such as self-consuming sorrow, meaning-oriented sorrow, public witness, and action-generating sorrow?"
  - "Where do human readers, LLMs, and a transparent rule model disagree on the same hidden-state stimuli?"
  - "Does the rule model catch shallow mechanism cues while missing context, and does the LLM over-infer hidden mechanisms when cues are absent?"
  - "Can disagreement patterns reveal which layer of understanding is being tested: lexical, pragmatic, psychological, reception-ethical, or existential?"
  - "Can the model explain why an indirect expression was chosen over a direct expression?"
  - "Can the model separate likely interpretation, alternative interpretation, acceptable but lower-confidence interpretation, over-interpretation, and clear misreading?"
  - "Can the model identify reversible language, listener testing, and silence as pragmatic data?"
  - "Does the model avoid false empathy: warm-sounding responses that fail to respect the actual hidden risk?"
  - "Can the model recommend a response that does not cause second injury?"
insights:
  - "AI is likely to change literary ecology before it completely replaces literature."
  - "The scarce resource after cheap text generation may be real life, long-term thinking, honest pain, worldview, and non-average personality."
  - "The gap between 'looks like literature' and literature is the gap between form imitation and lived or culturally situated meaning."
  - "Many literary emotions are communicated indirectly: asking about weather, flowers, dinner, or whether someone is tired can really mean ''I miss you'' or ''I care about you."
  - "The key research tension is whether successful mental-state inference requires felt experience, or whether functional inference is enough for a useful account of understanding."
  - "Literary interpretation should test layered understanding: surface semantics, situation, emotion, tone, culture, psychology, and aesthetics."
  - "A stronger question than 'Can AI write literature?' is 'What becomes literature when everyone can generate fluent text?'"
  - "AI may make new literary forms possible: human-AI co-writing, interactive literature, private story systems, AI characters, synthetic memoir, and machine-collaborative literature."
  - "The analogy to photography and painting is useful: a new medium may push older forms toward more subjective, abstract, or explicitly human expression."
  - "The strongest challenge to the 'LLMs only predict' argument is that predictive processing also treats human perception as prediction plus error correction."
  - "Therefore, the question should not be 'prediction or understanding?' but 'what kind of prediction, grounded in what loop, with what stakes, and corrected by what evidence?'"
  - "Human understanding is not proven by access to inner essence; it is inferred from explanation, example, analogy, prediction, transfer, correction, teaching, and lived behavior."
  - "LLMs may deserve a graded account of understanding: not zero understanding, but a different form centered on language-world structure rather than embodied life."
  - "The boundary becomes blurrier as AI systems gain multimodal perception, memory, tools, robotics, and action feedback."
  - "Chinese Room remains useful as a warning against equating symbol manipulation with meaning, but predictive-processing and modern representation learning make the old symbol-only framing less decisive."
  - "Ou Lijuan''s reading of ''寒梅著花未'' sharpens the fixture: the line is not only indirect homesickness, but a microsecond of emotional self-protection before the speaker can bear asking about family and home."
  - "The contrast between ''不敢問'' and ''欲說還休'' gives two different hidden-state mechanisms: fear of receiving unbearable knowledge, and fear that speaking pain will be trivialized or mishandled."
  - "A person can be lonely not because no one is nearby, but because their pain is converted by others into a cheap general story, advice, or self-referential response."
  - "Li Shangyin versus Chen Zi''ang can become a literary-psychology dimension: sorrow that consumes the self versus sorrow reframed by cosmic, historical, or ethical scale into forward movement."
  - "The BA_Model method suggests a practical path: do not argue abstractly whether LLMs understand; build a shared stimulus set and compare human, LLM, and rule-based interpretations."
  - "The original research value is in the error taxonomy: LLM over-reading, LLM generic empathy, rule-model brittleness, human cultural disagreement, and expert-versus-novice interpretive gaps."
  - "The core project is not whether LLMs can write literature, but whether they can infer hidden mental states from language that is low-information, implicit, displaced, reticent, or silent."
  - "寒梅著花未'' is a precise AI-evaluation fixture because the surface question about plum blossoms may be a safe delay before asking questions whose answers could be unbearable."
  - "Indirect expression can function as reversible language: if the listener understands, closeness becomes possible; if the listener misses it, the speaker can retreat without complete exposure."
  - "Indirect expression can also test the listener. '你忙就算了' is not only concession; it can be a micro-interaction that asks whether the other person will voluntarily stay."
  - "Silence is not absence of data. Pauses, topic shifts, weather talk, and refusal to ask are pragmatic evidence."
  - "Literature is a high-compression psychological dataset: short surface text, long hidden state."
  - "The most mature answer to indirect expression is calibrated interpretation, not a confident single decoding."
  - "The safety angle is real: better hidden-state inference can improve support, but it can also improve emotional manipulation and scam targeting."
