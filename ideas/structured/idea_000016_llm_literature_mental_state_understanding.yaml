related_work_gap_map:
  bottom_line: "No known single study has completed the full HanmeiBench question. Existing work covers adjacent pieces such as theory of mind, implicature, indirect speech acts, classical Chinese evaluation, cognitive modeling, grounding, and benchmark-validity critique, but does not yet combine Chinese literary and everyday indirect expression with hidden psychological risk, defense mechanism, cultural restraint, relationship pressure, and unspoken direct alternatives."
  nearest_research_routes:
    - route: theory_of_mind
      representative_studies:
        - year: 2022
          study: "Sap et al., Neural Theory-of-Mind?"
          contribution: "Probed large language models on social reasoning and false-belief-style tasks and argued that scale alone does not yield stable social intelligence."
          temporary_solution: "Establishes a baseline warning that LLM social reasoning should not be treated as solved by benchmark scores."
          remaining_gap: "Story QA and false-belief tasks do not test Chinese literary compression, indirect self-protection, reticent speech, or culturally framed silence."
        - year: 2023
          study: Hi-ToM
          contribution: "Tests higher-order recursive mental-state reasoning."
          temporary_solution: "Shows that LLM performance degrades as ToM order increases."
          remaining_gap: "Recursive belief tracking is not the same as interpreting why a speaker asks a safe minor question instead of an unbearable direct question."
        - year: 2024
          study: OpenToM
          contribution: "Uses longer narratives with character traits, intentions, and psychological states."
          temporary_solution: "Moves beyond short false-belief templates toward richer narrative mental-state tracking."
          remaining_gap: "Still primarily narrative ToM; it does not benchmark Chinese indirect expression, poetic restraint, or defense mechanisms such as 不敢問 and 不敢說."
        - year: 2024
          study: "Strachan et al., Testing theory of mind in large language models and humans"
          contribution: "Compares humans with GPT and LLaMA-family models on false belief, indirect requests, irony, faux pas, and related tasks."
          temporary_solution: "Shows strong ToM-like behavior in some model/task pairings and clear weakness in others."
          remaining_gap: "General social cognition is not enough to establish literary psychological pragmatics; model error profiles still need layer-specific analysis."
        - year: 2025
          study: "Riemer et al., Position: Theory of Mind Benchmarks are Broken for Large Language Models"
          contribution: "Argues that many ToM benchmarks fail to test adaptation to new partners in interaction."
          temporary_solution: "Clarifies why static ToM scorekeeping is insufficient."
          remaining_gap: "Does not provide the Chinese literary / everyday indirect-expression taxonomy needed here."
        - year: 2025
          study: MoMentS
          contribution: "Adds multimodal short-film scenarios for theory-of-mind evaluation."
          temporary_solution: "Opens a path toward gaze, gesture, speech timing, and nonliteral communication."
          remaining_gap: "Useful for later multimodal expansion, but not a text-centered Hanmei-style benchmark of silence, indirection, and cultural poetics."
        - year: 2026
          study: CogToM
          contribution: "Builds a broad ToM benchmark inspired by human cognitive paradigms."
          temporary_solution: "Broadens coverage across many ToM paradigms."
          remaining_gap: "Still ToM-general rather than psychological-pragmatic interpretation of Chinese indirect expression."
    - route: pragmatics_and_indirect_meaning
      representative_studies:
        - year: 2024
          study: SwordsmanImp
          contribution: "Introduces a Chinese multi-turn conversational implicature dataset based on My Own Swordsman / 武林外傳 dialogues."
          temporary_solution: "Shows Chinese conversational implicature can be benchmarked and that fluent explanations may still be weak."
          remaining_gap: "Comedy dialogue and Gricean maxims do not cover classical poetry, trauma-like silence, grief reception, defensive buffering, or retreatable language."
        - year: 2024
          study: "Cong, Manner implicatures in large language models"
          contribution: "Tests whether models understand implications triggered by marked or unusual phrasing, including why one wording is chosen over an alternative."
          temporary_solution: "Provides a formal-pragmatics bridge to the counterfactual question \"why this utterance rather than that one?\""
          remaining_gap: "The materials do not yet model Chinese literary psychology or interpersonal self-protection."
        - year: 2025
          study: "Ma et al., Pragmatics in the Era of Large Language Models"
          contribution: "Surveys datasets, evaluations, opportunities, and challenges for LLM pragmatics."
          temporary_solution: "Confirms that pragmatics is becoming a recognized evaluation domain."
          remaining_gap: "A survey does not solve the lack of a psychological-defense benchmark."
        - year: 2026
          study: ALTPRAG
          contribution: "Uses alternatives to test whether models infer speaker intention from the choice between contextually plausible utterances."
          temporary_solution: "Directly supports the HanmeiBench counterfactual method."
          remaining_gap: "Speaker intention is still not decomposed into vulnerability, defense mechanism, cultural aesthetics, reception risk, and overinterpretation boundary."
        - year: 2026
          study: "CEI benchmark"
          contribution: "Evaluates pragmatic reasoning in complex emotional and social contexts, including sarcasm, mixed signals, politeness, passive aggression, deflection, power, and disagreement."
          temporary_solution: "Provides the closest daily-life emotional-pragmatics precedent."
          remaining_gap: "Not Chinese-literary; does not systematize 不敢問, 不敢說, pain-as-content, or classical-to-digital indirect expression."
    - route: chinese_classical_literature_and_llms
      representative_studies:
        - year: 2024
          study: AC-EVAL
          contribution: "Evaluates ancient Chinese language understanding through history, short-text, and long-text comprehension."
          temporary_solution: "Establishes ancient Chinese as an LLM evaluation domain."
          remaining_gap: "Measures knowledge and comprehension more than hidden psychological risk or indirect-expression defense."
        - year: 2024
          study: WenMind
          contribution: "Benchmarks LLMs in Chinese classical literature and language arts across prose, poetry, culture, and many task types."
          temporary_solution: "Supplies a broad classical-literature baseline."
          remaining_gap: "Does not ask why a speaker avoids direct speech or whether a trivial image carries defensive psychological timing."
        - year: 2024
          study: "PoetMT and related classical poetry translation work"
          contribution: "Evaluates classical Chinese poetry translation quality."
          temporary_solution: "Helps measure adequacy, fluency, elegance, and cultural translation."
          remaining_gap: "Translation quality does not equal understanding 不敢問, 不敢說, or reception ethics."
        - year: 2025
          study: "Fuxi / Fùxì"
          contribution: "Evaluates ancient Chinese text understanding and generation."
          temporary_solution: "Expands classical Chinese evaluation to generation and authenticity."
          remaining_gap: "Still not a hidden mental-state or defense-mechanism benchmark."
    - route: cognitive_science_and_language_models
      representative_studies:
        - year: 2021
          study: "Schrimpf et al., The neural architecture of language"
          contribution: "Links neural-network language models to human language-processing brain and behavioral data, with next-word prediction as a strong organizing signal."
          temporary_solution: "Supports the claim that human language processing and LLMs can both involve prediction."
          remaining_gap: "Brain-score similarity for language processing does not establish human-like literary, affective, or social-risk understanding."
        - year: 2023
          study: "Aher et al., Using LLMs to simulate multiple humans"
          contribution: "Explores LLMs as simulated human participants for behavioral and social-science studies."
          temporary_solution: "Shows LLMs can be useful hypothesis-generating proxies."
          remaining_gap: "Simulated participants are not real human readers with lived stakes, cultural memory, or vulnerability."
        - year: 2023
          study: "Dillion et al., Can AI language models replace human participants?"
          contribution: "Reviews when language models might serve as participant substitutes and lists caveats."
          temporary_solution: "Gives a framework for cautious use of LLMs in psychological research."
          remaining_gap: "Does not make LLMs a replacement for human baseline data in ambiguous literary-pragmatic interpretation."
        - year: 2023
          study: "Mahowald et al., Dissociating language and thought in large language models"
          contribution: "Separates formal linguistic competence from functional linguistic competence involving reasoning, world knowledge, situation modeling, and social cognition."
          temporary_solution: "Provides a strong theoretical frame for layered understanding."
          remaining_gap: "Does not operationalize Chinese hidden mental-state inference or the defense/reception-risk layers."
        - year: 2024
          study: "Binz and Schulz, Turning large language models into cognitive models"
          contribution: "Shows LLMs can be adapted into models of some human cognitive behaviors."
          temporary_solution: "Justifies comparing human readers, LLMs, and rule baselines experimentally."
          remaining_gap: "Task-level cognitive modeling does not imply full human literary cognition."
        - year: 2024
          study: "Fedorenko et al., Language is primarily a tool for communication rather than thought"
          contribution: "Argues from cognitive science and neuroscience that language is primarily communicative and dissociable from thought."
          temporary_solution: "Helps prevent equating linguistic fluency with full cognition."
          remaining_gap: "Needs a concrete evaluation showing where communicative fluency fails in hidden-state interpretation."
        - year: 2025
          study: "Mancoridis et al., Potemkin Understanding in Large Language Models"
          contribution: "Shows models can appear to understand benchmark concepts while failing at human-like application, including areas such as literary techniques, game theory, and psychological biases."
          temporary_solution: "Gives a name and method for benchmark-success-without-robust-understanding."
          remaining_gap: "Needs adaptation to Chinese indirect expression and defense mechanisms."
        - year: 2025
          study: "Xu et al., LLMs without grounding recover non-sensorimotor but not sensorimotor features of human concepts"
          contribution: "Finds closer alignment for non-sensorimotor concepts than for sensory/motor features, with grounding limits."
          temporary_solution: "Clarifies that text-only learning captures some conceptual structure but has grounding limits."
          remaining_gap: "Grounding differences still need to be connected to homesickness, pain, waiting, loss, and embodied stakes in literary interpretation."
        - year: 2025
          study: "Large Language Models Do Not Simulate Human Psychology"
          contribution: "Argues that LLM responses can diverge from humans under small wording changes and should not be treated as reliable human psychology simulators."
          temporary_solution: "Warns against replacing human readers with LLM outputs."
          remaining_gap: "HanmeiBench should compare distributions and failure modes rather than use LLMs as human substitutes."
  unresolved_questions:
    - "Can a model distinguish \"the speaker wants to ask\" from \"the speaker does not dare to ask\"?"
    - "Can a model distinguish \"cannot express pain\" from \"does not speak because failed reception may create a second injury\"?"
    - "Can a model infer why a trivial surface question is psychologically protective?"
    - "Can a model represent silence, topic shift, weather, flowers, read receipts, and vagueposting as pragmatic evidence rather than missing data?"
    - "Can a model maintain multiple acceptable interpretations with calibrated confidence instead of forcing a single hidden meaning?"
    - "Can a model identify overinterpretation boundaries and avoid unsupported trauma narratives?"
    - "Can a model's errors be classified into literalism, cliche compression, defense blindness, reception blindness, false empathy, and Potemkin understanding?"
    - "Can an interactive model update a person-specific mental-state model over time, rather than solving one static item?"
  temporarily_solved_but_weak:
    - issue: "LLMs have theory-of-mind-like behavior."
      why_insufficient: "Many tasks can be solved by linguistic or template cues, and strong static-task performance does not prove partner-specific adaptation or human-like mental-state modeling."
      hanmei_response: "Use layered outputs, counterfactual alternatives, controls, and failure-mode coding."
    - issue: "LLMs can select correct implicatures."
      why_insufficient: "Selecting the hidden meaning does not explain why the speaker avoided direct speech or what risk directness would create."
      hanmei_response: "Score why_not_direct, social_risk, reception_risk, and alternative_direct_expression."
    - issue: "Classical Chinese benchmarks exist."
      why_insufficient: "They mostly evaluate knowledge, reading comprehension, translation, generation, and cultural facts rather than psychological pragmatics."
      hanmei_response: "Add defense mechanism, cultural frame, response quality, and overinterpretation boundary labels."
    - issue: "LLMs can serve as cognitive models or simulated participants."
      why_insufficient: "They are not human samples and lack stable human motivation, body, memory, vulnerability, and stakes."
      hanmei_response: "Keep human readers as a separate arm and treat LLM behavior as a comparison distribution, not a replacement."
  research_positioning_statement: "HanmeiBench should be framed as a psychological-pragmatics bridge between LLM ToM, pragmatics, Chinese classical-literature evaluation, cognitive science of language, and grounding debates. Its distinctive contribution is not another \"does the model understand literature?\" score, but a test of whether models can identify how humans use indirect language to protect themselves."
