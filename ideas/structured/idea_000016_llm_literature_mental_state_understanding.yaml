role: idea
value:
  impact: high
  feasibility: medium
first_principle:
  scarce_resource: "not text, but lived perspective, interpretive judgment, cultural depth, and personality density"
  core_question: "If both humans and LLMs are prediction systems, what extra conditions make prediction count as understanding: grounding, action, stakes, correction, embodiment, lived memory, or only behavioral competence?"
  not_the_core:
    - "whether an LLM can write pretty sentences"
    - "whether readers can be fooled once"
    - "whether commercial text markets will be automated"
    - "whether ToM benchmark score alone proves understanding"
    - "whether the model literally feels homesickness"
    - "whether prediction is automatically shallow"
    - "whether human understanding can be proven from the outside"
  smallest_useful_unit: "a small fixture set of indirect-expression passages with controlled context variants and human/model interpretation rubrics"
  decision_boundary: "Treat this as a research question about interpretation and mental-state inference, not as a settled claim about machine consciousness."
understanding_model:
  working_definition: "Understanding is the ability to build, use, transfer, and revise a compressed model of something so that explanation, prediction, action, analogy, and error correction improve across contexts."
  layers:
    - layer: "linguistic understanding"
      description: "parse sentences, recover references, and track discourse."
    - layer: "conceptual understanding"
      description: "compress cases into concepts and rules that transfer."
    - layer: "predictive understanding"
      description: "anticipate what should happen next and update after error."
    - layer: "pragmatic/social understanding"
      description: "infer intention, implication, politeness, irony, and hidden mental state."
    - layer: "grounded/action understanding"
      description: "connect predictions to perception, action, consequence, and world correction."
    - layer: "affective understanding"
      description: "connect meaning to bodily state, emotion, attachment, pain, and care."
    - layer: "existential/lived understanding"
      description: "understand through temporality, mortality, biography, loss, memory, and identity."
  implication_for_llms: "Current LLMs may be strong in linguistic, conceptual, predictive, and some pragmatic/social layers, while weaker or structurally different in grounded, affective, and existential layers."
literary_psychology_cases:
  source:
    title: "【一席】歐麗娟：孤獨的多棱鏡"
    video_id: iuCp-TC_HsI
    date: 2018-08-26
    note: "Stored as summarized brainstorm evidence, not a full transcript."
  mechanisms:
    - mechanism: "不敢問"
      literary_anchor: "Wang Wei, '寒梅著花未'"
      psychological_reading: "The speaker asks a small, safe question because the real questions about home and family may be emotionally unbearable at the first instant of reunion."
      relevance_to_llm_understanding: "A model should infer not only homesickness, but defensive delay and emotional buffering."
    - mechanism: "不敢說"
      literary_anchor: "Xin Qiji, '欲說還休'"
      psychological_reading: "The sufferer may want to speak, but stops because failed reception, trivialization, or careless comfort can deepen the wound."
      relevance_to_llm_understanding: "A model should distinguish language insufficiency from fear of being hurt by the listener's response."
    - mechanism: "pain becomes content"
      literary_anchor: "Lu Xun, Xianglin Sao"
      psychological_reading: "A person's deepest grief can be digested by others into story material, producing a second injury."
      relevance_to_llm_understanding: "A model should track reception ethics, not only the speaker's initial emotion."
    - mechanism: "self-limited conversation"
      literary_anchor: "Tolstoy and Han Yuefu framing in the talk"
      psychological_reading: "Conversation often fails because each person returns to their own world, interest, and burden."
      relevance_to_llm_understanding: "A model should represent listener limitation as part of social understanding."
    - mechanism: "two forms of tears"
      literary_anchor: "Li Shangyin versus Chen Zi'ang"
      psychological_reading: "Tears can become self-consuming rumination, or they can be reframed by cosmic and ethical scale into courage and witness."
      relevance_to_llm_understanding: "A model should not flatten all sadness into the same affective label."
comparative_experiment_extension:
  inspiration:
    repo: "https://github.com/emilyli0521/BA_Model"
    transferable_design: "same stimuli judged by humans, ChatGPT, and a linguistics-based rule model, then compared statistically"
    adaptation_boundary: "Use the experimental structure, not the BA-construction domain or code."
  working_title: "HanmeiBench: Hidden Mental State Understanding in Chinese Indirect Expression"
  research_question: "When humans do not directly say what they mean, can LLMs infer why the direct expression is avoided, including psychological defense, social risk, cultural convention, and response risk?"
  arms:
    - name: "human literary intuition"
      description: "Human readers label literal meaning, emotion, hidden mechanism, confidence, and evidence."
      likely_strength: "embodied, cultural, and autobiographical resonance"
      likely_failure: "reader background variance, over-personalization, education bias"
    - name: "LLM interpretation"
      description: "LLMs answer the same rubric with structured outputs and explanation evidence."
      likely_strength: "broad literary explanation and flexible analogy"
      likely_failure: "generic empathy, over-interpretation, plausible but unsupported hidden-state inference"
    - name: "explainable rule model"
      description: "Transparent rules detect cues for indirect request, defensive buffering, failed reception, grief-consumption, and sorrow mode."
      likely_strength: "auditability and clear failure modes"
      likely_failure: "brittle context handling and limited culture/life-world inference"
  stimulus_families:
    - "classical Chinese indirect homesickness"
    - "不敢問 and safe trivial question"
    - "不敢說 and anticipated failed reception"
    - "everyday indirect requests"
    - "modern literary silence and understated grief"
    - "digital-context indirect expression such as read receipts, story posts, and vagueposting"
    - "grief becoming content"
    - "self-consuming versus scale-reframed sorrow"
    - "literal controls with no hidden mechanism"
    - "misleading poetic-surface controls"
  output_schema_seed:
    literal_meaning: "short text"
    inferred_emotion: "controlled label plus free text"
    speaker_goal: "what the speaker may be trying to achieve"
    hidden_mechanism: "none | homesickness | defensive_buffering | failed_reception | indirect_request | grief_consumption | self_consuming_sorrow | scale_reframed_sorrow | other"
    defense_mechanism: "displacement | avoidance | suppression | retreatable_language | listener_testing | none | other"
    social_relation: "family | friend | romantic | superior | subordinate | stranger | public_audience | other"
    power_relation: "lower_to_higher | higher_to_lower | peer | unclear"
    cultural_frame: "face | filial_piety | restraint | poetics | politeness | digital_norm | other"
    alternative_direct_expression: "what the speaker could have said directly"
    why_not_direct: "psychological, social, or cultural reason the direct expression may be avoided"
    acceptable_interpretations: "list with confidence"
    overinterpretation_risk: "interpretations that go beyond the evidence"
    response_quality: "what response would avoid second injury"
    evidence_span: "textual cue used for inference"
    context_dependency: "what context would change the interpretation"
    confidence: 0-100
    understanding_layer: "literal | conventional | speaker_intention | social_pragmatic | psychological_defense | cultural_aesthetic | lived_experience | embodied_stakes"
  understanding_layers:
    - code: L0
      name: "literal parsing"
      example: "plum blossoms may or may not have bloomed"
      expected_llm_status: strong
    - code: L1
      name: "conventional implication"
      example: "plum blossoms link to hometown"
      expected_llm_status: strong
    - code: L2
      name: "speaker intention"
      example: "the speaker is homesick"
      expected_llm_status: "strong to medium"
    - code: L3
      name: "social pragmatics"
      example: "the speaker avoids directness because relation, politeness, or vulnerability matters"
      expected_llm_status: medium
    - code: L4
      name: "psychological defense"
      example: "the speaker asks a small question to buy time before unbearable knowledge"
      expected_llm_status: unstable
    - code: L5
      name: "cultural aesthetics"
      example: "借景抒情, restraint, East Asian poetics"
      expected_llm_status: "data and prompt dependent"
    - code: L6
      name: "lived experience"
      example: "separation, loss, waiting, memory, trauma"
      expected_llm_status: "not directly verifiable"
    - code: L7
      name: "embodied stakes"
      example: "body, mortality, time, irreversible emotional cost"
      expected_llm_status: "missing in text-only LLMs"
  dataset_v0_1:
    size: 60
    categories:
      - category: "classical anchor"
        count: 12
        tests: "culturally legible high-compression examples such as 寒梅著花未, used for calibration rather than the main held-out test"
      - category: "classical homomorphic variants"
        count: 12
        tests: "research-team-authored variants that preserve the psychological-pragmatic structure while reducing memorization risk"
      - category: "daily conversation"
        count: 12
        tests: "indirect refusal, listener testing, concession, self-protective small talk, and retreatable language"
      - category: "digital social context"
        count: 12
        tests: "read receipts, vagueposting, story-post hints, platform-era indirect expression, and attachment signals"
      - category: "negative and contrast controls"
        count: 12
        tests: "ordinary literal cases, matched controls, and contexts that should prevent over-psychologizing"
  counterfactual_questions:
    - "What is the literal meaning?"
    - "What does it imply about home, relation, or emotion?"
    - "What does the speaker most likely want to know or obtain?"
    - "Why might the speaker avoid the direct expression?"
    - "What psychological risk would direct speech create?"
    - "What cultural or aesthetic force does the indirect wording have?"
    - "What are two plausible interpretations and their confidence levels?"
  failure_modes:
    - mode: literalism
      description: "stop at the surface wording"
    - mode: cliche_compression
      description: "compress complex psychology into stock labels such as homesickness"
    - mode: over_psychologizing
      description: "infer mechanisms unsupported by evidence"
    - mode: culture_blindness
      description: "miss poetics, face, restraint, or kinship ethics"
    - mode: power_blindness
      description: "miss hierarchy and dependency"
    - mode: defense_blindness
      description: "notice emotion but miss self-protection"
    - mode: reception_blindness
      description: "miss fear that the listener will mishandle the pain"
    - mode: pain_as_content_blindness
      description: "miss how suffering can become gossip, story material, or engagement"
    - mode: false_empathy
      description: "produce warm language that does not address the real risk"
    - mode: single_answer_bias
      description: "force a fuzzy utterance into one definitive answer"
  first_prototype:
    scope: "60 stimuli, five balanced categories, three interpretation arms, CSV/JSONL outputs, source/license metadata, and agreement/disagreement analysis."
    no_need_yet:
      - "large participant pool"
      - "production web experiment"
      - "full psychology validation"
      - "heavy NLP pipeline"
    done_condition: "Produce one disagreement table and one source-route table that show at least three interpretable failure modes across human, LLM, and rule-model readings."
data_acquisition_plan:
  canonical_plan_doc: docs/hanmeibench-data-acquisition-plan.md
  first_principle: "Indirect expression is often risk management. The central benchmark question is not only what a hidden meaning is, but why the speaker chose an indirect surface form instead of the direct alternative."
  core_field: why_not_direct
  source_routes:
    - route: "classical poetry anchors"
      purpose: "Use culturally legible classical lines as calibration anchors and interpretation exemplars."
      candidate_sources:
        - "chinese-poetry GitHub corpus as candidate search pool"
        - "Song Ci CC0 corpus for open Song ci material"
        - "Wikisource for public-domain or freely licensed checks"
        - "Chinese Text Project for lookup and variant verification rather than mass redistribution"
      boundary: "Famous anchors should not be the main held-out test because models may have memorized them."
    - route: "existing pragmatics and emotion datasets"
      purpose: "Use SwordsmanImp, CEI, ALTPRAG, CPED, Weibo Emotion Cause Corpus, and PsyDefConv as method references, baselines, or comparison sets."
      boundary: "Do not merge them uncritically into HanmeiBench because licensing, domain, and task assumptions differ."
    - route: "controlled stimuli"
      purpose: "Make research-team-authored direct/indirect pairs and matched negative controls the main v0.1 source."
      boundary: "LLMs may propose candidates, but humans must review and author the released items."
    - route: "human-elicited daily indirect expression"
      purpose: "Use scenario writing to collect contemporary Chinese indirect expressions plus participant explanations of direct meaning, why-not-direct, desired response, and feared response."
      boundary: "Prefer consented elicitation over social-media scraping or private-message data."
    - route: "modern literature, talks, and media"
      purpose: "Use as theory inspiration and later licensed extension."
