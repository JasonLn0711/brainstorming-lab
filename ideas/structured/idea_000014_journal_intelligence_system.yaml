philosophical_boundary:
  shallow_version: "Cram-school submission engineering: study accepted papers to imitate format, guess reviewer preferences, and maximize acceptance odds."
  deep_version: "Scientific ecosystem awareness: study how a community accepts knowledge, establishes trust, manages uncertainty, rewards evidence, and develops blind spots."
  guiding_question: "Are we trying to please reviewers, or are we trying to understand how this scientific community decides what counts as credible knowledge?"
  dangers:
    - "losing research soul by asking only whether reviewers will like the work"
    - "mistaking accepted-paper surface style for scientific contribution"
    - "optimizing toward conformity instead of finding important community gaps"
  deeper_questions:
    - "Why does this community accept some ideas and resist others?"
    - "Which evidence types currently count as trustworthy, and why?"
    - "Which important problems are ignored because they do not fit the reviewer mental model?"
    - "Is the accepted literature showing a structural blind spot?"
    - "How does scientific writing reduce uncertainty and build collective trust?"
  adjacent_fields:
    - meta-research
    - scientometrics
    - "sociology of science"
    - "philosophy of science"
    - "computational analysis of scientific culture"
scientific_trust_framework:
  high_school_summary: "Science is not finished when one person discovers something. A claim becomes scientific knowledge only after many people can inspect it, question it, repeat it, cite it, apply it, and still find it useful enough to trust for now."
  five_trust_questions:
    problem_importance: "Does the work solve a real problem?"
    method_credibility: "Are the data, experiment, and reasoning strong enough to stand up to skeptical inspection?"
    reproducibility: "Can another team follow the method and get a similar result or at least understand why not?"
    claim_discipline: "Does the author explain limits and avoid saying more than the evidence supports?"
    community_validation: "Do other researchers cite, extend, challenge, reuse, or apply the work?"
  trust_infrastructure:
    - "data provenance"
    - "method transparency"
    - "design rationale"
    - "failure cases"
    - "limits of use"
    - "reproduction path"
    - "evidence traceability"
  field_specific_trust_examples:
    medicine:
      - "clinical trial design"
      - "sample size"
      - "statistical significance"
      - "ethics review"
      - "external validation"
    cybersecurity:
      - "threat model"
      - "attack scenario"
      - "reproducible experiment"
      - "baseline comparison"
    digital_forensics:
      - "evidence trace"
      - "chain of custody"
      - "procedure transparency"
      - "limitation statement"
    ai_research:
      - benchmark
      - "ablation study"
      - baseline
      - "robustness test"
      - "error analysis"
related_knowledge_fields:
  meta_research:
    simple_definition: "Research about the research system itself."
    high_school_analogy: "Not taking the math test, but studying whether the test system is fair, whether the questions are biased, and whether graders are consistent."
    real_examples:
      - "replication crisis: famous psychology findings fail when other labs repeat the experiments"
      - "publication bias: positive drug results are published while many null results remain invisible"
      - "benchmark overfitting: AI models become good at one benchmark without improving real-world ability"
  philosophy_of_science:
    simple_definition: "The field that asks what science, evidence, explanation, truth, and progress mean."
    high_school_analogy: "Not asking only for the answer, but asking why this way of answering should count as knowledge."
    real_examples:
      - "Popper falsifiability: a claim should be testable and possible to prove wrong"
      - "Kuhn paradigm shift: Newtonian mechanics, relativity, quantum mechanics, deep learning, and LLMs change what researchers consider normal methods"
      - "explanation problem in medical AI: high accuracy is not enough if clinicians cannot tell whether the model found disease or a shortcut"
  sociology_of_science:
    simple_definition: "The study of science as a human community with institutions, incentives, status, funding, journals, and shared languages."
    high_school_analogy: "Science is also like a class or club with rules, leaders, popular topics, resource differences, and reputation effects."
    real_examples:
      - "hot topics such as LLMs attract funding and attention, making less fashionable but important work harder to see"
      - "large labs and famous universities may get more initial attention than small labs"
      - "cross-disciplinary work can be rejected because different communities use different standards and languages"
  computational_scientometrics:
    simple_definition: "Using data analysis, NLP, graph analysis, and AI to study large collections of scientific papers."
    high_school_analogy: "Treat many papers as a dataset and measure where science is moving."
    real_examples:
      - "track whether AI agent, tool use, RAG, multi-agent, or workflow automation terms rise from 2021 to 2026"
      - "build citation networks to find core papers and research communities"
      - "find research gaps where two active areas rarely connect, such as LLM security and forensic traceability"
  reviewer_ecosystem_modeling:
    simple_definition: "Model reviewers, editors, journals, citation networks, and accepted-paper styles as an ecosystem that decides what research seems trustworthy."
    high_school_analogy: "Not only reading the exam rules, but observing how teachers grade, what past high-scoring essays look like, and which mistakes lose points."
    shallow_risk: "If used only to imitate accepted work, it becomes cram-school thinking."
    deep_use: "If used to understand how a knowledge community builds standards, it becomes scientific ecosystem analysis."
    real_examples:
      - "FSI:DI may value evidence handling, forensic workflow, conservative claims, realistic limits, and sensitivity around synthetic data"
      - "medical AI journals may demand clinical meaning, external validation, subgroup bias analysis, and workflow integration"
      - "NeurIPS, ICML, and ICLR may emphasize novelty, strong baselines, ablations, benchmarks, theory, and open-source code"
practical_trust_analysis_flow:
  - step: "Choose one target journal."
    example: "FSI:DI."
  - step: "Collect a bounded sample of accepted papers."
    example: "Start with 30-50 recent papers for pattern finding, or 8-12 papers for the first calibration packet."
  - step: "Fill a structured analysis table."
    fields:
      - "problem type"
      - "method type"
      - "data type"
      - "evidence standard"
      - "figure type"
      - "limitation style"
      - "claim strength"
      - "reproducibility level"
      - "operational scenario depth"
      - "likely reason the paper earned trust"
  - step: "Extract trust patterns."
    questions:
      - "What evidence does this journal trust?"
      - "Which claims does it distrust?"
      - "Which novelty types does it accept?"
      - "Which defensive sections do authors often include?"
      - "Which papers look like canonical examples of this venue?"
  - step: "Check the manuscript against community trust needs."
    framing: "Ask whether the manuscript gives this community the evidence it needs to trust the work, not whether it merely pleases reviewers."
journal_intelligence_dimensions:
  claim_style:
    purpose: "Infer how aggressively or conservatively accepted papers state contributions."
    signals:
      - "propose / introduce / demonstrate"
      - "investigate / explore / analyze"
      - "may / could / practical / operational"
      - "deployment-ready or real-world effectiveness language"
  figure_style:
    purpose: "Infer what visual evidence the venue expects."
    signals:
      - "figure count"
      - "architecture diagram ratio"
      - "workflow diagram ratio"
      - "evidence trace tables"
      - "qualitative case-study figures"
      - "ablation charts"
      - "graphical abstract style"
  evidence_density:
    purpose: "Infer minimum credibility expectations."
    signals:
      - "baseline count"
      - "ablation count"
      - "failure analysis"
      - limitations
      - "threat model"
      - "supplementary material"
      - "reproducibility assets"
  novelty_type:
    purpose: "Classify what kind of contribution the venue rewards."
    classes:
      - "engineering novelty"
      - "forensic novelty"
      - "governance novelty"
      - "evaluation novelty"
      - "theoretical novelty"
      - "application-impact novelty"
  reviewer_fear_points:
    purpose: "Infer what reviewers are defending against."
    examples:
      - overclaim
      - "unverifiable evidence"
      - "unrealistic simulation"
      - "AI hallucination"
      - "non-reproducible workflow"
      - "weak forensic defensibility"
  citation_ecosystem:
    purpose: "Identify recurring authors, terms, skepticism patterns, methods, and accepted evidence norms."
