first_principle:
  scarce_resource: "submission cycles, reviewer trust, and manuscript revision energy"
  core_object: "latent journal acceptance standard inferred from accepted-paper evidence"
  not_the_core:
    - "mass PDF downloading"
    - "impact factor chasing"
    - "style copying"
    - "guaranteeing acceptance"
    - "generic LLM reviewer comments"
  smallest_useful_unit: "one venue-fit calibration packet for one target journal using 8-12 recent accepted OA papers plus author guidelines"
  decision_boundary: "Use this to choose revision priorities and venue fit, not to claim certainty about hidden reviewer decisions."
journal_intelligence_dimensions:
  claim_style:
    purpose: "Infer how aggressively or conservatively accepted papers state contributions."
    signals:
      - "propose / introduce / demonstrate"
      - "investigate / explore / analyze"
      - "may / could / practical / operational"
      - "deployment-ready or real-world effectiveness language"
  figure_style:
    purpose: "Infer what visual evidence the venue expects."
    signals:
      - "figure count"
      - "architecture diagram ratio"
      - "workflow diagram ratio"
      - "evidence trace tables"
      - "qualitative case-study figures"
      - "ablation charts"
      - "graphical abstract style"
  evidence_density:
    purpose: "Infer minimum credibility expectations."
    signals:
      - "baseline count"
      - "ablation count"
      - "failure analysis"
      - limitations
      - "threat model"
      - "supplementary material"
      - "reproducibility assets"
  novelty_type:
    purpose: "Classify what kind of contribution the venue rewards."
    classes:
      - "engineering novelty"
      - "forensic novelty"
      - "governance novelty"
      - "evaluation novelty"
      - "theoretical novelty"
      - "application-impact novelty"
  reviewer_fear_points:
    purpose: "Infer what reviewers are defending against."
    examples:
      - overclaim
      - "unverifiable evidence"
      - "unrealistic simulation"
      - "AI hallucination"
      - "non-reproducible workflow"
      - "weak forensic defensibility"
  citation_ecosystem:
    purpose: "Identify recurring authors, terms, skepticism patterns, methods, and accepted evidence norms."
outputs:
  - "Journal culture brief."
  - "Accepted-paper pattern matrix."
  - "Latent venue scoring matrix."
  - "Manuscript venue-compatibility report."
  - "Reviewer-risk emulator output."
  - "Revision checklist for target submission."
example_scoring_matrix:
  reproducibility: 20
  operational_realism: 15
  conservative_claim_style: 10
  failure_analysis: 10
  ablation_rigor: 10
  governance_discussion: 15
  evidence_traceability: 20
reviewer_emulator:
  input:
    - paper.md
    - "target journal"
    - "journal culture packet"
  checks:
    - "claim scan"
    - "overclaim scan"
    - "evidence density scan"
    - "figure completeness scan"
    - "reproducibility scan"
    - "novelty classification"
    - "reviewer fear-point match"
    - "venue compatibility score"
  example_output:
    compatibility_score: 82/100
    main_risks:
      - "insufficient failure analysis"
      - "synthetic realism unsupported"
      - "missing operational boundary discussion"
planning_boundary:
  sync_rule: "Planning only needs the target journal, canonical idea path, next calibration packet, and capacity gate. Do not copy accepted-paper matrices, downloaded papers, or full venue analysis into planning."
  planning_summary_shape:
    - title
    - id
    - status
    - maturity_score
    - next_test
    - canonical_path
    - capacity_note
privacy_and_ethics:
