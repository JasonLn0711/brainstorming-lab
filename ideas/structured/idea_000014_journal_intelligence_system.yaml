first_principle:
  scarce_resource: "submission cycles, reviewer trust, and manuscript revision energy"
  core_object: "latent journal acceptance standard inferred from accepted-paper evidence"
  not_the_core:
    - "mass PDF downloading"
    - "impact factor chasing"
    - "style copying"
    - "guaranteeing acceptance"
    - "generic LLM reviewer comments"
    - "deep learning before schema"
    - "cram-school reviewer appeasement"
    - "acceptance probability theater"
  smallest_useful_unit: "one venue-fit calibration packet for one target journal using 8-12 recent accepted OA papers plus author guidelines"
  decision_boundary: "Use this to choose revision priorities and venue fit, not to claim certainty about hidden reviewer decisions."
method_position:
  current_answer: "Machine learning and deep learning are possible later, but they are not the first move."
  first_phase:
    name: "Journal Forensic Framework"
    purpose: "Create a quantifiable observation system before modeling."
    components:
      - "paper analysis schema"
      - "venue-specific rubric"
      - "scientific feature extraction"
      - "journal intelligence database"
      - "acceptance manifold thinking"
      - "human interpretation"
  why_not_start_with_deep_learning:
    - "Most venues do not provide rejected manuscripts or reviewer comments, so supervised labels are missing."
    - "Accepted Open Access samples may not represent all accepted papers."
    - "Embedding and clustering before feature definition tends to produce abstract, non-actionable summaries."
    - "Reviewer-sensitive signals often live in small details: claim wording, limitation placement, figure order, appendix density, operational boundary wording, and evidence-chain language."
  later_ml_layers:
    - "embedding-based nearest accepted-paper search after the rubric stabilizes"
    - "clustering accepted papers into contribution families"
    - "topic drift and novelty fatigue detection"
    - "similarity ranking between a draft and accepted-paper patterns"
    - "reviewer-risk retrieval from prior calibration packets"
  preferred_output: "venue-specific reviewer-risk report and revision checklist, not a raw acceptance-probability score"
