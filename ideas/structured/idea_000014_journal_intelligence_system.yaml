status: execution_ready
problem_statement:
  raw: "Given a researcher preparing international journal submissions without enough visibility into a venue's implicit reviewer/editor preferences, infer the journal's latent acceptance standards from recent accepted Open Access papers, author guidelines, figure/evidence patterns, citation ecosystem, novelty type, and reviewer-risk signals before deciding whether and how to submit."
  normalized: "Given a researcher preparing international journal submissions, optimize venue-fit judgment and manuscript revision priorities under constraints of incomplete reviewer preferences, limited submission cycles, field-specific evidence norms, publication cost, and overclaim/reproducibility risk."
  structure:
    given: "a researcher preparing international journal submissions"
    optimize: "venue-fit judgment and manuscript revision priorities"
    constraints:
      - "incomplete reviewer preferences"
      - "limited submission cycles"
      - "field-specific evidence norms"
      - "publication cost"
      - "overclaim and reproducibility risk"
summary: "A journal-culture reverse-engineering system that analyzes recent accepted Open Access papers to infer a venue's implicit preferences: claim style, figure style, evidence density, novelty definition, reviewer fear points, citation tribe, and latent scoring matrix. The output is a venue compatibility report and reviewer-risk emulator for manuscripts such as FSI:DI, ESWA, DSS, or AI governance papers."
source_note_zh: "投稿不是只有研究內容本身，還包含期刊世界觀、reviewer 習慣、editor 在意的風險、社群接受的敘事方式、claim 邊界與 evidence 標準；這些通常不會完整寫在 author guideline 裡，所以可以透過最近幾期 accepted Open Access paper 反推期刊文化。"
assumptions:
  - "A journal's accepted Open Access papers expose part of its implicit editorial and reviewer culture, even when the author guideline is incomplete."
  - "The useful signal is not only topic similarity; claim wording, evidence density, figure design, novelty type, limitation style, and citation ecosystem all matter."
  - "Subscription journals with Open Access articles provide enough public samples for a bounded first analysis, but the system must not pretend that OA samples fully represent all accepted papers."
  - "Reviewer fear points can be inferred from repeated conservative language, reproducibility emphasis, limitation patterns, and common evidence structures."
  - "Different fields define novelty differently: engineering novelty, forensic novelty, governance novelty, evaluation novelty, or impact-story novelty."
  - "Venue-fit should improve manuscript revision decisions, not become a fake guarantee of acceptance."
  - "For FSI:DI-like forensic/security venues, defensibility, traceability, reproducibility, conservative claims, and failure analysis may matter more than model novelty."
evidence:
  - "2026-05-08 brainstorming note on using recent Open Access papers to infer journal preferences, reviewer habits, figure/evidence style, novelty types, and latent acceptance standards."
  - "Existing planning FSI:DI latest-OA calibration report already tested a small version of this idea for forensic digital investigation reviewer expectations."
  - "Weekly Paper Lab now has paper-quality scoring, claim-evidence placeholders, and scientific-evaluation schemas that can become reusable infrastructure for this idea."
baseline:
  - "Read only author guidelines and scope pages."
  - "Pick a venue by topic keywords alone."
  - "Ask an LLM for generic reviewer comments without venue-specific accepted-paper evidence."
  - "Copy surface style from one accepted paper."
  - "Treat impact factor or ranking as the main venue-fit signal."
metrics:
  - "Number of recent accepted OA papers analyzed per venue."
  - "Claim-style distribution: propose, investigate, analyze, demonstrate, deploy, may, could, practical, operational."
  - "Figure-style distribution: architecture diagrams, evidence tables, workflows, ablations, case studies, graphical abstracts, overview figures."
  - "Evidence-density score: baselines, ablations, failure cases, limitations, threat model, supplementary material, reproducibility artifacts."
  - "Novelty-type distribution: engineering, forensic, governance, evaluation, theoretical, application-impact."
  - "Reviewer-fear score: overclaim, unverifiable evidence, unrealistic simulation, AI hallucination, non-reproducibility, weak forensic defensibility."
  - "Citation-tribe overlap: recurring authors, methods, terminology, venues, skepticism patterns."
  - "Manuscript compatibility score and top revision risks."
  - "Post-decision calibration: whether desk decision or reviewer comments match predicted risk points."
insights:
  - "A journal is not only a publisher container; it is an editor, reviewer tribe, accepted-narrative style, and citation ecosystem."
  - "The strongest analysis asks what the venue fears, not only what it likes."
  - "Forensics and security venues often punish unsupported confidence more than technical modesty."
  - "Figure style is a hidden venue-fit signal because it exposes what kinds of evidence reviewers expect to inspect."
  - "The system should separate author-guideline compliance from latent acceptance culture."
  - "A good output is a revision strategy: what to strengthen, soften, add, remove, or reframe before submission."
  - "This is not a shortcut around scientific quality; it is a way to make venue-specific evidence expectations explicit."
