problem_statement:
  raw: "Given high-volume suspicious content, optimize review-worthy candidate discovery under hard-negative and aggregate-reporting constraints."
  normalized: "Given high-volume suspicious content, optimize review-worthy candidate discovery under constraints of hard-negative, aggregate-reporting constraints."
  structure:
    given: "high-volume suspicious content"
