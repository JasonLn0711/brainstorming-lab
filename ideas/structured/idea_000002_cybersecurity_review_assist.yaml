    constraints:
      - hard-negative
      - "aggregate-reporting constraints"
summary: "A reviewer assist layer that ranks suspicious cybersecurity or scam candidates, explains why they are worth review, and keeps human burden measurable."
assumptions:
  - "The system is valuable only if it lowers review burden without increasing false confidence."
  - "Aggregate-only reporting and hard-negative protection are core constraints, not later polish."
  - "A dual metric can track candidate quality and reviewer labor at the same time."
insights:
  - "The same structure can support healthcare triage and anomaly review with different risk gates."
  - "Review-worthy does not mean legally or medically confirmed."
