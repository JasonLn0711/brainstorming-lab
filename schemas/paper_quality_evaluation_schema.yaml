required_file: scientific_evaluation.yaml
required_report: 08_scientific_evaluation.md
rubric_version: scientific_paper_evaluation_v1
purpose: "Canonical schema for post-reading scientific quality evaluation."
evaluation_status_values:
  - not_started
  - preliminary
  - final
  - parked
coefficient_values:
  - 0
  - 0.25
  - 0.5
  - 0.75
  - 1
quality_score:
  raw_score: "sum of dimension scores, 0-100"
  penalty_total: "sum of applied penalty deductions"
  applied_cap: "null or minimum active cap"
  final_score: "min(raw_score - penalty_total, applied_cap), floored at 0"
  decision_values:
    - not_evaluated
    - strong_reject
    - reject
    - weak_reject
    - borderline
    - weak_accept
    - accept
    - strong_accept
dimensions:
  problem_value:
    max: 12
    items:
      A1_problem_clarity: 3
      A2_importance: 3
      A3_researchability: 2
      A4_practical_or_theoretical_impact: 2
      A5_timeliness: 2
  literature_gap:
    max: 10
    items:
      B1_core_literature_coverage: 3
      B2_prior_work_accuracy: 2
      B3_clear_research_gap: 3
      B4_avoids_strawman: 2
  contribution_novelty:
    max: 12
    items:
      C1_explicit_contributions: 2
      C2_novelty: 4
      C3_beyond_engineering_integration: 2
      C4_alignment_with_problem: 2
      C5_extensibility: 2
  method_soundness:
    max: 16
    items:
      D1_method_clarity: 3
      D2_assumption_clarity: 3
      D3_method_problem_fit: 3
      D4_technical_correctness: 3
      D5_complete_system_or_process: 2
      D6_cost_and_complexity_awareness: 2
  evidence_experiment:
    max: 20
    items:
      E1_evaluation_matches_claims: 4
      E2_fair_baselines: 3
      E3_dataset_or_sample_quality: 3
      E4_ablation_or_component_analysis: 3
      E5_statistical_validity: 3
      E6_failure_case_analysis: 2
      E7_leakage_or_contamination_prevention: 2
  results_analysis:
    max: 10
    items:
      F1_clear_result_presentation: 2
      F2_analysis_depth: 3
      F3_results_support_claims: 3
      F4_tradeoff_discussion: 2
  reproducibility:
    max: 10
    items:
      G1_code_availability: 2
      G2_data_availability_or_protocol: 2
      G3_experimental_settings: 2
      G4_environment_and_dependencies: 2
      G5_reproduction_steps: 2
  scientific_honesty:
    max: 6
    items:
      H1_limitation_disclosure: 2
      H2_claim_restraint: 2
      H3_ethics_bias_risk_disclosure: 2
  communication:
    max: 4
    items:
      I1_structure: 1
      I2_figures_and_tables: 1
      I3_writing_precision: 1
      I4_abstract_conclusion_accuracy: 1
item_record:
  weight: "must match schema"
  coefficient: "one of 0, 0.25, 0.5, 0.75, 1"
  score: "weight * coefficient"
  evidence_note: "required; do not guess missing evidence"
confidence_score:
  total: 100
  items:
    full_text_available: 10
    supplementary_material_available: 10
    code_data_or_appendix_checkable: 15
    evaluator_domain_background: 15
    all_subscores_have_evidence_notes: 20
    two_independent_reviewers: 15
    disagreement_adjudicated: 15
risk_levels:
  - not_evaluated
  - low
  - medium
  - high
  - critical
overclaim_gate: "If overclaim checklist has 3 or more yes values, risk must be high or critical."
reviewer_consistency:
  total_score_gap:
    "<=5": acceptable
    "6-10": discussion_required
    ">10": third_reviewer_adjudication
  dimension_gap_rule: "If one dimension differs by more than 40 percent of its max, write a disagreement note."
notes:
  - "This schema evaluates paper quality after reading. It does not replace weekly shortlist scoring."
  - "not_started is allowed before a full quality review; final/parked/preliminary evaluations must not use not_evaluated decision or risk levels."
